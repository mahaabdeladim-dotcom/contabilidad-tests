endiente de la empresa.","La propia gerencia mediante una declaración interna.","El informe de auditoría se pronuncia sobre ella."],"c":[0,1,3],"e":"La imagen fiel la verifica el auditor (profesional independiente) en su informe, no la gerencia.","id":"h4_52"},{"t":4,"d":3,"ref":false,"q":"El estado del valor añadido:","o":["Informa del modo en que se genera el beneficio.","Informa del modo en que se reparte el beneficio entre los grupos de interés.","Es un documento de información adicional, no una cuenta anual obligatoria.","Es una de las cinco cuentas anuales del PGC."],"c":[0,1,2],"e":"Es información ADICIONAL voluntaria, no cuenta anual.","id":"h4_53"},{"t":4,"d":3,"ref":false,"q":"La información segmentada:","o":["Presenta la realidad empresarial en función de las líneas de negocio.","Presenta la realidad empresarial por zonas geográficas en las que opera la empresa.","Es útil para empresas diversificadas o internacionalizadas.","Es un resumen del estado de flujos de efectivo."],"c":[0,1,2],"e":"Segmenta el negocio por líneas o geografías; nada que ver con el EFE.","id":"h4_54"},{"t":4,"d":3,"ref":false,"q":"La información intermedia:","o":["Se elabora con una periodicidad inferior al año.","Permite a los usuarios tomar decisiones a tiempo.","Sólo puede elaborarse cada cinco años.","Es un ejemplo de información adicional a las cuentas anuales."],"c":[0,1,3],"e":"Su rasgo definitorio es la periodicidad INFERIOR al año (trimestral, semestral…).","id":"h4_55"},{"t":4,"d":3,"ref":false,"q":"El informe integrado:","o":["Proporciona una representación clara y concisa de cómo la organización se gestiona.","Explica cómo la organización crea y mantiene valor.","Fue impulsado por el International Integrated Reporting Committee (2011).","Es el nombre técnico del balance de comprobación."],"c":[0,1,2],"e":"El informe integrado (IIRC, 2011) comunica el modelo de creación de valor; nada que ver con el balance de comprobación.","id":"h4_56"},{"t":4,"d":3,"ref":false,"q":"Sobre el gobierno corporativo y la responsabilidad social corporativa (RSC):","o":["En diversos países se han elaborado códigos de buen gobierno.","Buscan incorporar estas prácticas en las empresas e informar sobre ellas.","La información sobre RSC puede presentarse en informes de sostenibilidad.","Son partes obligatorias de la memoria del PGC para toda empresa."],"c":[0,1,2],"e":"Los códigos de buen gobierno y los informes de sostenibilidad/RSC son información adicional, no parte obligatoria de la memoria para toda empresa.","id":"h4_57"},{"t":4,"d":3,"ref":false,"q":"Relaciona los documentos con su carácter:","o":["Balance, PyG, ECPN, EFE y memoria: cuentas anuales.","Informe de gestión e informe de auditoría: documentos que acompañan a las cuentas anuales.","Estado del valor añadido e informe integrado: información adicional voluntaria.","Informe de auditoría: cuenta anual obligatoria."],"c":[0,1,2],"e":"El informe de auditoría NO es una cuenta anual: es un documento de verificación que las acompaña.","id":"h4_58"},{"t":4,"d":3,"ref":false,"q":"Las interrelaciones entre los estados contables anuales:","o":["El resultado del ejercicio de la PyG aparece también en el patrimonio neto del balance.","El resultado es el punto de partida para calcular los flujos de explotación en el EFE.","El resultado forma parte del total de ingresos y gastos reconocidos del ECPN.","Los estados contables son independientes y sus cifras no guardan relación."],"c":[0,1,2],"e":"Los estados están interrelacionados: el resultado enlaza PyG, balance, EFE y ECPN.","id":"h4_59"},{"t":4,"d":3,"ref":false,"q":"Una empresa presenta balance normal (no abreviado). En consecuencia:","o":["Debe elaborar las cinco cuentas anuales.","Debe someterse a auditoría.","Debe elaborar informe de gestión.","Queda dispensada del estado de flujos de efectivo."],"c":[0,1,2],"e":"Con balance normal: cinco cuentas anuales completas + auditoría + informe de gestión. La dispensa del EFE es para quienes presentan balance ABREVIADO.","id":"h4_60"},{"t":4,"d":3,"ref":false,"q":"Sobre la aplicación de las NIIF en España, señala las combinaciones correctas:","o":["Grupo cotizado, cuentas consolidadas: NIIF obligatorias.","Grupo no cotizado, cuentas consolidadas: opción entre NIIF y normativa española.","Sociedad individual: normativa española.","Grupo cotizado, cuentas individuales de las sociedades: NIIF obligatorias."],"c":[0,1,2],"e":"Las cuentas individuales (incluso de sociedades de grupos cotizados) siguen la normativa española.","id":"h4_61"},{"t":4,"d":3,"ref":false,"q":"La contabilidad nacional y la normalización:","o":["El modelo contable normalizado es una de las principales fuentes de datos de la Contabilidad Nacional.","La normalización convierte la contabilidad en un instrumento de política económica, financiera y fiscal.","La contabilidad de las empresas no guarda ninguna relación con las estadísticas nacionales.","Es uno de los objetivos de la normalización contable."],"c":[0,1,3],"e":"La información contable normalizada alimenta la Contabilidad Nacional: por eso es instrumento de política económica.","id":"h4_62"},{"t":4,"d":3,"ref":false,"q":"Libros obligatorios de las sociedades mercantiles:","o":["Además del Diario y el de Inventarios y Cuentas Anuales, las sociedades llevan un libro de Actas.","Existen libros societarios adicionales, como los libros registro de socios o de acciones.","Las sociedades unipersonales llevan un libro de Contratos.","Las sociedades están exentas de llevar el libro Diario."],"c":[0,1,2],"e":"A los libros contables se añaden los societarios (actas, registro de socios/acciones, contratos en unipersonales).","id":"h4_63"},{"t":4,"d":3,"ref":false,"q":"Ordena correctamente la secuencia temporal de la información contable anual:","o":["Cierre del ejercicio → formulación de cuentas → auditoría → aprobación por la Junta → depósito.","Cierre → aprobación por la Junta → formulación → depósito → auditoría.","La formulación es anterior a la aprobación por la Junta General.","El depósito es anterior a la formulación."],"c":[0,2],"e":"Secuencia: cierre, formulación (3 meses), auditoría (1 mes), aprobación (6 meses desde cierre) y depósito (1 mes desde aprobación).","id":"h4_64"},{"t":4,"d":3,"ref":false,"q":"El ICAC:","o":["Elaboró el Plan General de Contabilidad de 2007.","Es un organismo público español con competencias en materia contable.","Es el organismo emisor de las NIIF.","Elaboró también el PGC de Pequeñas y Medianas Empresas."],"c":[0,1,3],"e":"El ICAC (Instituto de Contabilidad y Auditoría de Cuentas) elaboró el PGC 2007 y el de PYMES; las NIIF las emite el IASB.","id":"h4_65"},{"t":4,"d":3,"ref":false,"q":"El PGC 2007 y las PYMES:","o":["Existe un Plan General de Contabilidad de Pequeñas y Medianas Empresas.","El PGC de PYMES es una adaptación del PGC 2007.","Las PYMES están exentas de aplicar cualquier plan contable.","La aplicación de un plan contable es obligatoria para todas las empresas."],"c":[0,1,3],"e":"Ninguna empresa está exenta: las PYMES pueden aplicar su plan adaptado, pero siempre dentro de la obligatoriedad general.","id":"h4_66"},{"t":4,"d":3,"ref":false,"q":"El proceso de normalización busca que la información contable sea:","o":["Homogénea.","Comparable.","Comprensible para los usuarios.","Secreta y accesible sólo para la gerencia."],"c":[0,1,2],"e":"Homogeneidad, comparabilidad y comprensibilidad son las metas de la normalización; la información normalizada se divulga, no se oculta.","id":"h4_67"},{"t":4,"d":3,"ref":false,"q":"Un inversor quiere comparar las cuentas de dos empresas europeas cotizadas de países distintos. La normalización internacional (NIIF) le beneficia porque:","o":["Ambos grupos cotizados elaboran sus cuentas consolidadas con las mismas normas (NIIF).","Mejora el funcionamiento de los mercados financieros.","Facilita la internacionalización de las relaciones comerciales.","No le aporta nada: cada país cotizado usa criterios locales en las consolidadas."],"c":[0,1,2],"e":"Desde 2005 los grupos cotizados europeos consolidan bajo NIIF, lo que hace comparables sus cuentas.","id":"h4_68"},{"t":4,"d":3,"ref":false,"q":"Del estado de flujos de efectivo de una empresa se conocen: efectivo al comienzo del ejercicio 1.302.348 € y aumento neto del efectivo 118.551 €:","o":["El efectivo al final del ejercicio es de 1.420.899 €.","La variación neta del efectivo es la suma de los flujos de explotación, inversión y financiación.","El efectivo final es la diferencia entre ingresos y gastos del ejercicio.","Los flujos de inversión suelen recoger, entre otros, los pagos por compras de inmovilizado."],"c":[0,1,3],"e":"Efectivo final = 1.302.348 + 118.551 = 1.420.899 €. El EFE trabaja con cobros y pagos: la diferencia entre ingresos y gastos es el resultado (PyG), no el efectivo.","id":"h4_69"},{"t":1,"d":2,"ref":true,"q":"La contabilidad, como sistema de información:","o":["Capta, mide, registra, valora y comunica la información económica de una unidad.","Su finalidad es facilitar la toma de decisiones a sus usuarios.","Es la rama del Derecho que regula los contratos mercantiles.","Se limita a archivar las facturas de la empresa."],"c":[0,1],"e":"La contabilidad identifica, mide, registra y comunica información económica para que sus usuarios tomen decisiones; no es una rama del Derecho ni un archivo de documentos.","id":"x1_00"},{"t":1,"d":2,"ref":true,"q":"El patrimonio de una empresa:","o":["Está formado por el conjunto de bienes, derechos y obligaciones de la empresa.","Se expresa valorado en unidades monetarias.","Incluye únicamente el dinero de caja y bancos.","Está formado exclusivamente por las deudas contraídas con terceros."],"c":[0,1],"e":"El patrimonio es el conjunto de bienes (lo que tiene), derechos (lo que le deben) y obligaciones (lo que debe), valorado en unidades monetarias.","id":"x1_01"},{"t":1,"d":2,"ref":true,"q":"Un derecho de cobro que la empresa tiene frente a un cliente:","o":["Es un elemento de activo.","Representa recursos económicos futuros para la empresa.","Es un elemento de pasivo.","Es un gasto del ejercicio."],"c":[0,1],"e":"Los derechos de cobro (p. ej. la cuenta Clientes) cumplen la definición de activo: recursos controlados de los que se esperan beneficios económicos futuros.","id":"x1_02"},{"t":1,"d":2,"ref":true,"q":"En relación con la ecuación fundamental del patrimonio:","o":["Activo = Patrimonio neto + Pasivo.","Patrimonio neto = Activo − Pasivo.","El activo se financia con recursos propios y ajenos.","Activo + Pasivo = Patrimonio neto."],"c":[0,1,2],"e":"La estructura económica (activo) se financia con recursos propios (PN) y ajenos (pasivo): A = PN + P, o lo que es lo mismo, PN = A − P.","id":"x1_03"},{"t":1,"d":3,"ref":true,"q":"Una empresa tiene bienes y derechos por 90.000 € y obligaciones frente a terceros por 55.000 €:","o":["Su patrimonio neto es de 35.000 €.","Su activo asciende a 90.000 € y su pasivo a 55.000 €.","Su patrimonio neto es de 145.000 €.","Su patrimonio neto coincide con el valor de sus bienes y derechos (90.000 €)."],"c":[0,1],"e":"Los bienes y derechos son el activo (90.000 €) y las obligaciones, el pasivo (55.000 €). PN = A − P = 90.000 − 55.000 = 35.000 €.","id":"x1_04"},{"t":1,"d":2,"ref":true,"q":"El patrimonio neto de una empresa:","o":["Es la parte residual de los activos una vez deducidos todos los pasivos.","Equivale a los recursos propios (financiación propia).","Es el total de las deudas a largo plazo.","Coincide con el dinero disponible en tesorería."],"c":[0,1],"e":"El PN es la parte residual de los activos deducidos los pasivos y representa la financiación propia; no debe confundirse con las deudas ni con la tesorería.","id":"x1_05"},{"t":1,"d":3,"ref":true,"q":"Señale la afirmación o afirmaciones correctas sobre el activo:","o":["Es un recurso controlado por la empresa del que espera obtener beneficios o rendimientos económicos futuros.","Recoge las obligaciones actuales de la empresa.","El activo corriente está previsto realizarlo o consumirlo en el ciclo normal de explotación.","Todo el activo debe convertirse en dinero en un plazo superior a doce meses."],"c":[0,2],"e":"El activo es un recurso controlado del que se esperan beneficios futuros; el corriente se realiza o consume en el ciclo de explotación (normalmente en menos de un año).","id":"x1_06"},{"t":1,"d":2,"ref":true,"q":"Los proveedores y las deudas a largo plazo con entidades de crédito:","o":["Son elementos de pasivo.","Son obligaciones cuya cancelación supondrá una salida de recursos.","Forman parte del activo de la empresa.","Son gastos del ejercicio."],"c":[0,1],"e":"Son obligaciones presentes surgidas de hechos pasados cuya cancelación supone desprenderse de recursos: constituyen el pasivo, no el activo ni gastos.","id":"x1_07"},{"t":1,"d":3,"ref":true,"q":"Atendiendo a la estructura del balance:","o":["La financiación (de dónde proceden los recursos) se recoge en el patrimonio neto y el pasivo.","El activo constituye la estructura económica (en qué se ha invertido).","La financiación se recoge en el activo corriente.","La cuenta de pérdidas y ganancias es la que recoge la financiación."],"c":[0,1],"e":"El activo es la estructura económica (inversiones) y el patrimonio neto más el pasivo forman la estructura financiera (origen de los recursos).","id":"x1_08"},{"t":1,"d":2,"ref":true,"q":"Un elemento patrimonial se clasifica como corriente cuando, con carácter general:","o":["Se espera realizar, vender o consumir dentro del ciclo normal de explotación.","Se espera realizar o liquidar en un plazo no superior a un año.","Su valor en euros supera un determinado importe.","Es un bien material, con independencia de su plazo."],"c":[0,1],"e":"Es corriente lo que se espera realizar o consumir en el ciclo normal de explotación o en el plazo máximo de un año; el valor o la materialidad no influyen en esta clasificación.","id":"x1_09"},{"t":1,"d":3,"ref":true,"q":"Los hechos contables permutativos:","o":["Modifican la composición del patrimonio.","No alteran la cifra de patrimonio neto.","Cobrar por banco el importe adeudado por un cliente es un ejemplo.","Siempre aumentan el patrimonio neto."],"c":[0,1,2],"e":"Los hechos permutativos cambian unos elementos por otros (p. ej. Clientes por Bancos) sin variar el patrimonio neto; los que lo alteran son los modificativos.","id":"x1_10"},{"t":1,"d":2,"ref":true,"q":"Son usuarios externos de la información contable:","o":["Los acreedores y las entidades financieras.","Los inversores.","La Administración pública.","La gerencia y la dirección de la empresa."],"c":[0,1,2],"e":"Usuarios externos son quienes no gestionan la empresa: inversores, acreedores, bancos, Administración… La gerencia y la dirección son usuarios internos.","id":"x1_11"},{"t":1,"d":3,"ref":true,"q":"La contabilidad financiera:","o":["Elabora información dirigida principalmente a usuarios externos.","Sigue normas generalmente aceptadas (está normalizada).","Da lugar a las cuentas anuales que se depositan en el Registro Mercantil.","Es de uso exclusivamente interno y no está regulada."],"c":[0,1,2],"e":"La contabilidad financiera produce información normalizada dirigida sobre todo a terceros (cuentas anuales); la contabilidad de costes o analítica es la interna y no regulada.","id":"x1_12"},{"t":1,"d":3,"ref":true,"q":"Según el principio de devengo:","o":["Los ingresos y gastos se imputan al ejercicio en que se producen, atendiendo a la corriente real.","La imputación es independiente de cuándo se cobran o se pagan.","Los ingresos y gastos se imputan al ejercicio en que se cobran o pagan.","La imputación depende de la fecha de la declaración de impuestos."],"c":[0,1],"e":"El devengo imputa ingresos y gastos según la corriente real (cuando se producen), no según la corriente monetaria (cobros y pagos) ni según criterios fiscales.","id":"x1_13"},{"t":1,"d":2,"ref":true,"q":"Las cuentas anuales deben mostrar la imagen fiel de:","o":["El patrimonio de la empresa.","La situación financiera.","Los resultados de la empresa.","Únicamente el beneficio a efectos fiscales."],"c":[0,1,2],"e":"El objetivo de las cuentas anuales es mostrar la imagen fiel del patrimonio, de la situación financiera y de los resultados; no persiguen fines fiscales.","id":"x1_14"},{"t":1,"d":3,"ref":true,"q":"Una máquina que la empresa utilizará durante varios años para producir:","o":["Es activo no corriente.","Forma parte del inmovilizado material.","Es activo corriente (existencias).","Es un elemento del patrimonio neto."],"c":[0,1],"e":"El inmovilizado material (maquinaria, construcciones…) permanece en la empresa más de un ejercicio: es activo no corriente, no existencias ni patrimonio neto.","id":"x1_15"},{"t":1,"d":3,"ref":true,"q":"Si el activo de una empresa asciende a 120.000 € y su pasivo a 120.000 €:","o":["Su patrimonio neto es nulo (0 €).","Todos los recursos proceden de financiación ajena.","Su patrimonio neto es de 240.000 €.","No puede calcularse el patrimonio neto con esos datos."],"c":[0,1],"e":"PN = A − P = 120.000 − 120.000 = 0 €: toda la inversión está financiada con recursos ajenos.","id":"x1_16"},{"t":1,"d":2,"ref":true,"q":"El dinero en efectivo de la caja de la empresa:","o":["Es un bien propiedad de la empresa.","Forma parte del activo corriente (disponible).","Es un derecho de cobro.","Es una obligación."],"c":[0,1],"e":"El efectivo es un bien (no un derecho ni una obligación) y constituye la parte más líquida del activo corriente: el disponible o tesorería.","id":"x1_17"},{"t":1,"d":3,"ref":true,"q":"Señale la/s afirmación/es correcta/s:","o":["Un mismo hecho contable puede afectar a la vez a elementos de activo, de pasivo y de patrimonio neto.","Tras cada hecho contable se mantiene la igualdad Activo = Patrimonio neto + Pasivo.","Cada hecho contable solo puede afectar a un único elemento patrimonial.","El patrimonio neto siempre coincide con el activo."],"c":[0,1],"e":"Un hecho contable puede afectar simultáneamente a varias masas; lo esencial es que la ecuación fundamental (A = PN + P) se mantenga siempre en equilibrio.","id":"x1_18"},{"t":1,"d":3,"ref":true,"q":"Las obligaciones de pago que vencen en un plazo superior a un año:","o":["Se clasifican como pasivo no corriente.","Forman parte de la financiación ajena de la empresa.","Se clasifican como pasivo corriente.","Forman parte del patrimonio neto."],"c":[0,1],"e":"Las deudas con vencimiento superior a doce meses son pasivo no corriente (financiación ajena a largo plazo); las de menos de un año, pasivo corriente.","id":"x1_19"},{"t":2,"d":2,"ref":true,"q":"Una cuenta es:","o":["El instrumento de representación y medida de cada elemento patrimonial.","Un instrumento que recoge las variaciones (aumentos y disminuciones) del elemento.","Un documento fiscal que se presenta ante Hacienda.","Un tipo de impuesto sobre el patrimonio."],"c":[0,1],"e":"La cuenta representa y mide un elemento patrimonial (o de gasto/ingreso) y recoge sus aumentos y disminuciones de valor.","id":"x2_00"},{"t":2,"d":2,"ref":true,"q":"En una cuenta:","o":["Cargar o adeudar es anotar una cantidad en el Debe.","Abonar o acreditar es anotar una cantidad en el Haber.","Cargar es anotar una cantidad en el Haber.","Abonar es calcular el saldo de la cuenta."],"c":[0,1],"e":"Cargar (adeudar) = anotar en el Debe; abonar (acreditar) = anotar en el Haber. El saldo es la diferencia entre las sumas de ambas zonas.","id":"x2_01"},{"t":2,"d":3,"ref":true,"q":"Según el convenio de cargo y abono, las cuentas de activo:","o":["Aumentan por el Debe.","Disminuyen por el Haber.","Su saldo normal es deudor.","Aumentan por el Haber."],"c":[0,1,2],"e":"Las cuentas de activo nacen y aumentan por el Debe (cargo) y disminuyen por el Haber (abono); por eso su saldo habitual es deudor.","id":"x2_02"},{"t":2,"d":3,"ref":true,"q":"Las cuentas de pasivo y de patrimonio neto, según el convenio de cargo y abono:","o":["Aumentan por el Haber.","Disminuyen por el Debe.","Su saldo normal es acreedor.","Tienen siempre saldo deudor."],"c":[0,1,2],"e":"Pasivo y patrimonio neto nacen y aumentan por el Haber (abono) y disminuyen por el Debe (cargo); su saldo normal es acreedor.","id":"x2_03"},{"t":2,"d":3,"ref":true,"q":"Señale la afirmación o afirmaciones correctas sobre las cuentas:","o":["Se deben cargar por los incrementos que experimentan los elementos de activo y los gastos.","Se deben abonar por los incrementos que experimentan los elementos de pasivo y patrimonio neto.","Se recogen materialmente en el libro Diario.","Todas las cuentas tienen siempre saldo acreedor."],"c":[0,1],"e":"Los aumentos de activo y de gastos se cargan (Debe); los aumentos de pasivo, patrimonio neto e ingresos se abonan (Haber). Las cuentas se recogen en el libro Mayor, no en el Diario.","id":"x2_04"},{"t":2,"d":2,"ref":true,"q":"Las cuentas de gasto:","o":["Se cargan (nacen por el Debe) cuando se produce el gasto.","Reducen el resultado y, con ello, el patrimonio neto.","Se abonan cuando se produce el gasto.","Tienen saldo acreedor."],"c":[0,1],"e":"Los gastos se registran cargando su cuenta (Debe) y tienen saldo deudor; reducen el resultado del ejercicio y, por tanto, el patrimonio neto.","id":"x2_05"},{"t":2,"d":2,"ref":true,"q":"Las cuentas de ingreso:","o":["Se abonan (nacen por el Haber) cuando se produce el ingreso.","Aumentan el resultado y el patrimonio neto.","Se cargan cuando se produce el ingreso.","Figuran en el activo del balance."],"c":[0,1],"e":"Los ingresos se registran abonando su cuenta (Haber) y tienen saldo acreedor; aumentan el resultado y el patrimonio neto. No son elementos del activo.","id":"x2_06"},{"t":2,"d":3,"ref":true,"q":"El principio de la partida doble implica que:","o":["En todo asiento, la suma de los cargos es igual a la suma de los abonos (Debe = Haber).","Toda operación afecta al menos a dos elementos patrimoniales.","Cada operación se registra dos veces en el mismo lado.","El libro Mayor sustituye al libro Diario."],"c":[0,1],"e":"Por partida doble, cada hecho afecta al menos a dos elementos y en cada asiento el total del Debe coincide con el del Haber, manteniendo el equilibrio patrimonial.","id":"x2_07"},{"t":2,"d":2,"ref":true,"q":"El libro Diario:","o":["Registra las operaciones de la empresa mediante asientos.","Sigue un orden cronológico (día a día).","Recoge por separado los movimientos de cada cuenta.","Es el estado que muestra la situación patrimonial a fin de año."],"c":[0,1],"e":"El Diario recoge las operaciones cronológicamente en forma de asientos; es el Mayor el que agrupa los movimientos cuenta por cuenta, y el balance el que muestra la situación patrimonial.","id":"x2_08"},{"t":2,"d":2,"ref":true,"q":"El libro Mayor:","o":["Recoge, cuenta por cuenta, todos los cargos y abonos que la afectan.","Permite conocer el saldo de cada cuenta en todo momento.","Registra las operaciones por orden de fecha mediante asientos.","Es obligatorio legalizarlo según el Código de Comercio."],"c":[0,1],"e":"El Mayor traslada al detalle de cada cuenta los movimientos del Diario y permite conocer sus saldos. El registro cronológico es del Diario, y el Mayor no es un libro obligatorio.","id":"x2_09"},{"t":2,"d":3,"ref":true,"q":"Una cuenta presenta un total en el Debe de 8.000 € y en el Haber de 5.000 €:","o":["Su saldo es deudor.","El importe del saldo es de 3.000 €.","Su saldo es acreedor.","El importe del saldo es de 13.000 €."],"c":[0,1],"e":"El saldo es la diferencia entre Debe y Haber: 8.000 − 5.000 = 3.000 €. Como el Debe es mayor, el saldo es deudor.","id":"x2_10"},{"t":2,"d":3,"ref":true,"q":"Una cuenta tiene anotados 4.000 € en el Debe y 4.000 € en el Haber:","o":["Su saldo es cero.","Se dice que la cuenta está saldada.","Tiene saldo deudor de 4.000 €.","Tiene saldo acreedor de 8.000 €."],"c":[0,1],"e":"Cuando las sumas del Debe y del Haber coinciden, el saldo es nulo: la cuenta está saldada.","id":"x2_11"},{"t":2,"d":3,"ref":true,"q":"En el procedimiento especulativo de contabilización de las mercaderías:","o":["Las compras se registran en la cuenta Compras de mercaderías, por su precio de coste.","Las ventas se registran en la cuenta Ventas de mercaderías, por su precio de venta.","En cada venta se reconoce simultáneamente el coste de la mercancía vendida.","La cuenta Mercaderías registra cada entrada y salida de género durante el ejercicio."],"c":[0,1],"e":"En el especulativo, compras y ventas van a cuentas independientes (a coste y a precio de venta, respectivamente) y la cuenta Mercaderías no se mueve durante el ejercicio; reconocer el coste en cada venta es propio del procedimiento administrativo.","id":"x2_12"},{"t":2,"d":3,"ref":true,"q":"Cuando un cliente nos devuelve mercancías que le habíamos vendido (procedimiento especulativo):","o":["Se utiliza la cuenta Devoluciones de ventas de mercaderías.","Dicha cuenta se carga, porque reduce el ingreso por ventas.","Se abona la cuenta Compras de mercaderías.","Se abona la cuenta Rappels sobre ventas."],"c":[0,1],"e":"Las devoluciones de ventas se registran en su propia cuenta, que se carga (es un menor ingreso); no se tocan las compras ni los rappels.","id":"x2_13"},{"t":2,"d":2,"ref":true,"q":"Un rappel:","o":["Es un descuento por alcanzar un determinado volumen de compras o de ventas.","Es distinto del descuento por pronto pago.","Es un impuesto indirecto.","Es una devolución de mercancías defectuosas."],"c":[0,1],"e":"El rappel es un descuento por volumen de operaciones; no debe confundirse con el descuento por pronto pago (de naturaleza financiera) ni con las devoluciones.","id":"x2_14"},{"t":2,"d":3,"ref":true,"q":"El asiento contable:","o":["Está formado, como mínimo, por una cuenta que se carga y otra que se abona.","El total del Debe debe coincidir con el total del Haber.","Puede constar de una única anotación en el Debe.","Solo puede incluir cuentas de activo."],"c":[0,1],"e":"Todo asiento respeta la partida doble: al menos un cargo y un abono, con igualdad entre los totales del Debe y del Haber; puede incluir cuentas de cualquier naturaleza.","id":"x2_15"},{"t":2,"d":3,"ref":true,"q":"Al comprar mercaderías pagando una parte en efectivo y dejando el resto pendiente de pago:","o":["Se carga la cuenta Compras de mercaderías.","Se abona Caja o Bancos por la parte pagada.","Se abona Proveedores por la parte aplazada.","Se carga la cuenta Ventas de mercaderías."],"c":[0,1,2],"e":"La compra es un gasto: se carga Compras de mercaderías; y se abonan la salida de tesorería (Caja/Bancos) y el nacimiento de la deuda comercial (Proveedores).","id":"x2_16"},{"t":2,"d":2,"ref":true,"q":"El saldo de una cuenta:","o":["Es deudor cuando la suma del Debe supera a la del Haber.","Es acreedor cuando la suma del Haber supera a la del Debe.","En las cuentas de activo es normalmente deudor.","En las cuentas de activo es normalmente acreedor."],"c":[0,1,2],"e":"Saldo deudor: Debe > Haber; saldo acreedor: Haber > Debe. Las cuentas de activo, al nacer y aumentar por el Debe, presentan normalmente saldo deudor.","id":"x2_17"},{"t":2,"d":3,"ref":true,"q":"Según la teoría del cargo y el abono:","o":["Los aumentos de activo y los gastos se anotan en el Debe.","Los aumentos de pasivo, patrimonio neto e ingresos se anotan en el Haber.","Todos los aumentos se anotan siempre en el Debe.","Los ingresos se anotan en el Debe."],"c":[0,1],"e":"Regla básica: Debe → aumentos de activo y gastos; Haber → aumentos de pasivo, patrimonio neto e ingresos. No todos los aumentos van al mismo lado.","id":"x2_18"},{"t":2,"d":3,"ref":true,"q":"Una cuenta de Bancos c/c presenta cargos por 32.000 € y abonos por 12.000 €:","o":["Su saldo es deudor por 20.000 €.","Ese saldo deudor indica dinero disponible a favor de la empresa.","Su saldo es acreedor por 20.000 €.","Su saldo es deudor por 44.000 €."],"c":[0,1],"e":"32.000 − 12.000 = 20.000 € de saldo deudor; en Bancos c/c, el saldo deudor refleja los fondos disponibles en la cuenta corriente.","id":"x2_19"},{"t":3,"d":2,"ref":true,"q":"El ciclo contable comienza cada ejercicio con:","o":["El asiento de apertura.","El traslado al Diario de los saldos del balance de situación inicial.","El asiento de cierre.","La regularización de existencias."],"c":[0,1],"e":"El ciclo se inicia con el asiento de apertura, que traslada al Diario los saldos iniciales de las cuentas (los del balance de situación de partida); el cierre y la regularización van al final.","id":"x3_00"},{"t":3,"d":3,"ref":true,"q":"En el procedimiento especulativo desglosado, antes de regularizar:","o":["El saldo de la cuenta Mercaderías coincide con el valor de las existencias iniciales.","La cuenta Mercaderías no se ha movido durante el ejercicio.","El saldo de Mercaderías coincide con el valor de las existencias finales.","El saldo de Mercaderías refleja las ventas del ejercicio."],"c":[0,1],"e":"En el desglosado, compras y ventas van a sus propias cuentas: Mercaderías permanece inmóvil todo el ejercicio conservando las existencias iniciales, hasta la regularización.","id":"x3_01"},{"t":3,"d":3,"ref":true,"q":"La regularización de existencias de mercaderías (procedimiento especulativo desglosado):","o":["Da de baja las existencias iniciales.","Da de alta las existencias finales.","Su efecto neto es la variación de existencias, que ajusta el resultado.","Consiste en anotar todas las compras del ejercicio en la cuenta Mercaderías."],"c":[0,1,2],"e":"Se elimina la existencia inicial y se incorpora la final; la diferencia (variación de existencias) ajusta el resultado del ejercicio. Las compras nunca pasan por Mercaderías en este procedimiento.","id":"x3_02"},{"t":3,"d":3,"ref":true,"q":"La periodificación contable, al cierre del ejercicio:","o":["Imputa al resultado los ingresos y gastos devengados en el ejercicio.","Es una aplicación del principio de devengo.","Deja fuera del resultado los gastos e ingresos anticipados que corresponden a ejercicios futuros.","Imputa al resultado únicamente los importes efectivamente cobrados o pagados."],"c":[0,1,2],"e":"La periodificación ajusta ingresos y gastos anticipados o diferidos para que a cada ejercicio se impute lo devengado (principio de devengo), no lo cobrado o pagado.","id":"x3_03"},{"t":3,"d":3,"ref":true,"q":"Una empresa paga el 1 de octubre 3.000 € por el alquiler de un local de 6 meses (octubre a marzo) y cierra el 31 de diciembre:","o":["El gasto devengado del ejercicio es de 1.500 € (3 meses).","Los otros 1.500 € son un gasto anticipado que se imputará al ejercicio siguiente.","El gasto del ejercicio es de 3.000 €, por haberse pagado íntegramente.","No hay gasto en el ejercicio, por tratarse de un pago anticipado."],"c":[0,1],"e":"3.000 / 6 = 500 €/mes. Devengados 3 meses (octubre-diciembre) = 1.500 €; los otros 1.500 € se periodifican como gasto anticipado del ejercicio siguiente.","id":"x3_04"},{"t":3,"d":3,"ref":true,"q":"La amortización del inmovilizado:","o":["Refleja la depreciación sistemática por uso, paso del tiempo u obsolescencia.","Distribuye el valor amortizable como gasto a lo largo de la vida útil.","Supone un aumento de valor del inmovilizado.","Registra el pago de la deuda contraída para comprarlo."],"c":[0,1],"e":"La amortización reparte como gasto de cada ejercicio la pérdida de valor sistemática del inmovilizado durante su vida útil; no aumenta su valor ni guarda relación con pagar deudas.","id":"x3_05"},{"t":3,"d":3,"ref":true,"q":"Un inmovilizado se adquiere el 01/07 del ejercicio por 8.000 €, sin valor residual, con vida útil de 6 años y amortización lineal. En el primer ejercicio:","o":["La cuota anual completa sería de 1.333,33 € (8.000 / 6).","La cuota del ejercicio es de 666,67 €, por corresponder solo a medio año.","La cuota del ejercicio es de 1.333,33 €.","No se amortiza nada el primer año."],"c":[0,1],"e":"Cuota anual = 8.000/6 = 1.333,33 €. Como el bien se usa desde el 1/07 (medio año): 1.333,33 × 6/12 = 666,67 €.","id":"x3_06"},{"t":3,"d":3,"ref":true,"q":"El deterioro de valor de los clientes de dudoso cobro:","o":["Supone reconocer un gasto por deterioro.","Supone reconocer una corrección de valor que minora el saldo de clientes.","Aumenta la cuenta de Ventas.","Se registra como un ingreso financiero."],"c":[0,1],"e":"Ante el riesgo de impago se dota el deterioro: un gasto y una cuenta correctora que reduce el valor de los derechos de cobro. No afecta a las ventas ni genera ingresos.","id":"x3_07"},{"t":3,"d":3,"ref":true,"q":"El asiento de regularización (o de determinación del resultado):","o":["Salda las cuentas de gastos e ingresos.","Traslada su diferencia a la cuenta de Resultado del ejercicio.","Recoge las existencias iniciales.","Abre las cuentas del ejercicio siguiente."],"c":[0,1],"e":"En la regularización se cancelan las cuentas de gastos e ingresos y su saldo neto (el resultado) se lleva a la cuenta de Resultado del ejercicio (Pérdidas y ganancias).","id":"x3_08"},{"t":3,"d":3,"ref":true,"q":"Si en un ejercicio los ingresos ascienden a 110.000 € y los gastos a 95.000 €:","o":["El resultado es un beneficio.","El importe del resultado es de 15.000 €.","El resultado es una pérdida de 15.000 €.","El resultado asciende a 205.000 €."],"c":[0,1],"e":"Resultado = Ingresos − Gastos = 110.000 − 95.000 = +15.000 €: beneficio de 15.000 €.","id":"x3_09"},{"t":3,"d":3,"ref":true,"q":"El balance de comprobación de sumas y saldos:","o":["Verifica que las sumas del Debe y del Haber coinciden.","Verifica que los saldos deudores igualan a los saldos acreedores.","Detecta descuadres, pero no garantiza la ausencia de todo error.","Determina el reparto de dividendos."],"c":[0,1,2],"e":"Comprueba la igualdad de sumas y de saldos derivada de la partida doble; detecta descuadres aritméticos, aunque no todos los errores (p. ej. un asiento en una cuenta equivocada).","id":"x3_10"},{"t":3,"d":2,"ref":true,"q":"El asiento de cierre:","o":["Salda todas las cuentas de balance.","Abona las cuentas de activo (que tienen saldo deudor).","Carga las cuentas de pasivo y patrimonio neto (que tienen saldo acreedor).","Abre las cuentas de gasto e ingreso."],"c":[0,1,2],"e":"El cierre cancela los saldos de las cuentas patrimoniales: se abonan las de activo y se cargan las de pasivo y neto. Las cuentas de gestión ya quedaron saldadas en la regularización.","id":"x3_11"},{"t":3,"d":3,"ref":true,"q":"La cuenta de pérdidas y ganancias (estado de resultados):","o":["Recoge los ingresos que corresponden a un periodo y los gastos necesarios para su obtención.","Su saldo es el resultado del ejercicio.","Muestra los cobros y pagos realizados durante el ejercicio.","Muestra la situación patrimonial en un momento determinado."],"c":[0,1],"e":"La PyG recoge ingresos y gastos del periodo y su diferencia es el resultado. Los cobros/pagos los muestra el estado de flujos de efectivo y la situación patrimonial, el balance.","id":"x3_12"},{"t":3,"d":3,"ref":true,"q":"En el procedimiento especulativo desglosado, el consumo de mercaderías (coste de las ventas):","o":["Se calcula como Existencias iniciales + Compras − Existencias finales.","Representa la mercancía que ha salido del almacén durante el ejercicio.","Se calcula como Ventas − Compras.","Se calcula como Compras + Ventas."],"c":[0,1],"e":"Consumo = existencias iniciales + compras netas − existencias finales: es el coste de la mercancía vendida (la que ha salido del almacén).","id":"x3_13"},{"t":3,"d":3,"ref":true,"q":"Si al cierre del ejercicio hay intereses de un préstamo devengados y pendientes de pago:","o":["Se reconoce el gasto financiero devengado.","Se reconoce una deuda por los intereses a pagar.","No se contabiliza nada hasta que se paguen.","Se registran como un ingreso financiero."],"c":[0,1],"e":"Por devengo, los intereses del periodo son gasto del ejercicio aunque no se hayan pagado: se reconoce el gasto financiero y el pasivo (intereses a pagar).","id":"x3_14"},{"t":3,"d":3,"ref":true,"q":"Un préstamo de 6.000 € con un interés del 6% anual, pagadero por trimestres vencidos:","o":["Devenga 90 € de intereses por trimestre.","Devenga 360 € de intereses en un año completo.","Devenga 180 € de intereses por trimestre.","Devenga 36 € de intereses por trimestre."],"c":[0,1],"e":"Interés anual = 6.000 × 6% = 360 €; por un trimestre: 360 × 3/12 = 90 €.","id":"x3_15"},{"t":3,"d":3,"ref":true,"q":"El resultado del ejercicio, una vez determinado:","o":["Figura en el balance dentro del patrimonio neto.","Forma parte de los fondos propios.","Figura en el activo corriente.","Figura en el pasivo no corriente."],"c":[0,1],"e":"El resultado (beneficio o pérdida) se integra en los fondos propios, dentro del patrimonio neto del balance.","id":"x3_16"},{"t":3,"d":3,"ref":true,"q":"Sobre las fases del ciclo contable:","o":["Los ajustes de fin de ejercicio se realizan tras registrar las operaciones del ejercicio.","Entre los ajustes están la periodificación, la amortización, los deterioros y la regularización de existencias.","Tras los ajustes se calcula el resultado y se realiza el asiento de cierre.","El cierre se realiza antes que la apertura."],"c":[0,1,2],"e":"Orden del ciclo: apertura → registro de operaciones → ajustes de cierre (periodificación, amortización, deterioros, existencias) → cálculo del resultado → cierre → cuentas anuales.","id":"x3_17"},{"t":3,"d":2,"ref":true,"q":"El balance de situación:","o":["Refleja el patrimonio (activo, pasivo y patrimonio neto) en una fecha determinada.","Es un documento estático.","Recoge los ingresos y gastos de un periodo.","Recoge los cobros y pagos del ejercicio."],"c":[0,1],"e":"El balance es estático: muestra la situación patrimonial y financiera a una fecha concreta. Los ingresos y gastos van a la PyG (documento dinámico) y los cobros/pagos, al EFE.","id":"x3_18"},{"t":3,"d":3,"ref":true,"q":"Una empresa firma el 1 de noviembre un contrato de prestación de servicios por 3.000 €, que prestará durante 6 meses. A 31 de diciembre:","o":["El ingreso devengado del ejercicio es de 1.000 € (2 meses).","Los 2.000 € restantes corresponden al ejercicio siguiente (ingreso anticipado).","El ingreso del ejercicio es de 3.000 €, todo el importe del contrato.","No hay ingreso devengado porque el servicio aún no ha finalizado."],"c":[0,1],"e":"3.000 / 6 = 500 €/mes. Devengados 2 meses (noviembre-diciembre) = 1.000 €; el resto se periodifica. Es el planteamiento de la incógnita «Prestaciones de servicios» del CASO 2 del examen.","id":"x3_19"},{"t":4,"d":2,"ref":true,"q":"En relación con el Plan General de Contabilidad vigente en España:","o":["Fue aprobado en 2007 (Real Decreto 1514/2007).","Sustituyó al PGC de 1990.","Fue aprobado en 1973.","Fue aprobado en 2021."],"c":[0,1],"e":"El PGC vigente se aprobó por el RD 1514/2007 (aplicable desde el 1-1-2008) y sustituyó al plan de 1990; está adaptado a las NIIF acordadas por la UE.","id":"x4_00"},{"t":4,"d":3,"ref":true,"q":"Señale la afirmación o afirmaciones correctas:","o":["El balance de situación clasifica las cuentas por actividades de explotación, inversión y financiación.","El modelo de cuenta de pérdidas y ganancias del PGC de 2007 distingue varios tipos de resultados.","La memoria complementa, amplía y comenta la información contenida en los demás documentos de las cuentas anuales.","La memoria es una cuenta anual principalmente de carácter cuantitativo."],"c":[1,2],"e":"La PyG del PGC distingue resultado de explotación, financiero, antes de impuestos y del ejercicio; la memoria completa y comenta el resto de estados. Clasificar por explotación/inversión/financiación es propio del estado de flujos de efectivo, no del balance; y la memoria es cualitativa, no cuantitativa.","id":"x4_01"},{"t":4,"d":3,"ref":true,"q":"Las cuentas anuales, según el PGC, comprenden:","o":["El balance y la cuenta de pérdidas y ganancias.","El estado de cambios en el patrimonio neto y el estado de flujos de efectivo.","La memoria.","El libro Diario y el libro Mayor."],"c":[0,1,2],"e":"Las cuentas anuales son cinco documentos: balance, PyG, ECPN, EFE y memoria. Los libros Diario y Mayor son instrumentos de registro, no cuentas anuales.","id":"x4_02"},{"t":4,"d":3,"ref":true,"q":"En España, de acuerdo con la legislación mercantil (Código de Comercio), señale lo correcto:","o":["Los libros de contabilidad obligatorios deben legalizarse.","Las cuentas anuales de las sociedades mercantiles deben depositarse en el Registro Mercantil.","El libro Mayor es un libro contable obligatorio.","Todas las empresas están obligadas a auditar sus cuentas anuales."],"c":[0,1],"e":"Son obligatorios el libro Diario y el de Inventarios y Cuentas Anuales, que deben legalizarse; las sociedades depositan sus cuentas en el Registro Mercantil. El Mayor no es obligatorio y la auditoría solo es exigible al superar ciertos límites.","id":"x4_03"},{"t":4,"d":2,"ref":true,"q":"La memoria, dentro de las cuentas anuales:","o":["Completa, amplía y comenta la información de los otros estados contables.","Es un documento fundamentalmente narrativo (cualitativo).","Sustituye al balance de situación.","Recoge únicamente cifras, sin ninguna explicación."],"c":[0,1],"e":"La memoria amplía y aclara la información del resto de cuentas anuales; es principalmente cualitativa y no sustituye a ningún otro documento.","id":"x4_04"},{"t":4,"d":3,"ref":true,"q":"El marco conceptual del PGC recoge, entre otros elementos:","o":["Los principios contables.","Los criterios de registro y de valoración.","Las definiciones de los elementos de las cuentas anuales.","El tipo de gravamen del Impuesto sobre Sociedades."],"c":[0,1,2],"e":"El marco conceptual incluye: cuentas anuales/imagen fiel, requisitos de la información, principios contables, elementos de las cuentas anuales y criterios de registro y de valoración. Lo fiscal no forma parte del PGC.","id":"x4_05"},{"t":4,"d":3,"ref":true,"q":"Cuando existe conflicto entre principios contables:","o":["Prevalece el que mejor conduzca a que las cuentas anuales expresen la imagen fiel.","La imagen fiel es el objetivo último de las cuentas anuales.","Prevalece el principio de prudencia en todo caso.","La empresa elige libremente, sin ningún criterio."],"c":[0,1],"e":"Ante un conflicto de principios prevalece el que mejor conduzca a la imagen fiel del patrimonio, de la situación financiera y de los resultados.","id":"x4_06"},{"t":4,"d":3,"ref":true,"q":"El principio de empresa en funcionamiento:","o":["Presume que la gestión de la empresa continuará en un futuro previsible.","Implica que los activos y pasivos no se valoran a su valor de liquidación.","Supone que la empresa va a liquidarse a corto plazo.","Impide aplicar criterios de valoración."],"c":[0,1],"e":"Se presume la continuidad de la actividad, salvo prueba en contrario; por eso no se aplican valores de liquidación en la valoración de activos y pasivos.","id":"x4_07"},{"t":4,"d":3,"ref":true,"q":"El principio de prudencia:","o":["Exige ser prudente en las estimaciones y valoraciones en condiciones de incertidumbre.","No justifica que la valoración no responda a la imagen fiel (p. ej. infravalorar deliberadamente).","Permite registrar beneficios no realizados.","Permite sobrevalorar el activo para dar mejor imagen."],"c":[0,1],"e":"La prudencia exige cautela en las estimaciones bajo incertidumbre, pero sin amparar infravaloraciones deliberadas ni el registro de beneficios no realizados.","id":"x4_08"},{"t":4,"d":2,"ref":true,"q":"El Instituto de Contabilidad y Auditoría de Cuentas (ICAC):","o":["Es el organismo encargado en España de la elaboración y desarrollo de la normativa contable.","Emite resoluciones y adaptaciones sectoriales que desarrollan el PGC.","Es el organismo que recauda los impuestos.","Es quien emite las NIIF internacionales."],"c":[0,1],"e":"El ICAC elabora y desarrolla la normativa contable española (planes, adaptaciones, resoluciones). La recaudación es de la Agencia Tributaria y las NIIF las emite el IASB.","id":"x4_09"},{"t":4,"d":3,"ref":true,"q":"Las Normas Internacionales de Información Financiera (NIIF/NIC):","o":["Son emitidas por el IASB (International Accounting Standards Board).","La Unión Europea las adopta mediante reglamentos.","Son emitidas por el ICAC.","Son emitidas por el Registro Mercantil."],"c":[0,1],"e":"El IASB emite las NIC/NIIF y la UE las adopta mediante reglamentos, haciéndolas obligatorias para las cuentas consolidadas de los grupos cotizados.","id":"x4_10"},{"t":4,"d":3,"ref":true,"q":"Los grupos de sociedades cotizadas en un mercado regulado de la UE:","o":["Formulan sus cuentas consolidadas conforme a las NIIF adoptadas por la UE.","En sus cuentas individuales aplican la normativa nacional (el PGC, en España).","Aplican las normas fiscales del Impuesto sobre Sociedades en la consolidación.","No están obligados a consolidar."],"c":[0,1],"e":"Desde 2005 los grupos cotizados de la UE consolidan con NIIF-UE; las cuentas individuales de cada sociedad siguen la normativa nacional (PGC).","id":"x4_11"},{"t":4,"d":3,"ref":true,"q":"El coste histórico:","o":["De un activo comprado es su precio de adquisición.","De un activo fabricado por la empresa es su coste de producción.","Es el criterio general de valoración inicial.","Es el valor de mercado del activo en cada fecha de cierre."],"c":[0,1,2],"e":"Coste histórico = precio de adquisición (compras) o coste de producción (fabricación propia); es el criterio general de valoración inicial. El valor de mercado a cierre define otros criterios (valor razonable).","id":"x4_12"},{"t":4,"d":3,"ref":true,"q":"El valor razonable:","o":["Es el importe por el que puede intercambiarse un activo o liquidarse un pasivo entre partes interesadas, informadas y en condiciones de independencia mutua.","Se calcula, siempre que sea posible, por referencia a un valor de mercado fiable (p. ej. la Bolsa).","Es el precio que se pagó en su día por el activo.","Lo decide unilateralmente la empresa."],"c":[0,1],"e":"El valor razonable es un valor de intercambio entre partes independientes e informadas, calculado con referencia a un mercado fiable; el precio pagado en su día es el coste histórico.","id":"x4_13"},{"t":4,"d":2,"ref":true,"q":"La normalización contable persigue:","o":["Homogeneizar la información contable.","Que la información sea comparable entre empresas y periodos.","Que la información sea comprensible por sus usuarios.","Aumentar la recaudación fiscal."],"c":[0,1,2],"e":"La normalización establece criterios comunes para que la información contable sea homogénea, comparable y comprensible; no tiene finalidad recaudatoria.","id":"x4_14"},{"t":4,"d":3,"ref":true,"q":"El estado de flujos de efectivo (EFE):","o":["Informa sobre los cobros y pagos del ejercicio.","Clasifica los flujos en actividades de explotación, de inversión y de financiación.","Muestra la situación patrimonial a una fecha.","Detalla las políticas contables aplicadas."],"c":[0,1],"e":"El EFE muestra el origen y la utilización de la tesorería, clasificando los flujos por actividades (explotación, inversión y financiación). La situación patrimonial es del balance y las políticas contables, de la memoria.","id":"x4_15"},{"t":4,"d":3,"ref":true,"q":"El estado de cambios en el patrimonio neto (ECPN):","o":["Informa de las variaciones habidas en el patrimonio neto durante el ejercicio.","Recoge, entre otras, las operaciones con los socios y el resultado del ejercicio.","Detalla los cobros y pagos del periodo.","Sustituye a la cuenta de pérdidas y ganancias."],"c":[0,1],"e":"El ECPN recoge todos los movimientos del patrimonio neto: resultado, ingresos y gastos imputados directamente a patrimonio y operaciones con socios. No sustituye a la PyG ni detalla la tesorería.","id":"x4_16"},{"t":4,"d":3,"ref":true,"q":"En cuanto a la obligatoriedad de las partes del PGC:","o":["El marco conceptual y las normas de registro y valoración son de aplicación obligatoria.","Las normas de elaboración de las cuentas anuales (3ª parte) son obligatorias.","El cuadro de cuentas no es de aplicación obligatoria en su codificación y denominación.","El cuadro de cuentas es obligatorio en todos sus dígitos y no admite adaptación."],"c":[0,1,2],"e":"Son obligatorias las tres primeras partes (marco conceptual, normas de registro y valoración y cuentas anuales); el cuadro de cuentas y las definiciones y relaciones contables son, en general, de aplicación voluntaria.","id":"x4_17"},{"t":4,"d":2,"ref":true,"q":"El principio de devengo, recogido en el marco conceptual del PGC:","o":["Los efectos de las transacciones se registran cuando ocurren.","Los ingresos y gastos se imputan al ejercicio al que se refieren.","La imputación es independiente de la fecha de su cobro o pago.","Implica registrar las operaciones solo cuando se cobran o se pagan."],"c":[0,1,2],"e":"El devengo registra los hechos cuando ocurren e imputa ingresos y gastos al ejercicio al que corresponden según la corriente real, no según los flujos de tesorería.","id":"x4_18"},{"t":4,"d":3,"ref":true,"q":"Las pequeñas y medianas empresas que cumplen los límites establecidos:","o":["Pueden aplicar el PGC de Pymes.","Pueden formular balance, estado de cambios en el patrimonio neto y memoria en modelos abreviados.","Quedan exentas de elaborar el estado de flujos de efectivo.","Están obligadas a aplicar las NIIF completas."],"c":[0,1,2],"e":"Las pymes que no superan los límites pueden aplicar el PGC de Pymes y modelos abreviados, y no están obligadas a elaborar el EFE. Las NIIF completas solo obligan a los grupos cotizados en sus consolidadas.","id":"x4_19"},{"t":3,"d":3,"ref":true,"q":"La periodificación contable se realiza para que en el resultado del ejercicio se contabilicen:","o":["Los consumos realizados durante el ejercicio.","Los gastos pagados por anticipado.","Los ingresos de acuerdo con el principio de devengo.","Los servicios cobrados por anticipado."],"c":[0,2],"e":"Por devengo, al resultado van los consumos (gastos devengados) y los ingresos devengados del ejercicio. Los gastos pagados por anticipado y los servicios cobrados por anticipado corresponden a ejercicios futuros: la periodificación precisamente los saca del resultado. (Pregunta 15 de tu examen de recuperación.)","id":"lr_15"},{"t":3,"d":3,"ref":true,"q":"Al final del ejercicio, antes de regularizar la cuenta de mercaderías llevada por un procedimiento especulativo desglosado, el saldo de la cuenta de mercaderías:","o":["Siempre coincidirá con el valor de las existencias finales.","Siempre coincidirá con el valor de las existencias iniciales.","Será acreedor, si las ventas han sido superiores a las compras.","Será nulo si la empresa ha iniciado en ese ejercicio su actividad."],"c":[1,3],"e":"En el especulativo desglosado la cuenta Mercaderías no se mueve durante el ejercicio: conserva las existencias iniciales hasta la regularización; por eso, si la empresa inició su actividad ese año (sin existencias iniciales), su saldo es nulo. Compras y ventas van a sus propias cuentas, así que nunca queda acreedor por vender más. (Pregunta 16 de tu examen de recuperación.)","id":"lr_16"},{"t":2,"d":3,"ref":true,"q":"Las cuentas:","o":["Se deben cargar por los incrementos que experimentan los elementos de activo y los gastos.","Se pueden llevar por un procedimiento administrativo o especulativo.","Se deben abonar por los incrementos que experimentan los elementos de pasivo y patrimonio neto.","Se recogen materialmente en el libro diario."],"c":[0,1,2],"e":"Convenio de cargo y abono: Debe → aumentos de activo y gastos; Haber → aumentos de pasivo, patrimonio neto e ingresos. Las cuentas cuyo precio de entrada difiere del de salida (como las mercaderías) pueden llevarse por procedimiento administrativo o especulativo. Materialmente las cuentas se recogen en el libro MAYOR, no en el Diario. (Pregunta 17 de tu examen de recuperación.)","id":"lr_17"},{"t":2,"d":3,"ref":true,"q":"La cuenta de pérdidas y ganancias o estado de resultados nos permite conocer:","o":["Los ingresos que corresponden a un periodo y los gastos necesarios para su obtención.","La variación de riqueza entre dos ejercicios.","Los cobros y los pagos que se han realizado durante el ejercicio.","La situación patrimonial de la empresa en un momento determinado."],"c":[0,1],"e":"La PyG recoge los ingresos del periodo y los gastos correlacionados con ellos; su saldo (el resultado) equivale a la variación de riqueza (patrimonio neto) generada entre el inicio y el cierre, si no hay operaciones con los socios. Los cobros y pagos los muestra el estado de flujos de efectivo, y la situación patrimonial, el balance. (Pregunta 18 de tu examen de recuperación.)","id":"lr_18"},{"t":4,"d":3,"ref":true,"q":"En España, de acuerdo con la legislación mercantil:","o":["Los libros de contabilidad obligatorios deben legalizarse.","Son obligatorios el libro Diario, el libro Mayor y el libro de Inventarios y Cuentas Anuales.","Todas las empresas tienen que auditar sus cuentas anuales.","Las cuentas anuales deben depositarse en el Registro Mercantil."],"c":[0,3],"e":"Los libros obligatorios (Diario e Inventarios y Cuentas Anuales) se legalizan en el Registro Mercantil, donde también se depositan las cuentas anuales. El Mayor NO es obligatorio, y la auditoría solo es exigible a las empresas que superan ciertos límites. (Pregunta 19 de tu examen de recuperación.)","id":"lr_19"},{"t":4,"d":3,"ref":true,"q":"Señale la/s afirmación/es correcta/s:","o":["El balance de situación clasifica las cuentas por actividades de explotación, inversión y financiación.","El modelo de cuenta de pérdidas y ganancias del Plan General de Contabilidad de 2007 distingue varios tipos de resultados.","La memoria es una cuenta anual principalmente de carácter cuantitativo.","La memoria complementa y completa la información de otros estados contables."],"c":[1,3],"e":"La PyG del PGC 2007 distingue resultado de explotación, financiero, antes de impuestos y del ejercicio; y la memoria completa y comenta los demás estados (es principalmente cualitativa). Clasificar por actividades de explotación/inversión/financiación es propio del estado de flujos de efectivo, no del balance. (Pregunta 20 de tu examen de recuperación.)","id":"lr_20"},{"t":3,"d":3,"ref":true,"q":"En el asiento para el cálculo del resultado se registran:","o":["Las pérdidas ciertas.","La amortización del inmovilizado material.","Los cobros por prestaciones de servicio realizados durante el ejercicio económico.","Los servicios prestados durante el ejercicio económico."],"c":[0,1,3],"e":"En la regularización se traspasan a Resultado del ejercicio TODOS los gastos (pérdidas ciertas, amortización…) y TODOS los ingresos devengados (los servicios prestados). Los cobros no son ingresos: son corriente financiera y no pasan por el resultado. (Pregunta 1 del examen ordinario de mayo de 2024.)","id":"lo_01"},{"t":3,"d":3,"ref":true,"q":"El inventario sirve para:","o":["Poner de manifiesto posibles desviaciones entre el recuento físico de los elementos patrimoniales y el balance.","Conocer el valor real de los elementos patrimoniales.","Conocer el patrimonio de la empresa en un momento determinado.","Conocer de modo detallado y desglosado los bienes, derechos y obligaciones de la empresa."],"c":[0,1,2,3],"e":"Las cuatro son correctas: el inventario es la relación detallada y valorada del patrimonio (bienes, derechos y obligaciones) en un momento determinado; exige recuento físico, lo que permite conocer el valor real de los elementos y detectar desviaciones respecto a los registros contables. (Pregunta 2 del examen ordinario de mayo de 2024.)","id":"lo_02"},{"t":3,"d":3,"ref":true,"q":"En relación con los sistemas no financieros para el cálculo de la amortización:","o":["Tratan de recuperar al final de su vida útil el valor del inmovilizado.","Tratan de medir el deterioro económico, técnico y/o funcional del inmovilizado.","Sirven para calcular la cuota de amortización del ejercicio.","Tienen en cuenta el rendimiento financiero de la inversión de las cuotas de amortización."],"c":[0,1,2],"e":"Los sistemas no financieros (lineal, números dígitos, tanto fijo, nivel de actividad…) reparten el valor amortizable para recuperar la inversión al final de la vida útil, midiendo la depreciación y calculando la cuota de cada ejercicio. Lo que NO consideran es el rendimiento de invertir esas cuotas: eso es propio de los sistemas financieros. (Pregunta 3 del examen ordinario de mayo de 2024.)","id":"lo_03"},{"t":3,"d":3,"ref":true,"q":"La periodificación de ingresos y gastos se realiza:","o":["Por la aplicación del principio de devengo.","Para determinar los gastos pagados e ingresos cobrados durante el ejercicio.","Para que no aparezcan cuentas de gastos e ingresos en el balance.","Para determinar las cantidades de ingresos y gastos que corresponden al ejercicio."],"c":[0,3],"e":"La periodificación es la aplicación del principio de devengo: ajusta los gastos e ingresos registrados para que al resultado vayan exactamente los que corresponden al ejercicio, con independencia de sus cobros y pagos. (Pregunta 4 del examen ordinario de mayo de 2024.)","id":"lo_04"},{"t":4,"d":3,"ref":true,"q":"En relación con el modelo de Balance del Plan General de Contabilidad:","o":["Las cuentas deben aparecer, en su caso, netas de la amortización acumulada.","No pueden aparecer elementos patrimoniales en negativo.","No pueden aparecer cuentas de ingresos y gastos.","Recoge las variaciones patrimoniales producidas entre dos ejercicios consecutivos."],"c":[0,2],"e":"En el modelo oficial de balance el inmovilizado figura por su valor neto (deducidas amortizaciones y deterioros) y no hay cuentas de gastos e ingresos (van a la PyG). SÍ pueden aparecer partidas en negativo (p. ej. resultados negativos de ejercicios anteriores), y el balance es estático: muestra la situación a una fecha, no variaciones entre ejercicios. (Pregunta 5 del examen ordinario de mayo de 2024.)","id":"lo_05"},{"t":4,"d":3,"ref":true,"q":"En relación con los requisitos legales de la contabilidad en España para una sociedad anónima:","o":["Las cuentas anuales tienen siempre que estar auditadas.","Los libros obligatorios tienen que legalizarse.","Las cuentas anuales tienen que depositarse en el Registro Mercantil.","Las cuentas anuales tienen que ser aprobadas por la Junta General de Accionistas."],"c":[1,2,3],"e":"Los libros obligatorios se legalizan, y las cuentas anuales se aprueban en Junta General (en 6 meses desde el cierre) y se depositan en el Registro Mercantil. La auditoría NO es siempre obligatoria: solo para las empresas que superan determinados límites. (Pregunta 6 del examen ordinario de mayo de 2024.)","id":"lo_06"},{"t":4,"d":3,"ref":true,"q":"En relación con otra información que las empresas elaboran:","o":["El informe de gestión es obligatorio para las empresas que presentan balance normal.","El informe de auditoría es obligatorio para las empresas que presentan balance normal.","La información previsional no es obligatorio divulgarla para las empresas.","La contabilidad de costes o contabilidad interna no es obligatorio divulgarla para las empresas."],"c":[0,1,2,3],"e":"Las cuatro son correctas: quien presenta balance normal debe elaborar informe de gestión y someter sus cuentas a auditoría; en cambio, la información previsional y la contabilidad de costes son de uso interno y no existe obligación de divulgarlas. (Pregunta 7 del examen ordinario de mayo de 2024.)","id":"lo_07"},{"t":4,"d":3,"ref":true,"q":"Señale la/s afirmación/es correcta/s:","o":["El Balance clasifica los flujos de efectivo por actividades de explotación, inversión y financiación.","La Memoria complementa la información de otros estados contables.","La Cuenta de Pérdidas y Ganancias distingue varios tipos de resultados.","La Memoria es un estado contable principalmente de carácter cuantitativo."],"c":[1,2],"e":"La memoria amplía y comenta el resto de estados (y es principalmente cualitativa, no cuantitativa) y la PyG distingue resultado de explotación, financiero, antes de impuestos y del ejercicio. Clasificar los flujos de efectivo por actividades es función del EFE, no del balance. (Pregunta 8 del examen ordinario de mayo de 2024.)","id":"lo_08"},{"t":4,"d":3,"ref":true,"q":"El cuadro de cuentas del Plan General de Contabilidad de 2007:","o":["Recoge las normas de elaboración de las cuentas anuales.","Describe los motivos más comunes de cargo y abono de las cuentas.","En España es de aplicación obligatoria.","Recoge las cuentas que se podrían utilizar para reflejar las problemáticas contables."],"c":[3],"e":"El cuadro de cuentas (4ª parte del PGC) es la relación de cuentas que se PODRÍAN utilizar, y no es de aplicación obligatoria. Las normas de elaboración están en la 3ª parte (cuentas anuales) y los motivos de cargo y abono, en la 5ª (definiciones y relaciones contables). (Pregunta 9 del examen ordinario de mayo de 2024.)","id":"lo_09"},{"t":4,"d":3,"ref":true,"q":"Entre las partes del Plan General de Contabilidad de 2007 se incluyen:","o":["Los principios contables.","Las definiciones y relaciones contables.","Los requisitos de la información financiera.","Los criterios de registro y reconocimiento contable."],"c":[1],"e":"Las cinco PARTES del PGC son: marco conceptual, normas de registro y valoración, cuentas anuales, cuadro de cuentas y definiciones y relaciones contables. Los principios contables, los requisitos de la información y los criterios de registro no son partes: son componentes DEL marco conceptual. (Pregunta 10 del examen ordinario de mayo de 2024.)","id":"lo_10"}],"tests":{"1":[["q1_00","q1_01","q1_02","q1_03","q1_04","q1_05","q1_06","q1_07","q1_08","q1_09","q1_10"],["q1_11","q1_12","q1_13","q1_14","q1_15","q1_16","q1_17","q1_18","q1_19","q1_20"],["q1_21","q1_22","q1_23","q1_24","q1_25","q1_26","q1_27","q1_28","q1_29","q1_30"],["q1_31","q1_32","q1_33","q1_34","q1_35","q1_36","q1_37","q1_38","q1_39","q1_40"],["q1_41","q1_42","q1_43","q1_44","q1_45","q1_46","q1_47","q1_48","q1_49","q1_50"],["h1_00","h1_01","h1_02","h1_03","h1_04","h1_05","h1_06","h1_07","h1_08","h1_09"],["h1_10","h1_11","h1_12","h1_13","h1_14","h1_15","h1_16","h1_17","h /* ================== SINCRONIZACIÓN ENTRE DISPOSITIVOS ==================
   Guarda el progreso en un repositorio PRIVADO de GitHub (progress.json).
   Cada dispositivo funciona 100% offline y, cuando hay conexión, sube sus
   cambios y baja los del resto fusionándolos (no se pisa el progreso). */
function b64e(str){ return btoa(unescape(encodeURIComponent(str))); }
function b64d(str){ return decodeURIComponent(escape(atob(String(str).replace(/\s/g,"")))); }
// Serialización canónica (claves ordenadas) para comparar estados sin falsos "distinto"
function stableStr(x){
  if(x===undefined) return "null";
  if(x===null || typeof x!=="object") return JSON.stringify(x);
  if(Array.isArray(x)) return "["+x.map(stableStr).join(",")+"]";
  return "{"+Object.keys(x).filter(k=>x[k]!==undefined).sort().map(k=>JSON.stringify(k)+":"+stableStr(x[k])).join(",")+"}";
}
function progData(){ return {tests:S.tests,seen:S.seen,pool:S.pool,tt:S.tt,cfg:S.cfg,pr:S.pr,slowIdx:S.slowIdx,resetAt:S.resetAt||0}; }

// Fusión de dos progresos. aAt/bAt = cuándo se modificó cada uno por última vez.
// Contadores → máximo de ambos; historial → unión; lo que es "estado actual"
// (fallos pendientes, config, cursor de Lentas) → gana el lado más reciente.
// Si uno hizo "Borrar todo" más tarde que el otro, ese lado gana entero.
function mergeProg(a, aAt, b, bAt){
  const cp = x => JSON.parse(JSON.stringify(x));
  if((a.resetAt||0)!==(b.resetAt||0)) return cp((a.resetAt||0)>(b.resetAt||0)? a : b);
  const newer = aAt>=bAt? a : b;
  const out = {resetAt:a.resetAt||0};
  out.seen={};
  const sa=a.seen||{}, sb=b.seen||{};
  for(const id of new Set([...Object.keys(sa),...Object.keys(sb)])){
    const x=sa[id], y=sb[id];
    if(!x||!y){ out.seen[id]=cp(x||y); continue; }
    out.seen[id]={a:Math.max(x.a||0,y.a||0), f:Math.max(x.f||0,y.f||0), ok:((newer.seen||{})[id]||x).ok, ts:Math.max(x.ts||0,y.ts||0)};
  }
  out.pool = cp(newer.pool||[]);
  const seenTs=new Set(); out.tests=[];
  for(const t of [...(a.tests||[]),...(b.tests||[])]){ if(!t||seenTs.has(t.ts)) continue; seenTs.add(t.ts); out.tests.push(cp(t)); }
  out.tests.sort((x,y)=>(y.ts||0)-(x.ts||0));
  if(out.tests.length>60) out.tests.length=60;
  out.tt={};
  const ta=a.tt||{}, tb=b.tt||{};
  for(const k of new Set([...Object.keys(ta),...Object.keys(tb)])){
    const x=ta[k], y=tb[k];
    if(!x||!y){ out.tt[k]=cp(x||y); continue; }
    out.tt[k]={n:Math.max(x.n||0,y.n||0), best:Math.max(x.best||0,y.best||0), last:((newer.tt||{})[k]||x).last};
  }
  out.pr={};
  const pa=a.pr||{}, pb=b.pr||{};
  for(const k of new Set([...Object.keys(pa),...Object.keys(pb)])){
    const x=pa[k], y=pb[k];
    out.pr[k]=cp(!x? y : !y? x : ((y.score||0)>(x.score||0)? y : x));
  }
  out.cfg = cp(newer.cfg || a.cfg || b.cfg || {});
  out.slowIdx = newer.slowIdx||0;
  return out;
}

const SY = {
  cfg:null, syncing:false, applying:false, timer:null,
  load(){ try{ const r=localStorage.getItem("contabSync.v1"); if(r){ const c=JSON.parse(r); if(c && c.t && c.r) this.cfg=c; } }catch(e){} },
  persist(){ if(this.cfg){ try{ localStorage.setItem("contabSync.v1", JSON.stringify(this.cfg)); }catch(e){} } },
  touch(){
    if(!this.cfg || this.applying) return;
    this.cfg.dirty=true; this.cfg.mAt=Date.now(); this.persist();
    clearTimeout(this.timer); this.timer=setTimeout(()=>this.syncNow(), 8000);
  },
  connect(code){
    let p=null; try{ p=JSON.parse(b64d(code)); }catch(e){}
    if(!p || p.s!=="contab-sync" || !p.t || !p.r){ toast("El código de sincronización no es válido"); return false; }
    this.cfg={t:p.t, r:p.r, dev:"d"+Math.random().toString(36).slice(2,8), rev:0, dirty:true, mAt:Date.now(), last:0};
    this.persist(); this.syncNow(); return true;
  },
  disconnect(){ this.cfg=null; clearTimeout(this.timer); try{ localStorage.removeItem("contabSync.v1"); }catch(e){} },
  url(){ return "https://api.github.com/repos/"+this.cfg.r+"/contents/progress.json"; },
  hdr(){ return {Authorization:"Bearer "+this.cfg.t, Accept:"application/vnd.github+json"}; },
  inQuiz(){ return view.name==="quiz" || view.name==="pquiz" || view.name==="results"; },
  setStatus(msg){ const el=document.getElementById("systat"); if(el) el.textContent = msg || this.statusText(); },
  statusText(){
    if(!this.cfg) return "Desactivada";
    if(this.syncing) return "Sincronizando…";
    if(!navigator.onLine) return "Sin conexión · se sincronizará sola al volver"+(this.cfg.dirty? " (cambios pendientes)":"");
    if(this.cfg.dirty) return "Cambios pendientes de subir";
    return this.cfg.last? "Al día · última: "+fmtDate(this.cfg.last) : "Conectada";
  },
  async syncNow(){
    const c=this.cfg;
    if(!c || this.syncing) return;
    if(!navigator.onLine){ this.setStatus(); return; }
    this.syncing=true; this.setStatus();
    let err=null;
    try{
      for(let i=0;i<3;i++){
        err=null;
        const g=await fetch(this.url()+"?ref=main&nc="+Date.now(), {headers:this.hdr(), cache:"no-store"});
        let remote=null, sha=null;
        if(g.status===200){
          const j=await g.json(); sha=j.sha;
          try{ remote=JSON.parse(b64d(j.content||"")); }catch(e){ remote=null; }
        } else if(g.status!==404){ throw new Error("HTTP "+g.status); }
        if(remote && remote.rev>(c.rev||0)){
          if(this.inQuiz()){ err="postpone"; break; }   // no tocar el estado en mitad de un test
          const merged=mergeProg(progData(), c.dirty? (c.mAt||0) : 0, remote.data||{}, remote.at||0);
          this.apply(merged);
          c.rev=remote.rev;
          c.dirty = stableStr(merged)!==stableStr(remote.data);  // si la fusión aporta algo, hay que subirla
        }
        if(c.dirty || !remote){
          c.dirty=false;  // si algo cambia mientras subimos, touch() lo vuelve a marcar
          const body={v:1, rev:(remote? remote.rev : (c.rev||0))+1, at:Date.now(), dev:c.dev, data:progData()};
          const put=await fetch(this.url(), {method:"PUT", headers:Object.assign(this.hdr(),{"Content-Type":"application/json"}),
            body: JSON.stringify({message:"sync "+c.dev+" rev "+body.rev, branch:"main", content:b64e(JSON.stringify(body)), sha: sha||undefined})});
          if(put.status===409 || put.status===422){ c.dirty=true; await new Promise(r=>setTimeout(r,1500)); continue; }  // otro dispositivo subió a la vez → esperar y reintentar
          if(!put.ok){ c.dirty=true; throw new Error("HTTP "+put.status); }
          c.rev=body.rev;
        }
        c.last=Date.now(); break;
      }
    }catch(e){ err=e; }
    this.persist();
    this.syncing=false;
    if(err==="postpone") this.setStatus("Hay progreso nuevo de otro dispositivo · se aplicará al salir del test");
    else if(err) this.setStatus("No se pudo sincronizar · se reintentará solo");
    else this.setStatus();
  },
  apply(d){
    this.applying=true;
    try{
      S.tests=d.tests||[]; S.seen=d.seen||{}; S.pool=d.pool||[]; S.tt=d.tt||{}; S.pr=d.pr||{}; S.slowIdx=d.slowIdx||0; S.resetAt=d.resetAt||0;
      S.cfg=Object.assign(freshDef().cfg, d.cfg||{});
      save();
    } finally { this.applying=false; }
    if(!this.inQuiz()) render();
  },
  boot(){
    this.load();
    addEventListener("online", ()=>this.syncNow());
    document.addEventListener("visibilitychange", ()=>{
      if(!this.cfg) return;
      if(document.visibilityState==="visible") this.syncNow();
      else if(this.cfg.dirty) this.syncNow();
    });
    setInterval(()=>{ if(this.cfg && (this.cfg.dirty || Date.now()-(this.cfg.last||0)>300000)) this.syncNow(); }, 60000);
    if(this.cfg) setTimeout(()=>this.syncNow(), 600);
  }
};

  const tests = DATA.tests[t];

  tests.forEach((_,i)=>{ const r=S.tt[t+"-"+i]; if(r&&r.n>0){done++; sum+=r.last; cnt++;} });

}

  if(refShare>=.5) return "Nivel examen";
  return avg<1.5? "Nivel básico" : avg<2.35? "Nivel medio" : "Nivel avanzado";
}

function cfgLong(){
  const c=S.cfg;
  const parts=[ c.n+" preguntas",
    c.temas.length===4? "todos los temas" : "Tema"+(c.temas.length>1?"s":"")+" "+c.temas.join(" · "),
    {all:"todas",unseen:"sólo no vistas",failfirst:"falladas primero"}[c.src],
    c.diff? DIFFN[c.diff].toLowerCase() : null,
    c.ref? "sólo referencia" : null ].filter(Boolean);
  return parts.join(" · ");
}
function avgTime(id){ const r=S.seen[id]; return r&&r.a? (r.ts||0)/r.a : 0; }
// lista de preguntas ya cronometradas de los temas activos, ordenadas de más lenta a más rápida
function slowRanked(cfg){
  const c = cfg||S.cfg;
  return DATA.questions
    .filter(q=>c.temas.includes(q.t) && S.seen[q.id] && S.seen[q.id].a>0)
    .sort((x,y)=>avgTime(y.id)-avgTime(x.id))
    .map(q=>q.id);
}
function slowNote(){
  const total = slowRanked().length;
  if(!total) return "Aún no hay preguntas cronometradas: haz algún test y vuelve aquí.";
  const n = S.cfg.n;
  const start = ((S.slowIdx % total)+total)%total;
  const to = Math.min(start+n, total);
  return total+" preguntas cronometradas · siguiente tanda: nº "+(start+1)+(to>start+1?"–"+to:"")+" (de más lenta a más rápida)";
}
function buildPool(cfg){
  const c = cfg||S.cfg;
  let qs = DATA.questions.filter(q=>c.temas.includes(q.t));
  if(c.diff) qs = qs.filter(q=>q.d===c.diff);
  if(c.ref) qs = qs.filter(q=>q.ref);
  if(c.src==="unseen") qs = qs.filter(q=>!S.seen[q.id]);
  if(c.src==="slow") qs = qs.filter(q=>S.seen[q.id] && S.seen[q.id].a>0);
  return qs;
}

function startQuiz(ids, meta){
  if(!ids.length){ toast("No hay preguntas disponibles con esos filtros"); return; }
  session = {
    ids: [...ids], idx:0, meta,
    sel:new Set(),
    graded:null,             // null | {correct:bool, empty:bool}
    results:[],              // {id, ok, secs, sel:[...]}
    review:null,             // índice de la pregunta ya corregida que se está revisando
    qtPause:null,            // cuándo se pausó el crono de la pregunta actual al entrar en revisión
    disp: ids.map(id => shuffle([0,1,2,3])),
    t0: Date.now(), qt: Date.now(), timer:null
  };
  go("quiz");
}
function vQuiz(){
  const s = session;

  const t = TEMAS.find(x=>x.id===q.t);

  const r = inRev? s.results[rev] : null;
  const sel = inRev? new Set(r.sel) : s.sel;
  const graded = inRev? { correct:r.ok, empty:!r.sel.length } : s.graded;
  const opts = s.disp[qIdx].map((oi,di)=>{
    let cls="opt", mk=LETTERS[di], dis="";
    if(graded){
      dis="disabled";
      const chosen = sel.has(oi), good = q.c.includes(oi);
      if(good && chosen){ cls+=" ok"; mk="✓"; }
      else if(good && !chosen){ cls+=" miss"; mk="✓"; }
      else if(!good && chosen){ cls+=" ko"; mk="✕"; }
    } else if(sel.has(oi)){ cls+=" sel"; mk="✓"; }
    return `<button class="${cls}" ${dis} onclick="A.pick(${oi})"><span class="mk">${mk}</span><span style="padding-top:2px">${esc(q.o[oi])}</span></button>`;
  }).join("");
  let fb="";
  if(graded){
    const ttl = graded.correct? "✓ ¡Correcto!" : graded.empty? "Sin responder — cuenta como fallo" : "✕ Incorrecto";
    fb = `<div class="fb ${graded.correct?"good":"bad"}">

  }

        : `<button class="btn" id="checkbtn" onclick="A.check()">Comprobar</button>`}

  return `<div class="view">
    <div class="qtop">

      <span class="dots" style="color:${temaC(q.t)}" title="${DIFFN[q.d]}">${[1,2,3].map(i=>`<i class="${i<=q.d?"on":""}"></i>`).join("")}</span>
      ${q.ref? `<span class="tag" style="background:var(--c3s);color:var(--c3)">${I.star} Referencia</span>`:""}
      ${inRev? `<span class="tag" style="background:var(--tint-soft);color:var(--tint)">Ya corregida</span>`:""}
    </div>

    <div class="hint">Puede haber más de una respuesta correcta.</div>
    ${opts}
    ${fb}

function tickTimer(){
  if(!session) return;
  const el = $("#qtimer");
  if(el) el.textContent = fmtT((Date.now()-session.t0)/1000);
}
setInterval(tickTimer, 1000);

function gradeCurrent(){
  const s = session;
  const q = QMAP[s.ids[s.idx]];
  const sel = [...s.sel];
  const ok = sel.length>0 && sel.length===q.c.length && sel.every(x=>q.c.includes(x));
  const secs = (Date.now()-s.qt)/1000;
  s.results.push({ id:q.id, ok, secs, sel });
  s.graded = { correct: ok, empty: sel.length===0 };
  // seguimiento global
  const rec = S.seen[q.id] || { a:0, f:0, ok:false };
  rec.a++; if(!ok) rec.f++;
  rec.ok = ok;
  rec.ts = (rec.ts||0) + Math.min(secs, 300);   // tiempo acumulado (capado para evitar outliers)
  S.seen[q.id] = rec;
  const pi = S.pool.indexOf(q.id);
  if(ok){ if(pi>-1) S.pool.splice(pi,1); }
  else { if(pi===-1) S.pool.push(q.id); }
  save();
}
function finishQuiz(){
  const s = session;
  const secs = (Date.now()-s.t0)/1000;
  const score = s.results.filter(r=>r.ok).length;
  const failed = s.results.filter(r=>!r.ok).map(r=>r.id);
  const rec = {
    ts: Date.now(), kind: s.meta.kind, tema: s.meta.tema||null, ti: s.meta.ti!==undefined? s.meta.ti:null,
    lit: s.meta.lit||null,
    name: s.meta.name, ids: s.ids, failed, score, total: s.ids.length, secs,
    avgQ: secs/s.ids.length
  };
  S.tests.unshift(rec);
  if(S.tests.length>60) S.tests.length = 60;
  if(s.meta.kind==="tema" || (s.meta.kind==="lit" && s.meta.lit && s.meta.lit!=="all")){
    const k = s.meta.kind==="tema" ? s.meta.tema+"-"+s.meta.ti : "L-"+s.meta.lit;
    const nota = score/s.ids.length*10;
    const r = S.tt[k] || { n:0, best:0, last:0 };
    r.n++; r.last = nota; r.best = Math.max(r.best, nota);
    S.tt[k] = r;
  }
  save();
  session.summary = rec;
  go("results");
}

    </div>
    <div class="statgrid">
      <div class="stat"><div class="k">Aciertos</div><div class="v" style="color:var(--green)">${r.score} / ${r.total}</div></div>
      <div class="stat"><div class="k">Fallos</div><div class="v" style="color:${r.failed.length?"var(--red)":"var(--green)"}">${r.failed.length}</div></div>
      <div class="stat"><div class="k">Tiempo total</div><div class="v">${fmtT(r.secs)}</div></div>
      <div class="stat"><div class="k">Media por pregunta</div><div class="v">${r.avgQ.toFixed(1)}s</div></div>
    </div>

    <div class="card">${bars}</div>
    ${failedRows? `<div class="sechead">Preguntas falladas · toca para ver la solución</div><div class="card">${failedRows}</div>`:""}

      ${r.failed.length? `<button class="btn red" onclick="A.errOfLast()">${I.redo} Test de errores (${r.failed.length})</button>`:""}

      <button class="btn soft" onclick="A.go('home')">Volver al inicio</button>
    </div>
  </div>`;

function ring(size, nota10, big, small, sw, colorOverride, animate){
  const col = colorOverride || notaColor(nota10);
  const r = (size-sw)/2, C = 2*Math.PI*r;
  const off = C*(1-Math.max(0,Math.min(1,nota10/10)));
  const id = "rg"+Math.random().toString(36).slice(2,7);
  const anim = animate? `<style>#${id}{stroke-dashoffset:${C}px;animation:${id}a 1s ease forwards .15s}@keyframes ${id}a{to{stroke-dashoffset:${off}px}}</style>`:"";
  return `<div class="ringwrap" style="width:${size}px;height:${size}px">${anim}
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--card2)" stroke-width="${sw}"/>
      <circle id="${id}" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"
        stroke-dasharray="${C}" stroke-dashoffset="${animate? C : off}"/>
    </svg>
    <div class="c"><div class="n" style="font-size:${size>100?38:size/3.4}px">${big}${small&&size>100?``:""}</div>${small? `<div class="l">${small}</div>`:""}</div>
  </div>`;
}

  },

  /* --- aleatorio --- */
  cfgSheet(){ openSheet(cfgSheetHTML()); },
  _cfgRefresh(){ openSheet(cfgSheetHTML()); },
  cfgTema(t){ const a=S.cfg.temas; const i=a.indexOf(t); if(i>-1){ if(a.length>1)a.splice(i,1); } else a.push(t); a.sort(); S.slowIdx=0; save(); A._cfgRefresh(); },

  cfgSrc(v){ if(v==="slow" && S.cfg.src!=="slow") S.slowIdx=0; S.cfg.src=v; save(); A._cfgRefresh(); },
  cfgDiff(v){ S.cfg.diff=+v; save(); A._cfgRefresh(); },
  cfgRef(){ S.cfg.ref=!S.cfg.ref; save(); A._cfgRefresh(); },
  startRandom(){
    const c=S.cfg;
    let ids;
    if(c.src==="slow"){
      // registro de "Lentas": paginado de N en N por orden de más lenta a más rápida
      const ranked = slowRanked();
      if(!ranked.length){ toast("Aún no hay preguntas cronometradas. Haz algún test primero."); return; }
      const start = ((S.slowIdx % ranked.length)+ranked.length)%ranked.length;
      ids = ranked.slice(start, start+c.n);
      if(ids.length < c.n && ranked.length > ids.length){ ids = ids.concat(ranked.slice(0, c.n-ids.length)); }
