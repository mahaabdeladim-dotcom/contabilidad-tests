gistro se fundamente en el fondo económico de las operaciones, con preeminencia sobre la forma jurídica.","Que la imagen fiel la certifique la propia gerencia de la empresa."],"c":[0,1,2],"e":"La utilidad exige fiabilidad e imagen fiel, aplicando el marco conceptual y el fondo económico sobre la forma. La imagen fiel la certifica la AUDITORÍA, no la gerencia.","id":"h1_49"},{"t":2,"d":1,"ref":false,"q":"El activo de una empresa, según el marco conceptual:","o":["Está formado por bienes, derechos y otros recursos controlados económicamente por la empresa.","Procede de sucesos pasados.","De él se espera obtener beneficios o rendimientos económicos en el futuro.","Incluye las obligaciones actuales surgidas de sucesos pasados."],"c":[0,1,2],"e":"Activo: bienes, derechos y otros recursos controlados económicamente por la empresa, resultantes de sucesos pasados, de los que se espera obtener beneficios futuros. Las obligaciones son el pasivo.","id":"q2_00"},{"t":2,"d":1,"ref":false,"q":"El patrimonio neto:","o":["Es la parte residual de los activos una vez deducidos todos los pasivos.","Incluye las aportaciones de los socios y los resultados acumulados.","Forma parte, junto con el pasivo, de la estructura financiera de la empresa.","Es la suma de los activos y los pasivos de la empresa."],"c":[0,1,2],"e":"PN = Activo − Pasivo (parte residual). Recoge las aportaciones de los socios, las reservas y los resultados, y constituye la financiación propia dentro de la estructura financiera.","id":"q2_01"},{"t":2,"d":1,"ref":false,"q":"En relación con los estados contables:","o":["Los gastos e ingresos se representan en el estado de resultados o cuenta de pérdidas y ganancias.","El balance de situación representa el activo, el pasivo y el patrimonio neto.","Los gastos e ingresos se representan en el balance de situación.","El balance de situación recoge los cobros y pagos del periodo."],"c":[0,1],"e":"Los elementos vinculados a la actividad (gastos e ingresos) van al estado de resultados o cuenta de pérdidas y ganancias; los patrimoniales (activo, pasivo y neto), al balance de situación.","id":"q2_02"},{"t":2,"d":1,"ref":false,"q":"Los gastos, según el marco conceptual:","o":["Son decrementos en el patrimonio neto del ejercicio.","No pueden tener su origen en distribuciones a los socios o propietarios.","Pueden consistir en salidas o disminuciones de valor de los activos o en reconocimiento de pasivos.","Son incrementos del patrimonio neto derivados de aportaciones de los socios."],"c":[0,1,2],"e":"Los gastos son decrementos del patrimonio neto (salidas o bajas de activos, o nacimiento de pasivos) siempre que no procedan de distribuciones a los socios. Los incrementos por aportaciones no son ingresos ni gastos.","id":"q2_03"},{"t":2,"d":1,"ref":false,"q":"En la ecuación fundamental del patrimonio:","o":["La estructura económica son las inversiones de la empresa (el activo).","La estructura financiera son las fuentes de financiación (patrimonio neto y pasivo).","Estructura económica y estructura financiera son siempre iguales.","La estructura económica está formada por el pasivo y el patrimonio neto."],"c":[0,1,2],"e":"La estructura económica (activo) recoge las inversiones; la financiera (PN + pasivo), las fuentes de financiación. Ambas coinciden siempre: toda inversión está financiada por algún origen de fondos.","id":"q2_04"},{"t":2,"d":1,"ref":false,"q":"Según el criterio financiero de ordenación del balance:","o":["La estructura económica (activo) se ordena de menor a mayor liquidez.","La estructura financiera se ordena de menor a mayor exigibilidad.","El activo se ordena de mayor a menor liquidez.","La estructura financiera se ordena según su rentabilidad."],"c":[0,1],"e":"Criterio financiero: el activo se ordena de menor a mayor liquidez y el patrimonio neto y pasivo de menor a mayor exigibilidad. Ordenar por rentabilidad/coste corresponde al criterio económico.","id":"q2_05"},{"t":2,"d":1,"ref":false,"q":"El libro Diario:","o":["Registra cronológicamente los hechos contables de la empresa.","Es obligatorio desde el punto de vista legal.","Registra mediante asientos, aplicando el método de la partida doble.","Agrupa los elementos patrimoniales homogéneos y calcula su saldo."],"c":[0,1,2],"e":"El Diario es un libro legalmente obligatorio que registra cronológicamente los hechos contables mediante asientos (partida doble). Agrupar elementos homogéneos es función de las cuentas y del Mayor.","id":"q2_06"},{"t":2,"d":1,"ref":false,"q":"Los ingresos, según el marco conceptual:","o":["Son incrementos del patrimonio neto durante el ejercicio.","No pueden tener su origen en aportaciones de los socios o propietarios.","Pueden consistir en entradas o aumentos de valor de los activos, o en disminuciones de los pasivos.","Son cualquier entrada de dinero en la tesorería de la empresa."],"c":[0,1,2],"e":"Ingresos: incrementos del patrimonio neto (entradas o aumentos de valor de activos, o disminución de pasivos) que no procedan de aportaciones de los socios. Una entrada de dinero (cobro) no es en sí un ingreso.","id":"q2_07"},{"t":2,"d":1,"ref":false,"q":"Para reconocer (registrar) un activo en el balance:","o":["Debe ser probable la obtención de beneficios o rendimientos económicos futuros.","Su valor debe poder determinarse con fiabilidad.","Debe cumplir la definición de activo.","Se exige certeza absoluta de que generará beneficios a corto plazo."],"c":[0,1,2],"e":"Criterios de registro de un activo: cumplir su definición, probabilidad (no certeza) de obtener rendimientos futuros y valoración fiable.","id":"q2_08"},{"t":2,"d":1,"ref":false,"q":"Según el método de la partida doble y el convenio de cargo y abono:","o":["Los aumentos de los elementos de activo se cargan (Debe).","Los aumentos de pasivo y patrimonio neto se abonan (Haber).","Las disminuciones de los elementos de activo se abonan (Haber).","Los aumentos de los elementos de pasivo se cargan en el Debe de su cuenta."],"c":[0,1,2],"e":"El activo aumenta por el Debe y disminuye por el Haber; el pasivo y el patrimonio neto aumentan por el Haber y disminuyen por el Debe.","id":"q2_09"},{"t":2,"d":2,"ref":false,"q":"Señale la/s afirmación/es correcta/s sobre los activos:","o":["Son bienes, derechos y otros recursos controlados económicamente por la empresa, resultantes de sucesos pasados.","De ellos se espera obtener beneficios o rendimientos económicos en el futuro.","La maquinaria y los derechos de cobro sobre clientes son ejemplos de activo.","Son la parte residual de los activos una vez deducidos los pasivos."],"c":[0,1,2],"e":"La definición de activo exige control económico, origen en sucesos pasados y expectativa de beneficios futuros; maquinaria y clientes la cumplen. La parte residual define el patrimonio neto.","id":"q2_10"},{"t":2,"d":2,"ref":false,"q":"En relación con el reconocimiento de los ingresos por actividades ordinarias:","o":["El ingreso se reconoce cuando se cumple la obligación, mediante la transferencia del control del bien o servicio.","El reconocimiento es independiente del momento del cobro.","El ingreso se reconoce solo cuando existe certeza del cobro, aunque no se haya entregado el bien.","El ingreso se reconoce al firmar el contrato, en todo caso."],"c":[0,1],"e":"El ingreso ordinario se reconoce al transferir el control del bien o servicio al cliente (cumplimiento de la obligación), con independencia de cuándo se cobre.","id":"q2_11"},{"t":2,"d":2,"ref":false,"q":"Según el criterio económico de ordenación de las masas patrimoniales:","o":["La estructura económica se ordena según la rentabilidad.","La estructura financiera se ordena según el coste de financiación.","La estructura económica se ordena por liquidez y la financiera por exigibilidad.","No existe ningún criterio de ordenación del balance."],"c":[0,1],"e":"Criterio económico: activo por rentabilidad y financiación por coste. La ordenación por liquidez y exigibilidad corresponde al criterio financiero, que es el que sigue el modelo de balance.","id":"q2_12"},{"t":2,"d":2,"ref":false,"q":"En relación con las funciones de la cuenta:","o":["La función numérica refleja los cargos, los abonos y el saldo del elemento.","La función de agregación agrupa los elementos patrimoniales homogéneos.","La función de representación identifica y representa individualizadamente cada elemento.","La función numérica consiste en registrar cronológicamente las operaciones en el Diario."],"c":[0,1,2],"e":"Representación: cada cuenta representa un elemento. Numérica: recoge sus cambios de valor (cargos/abonos) y su saldo. Agregación: agrupa elementos homogéneos. El registro cronológico es del Diario.","id":"q2_13"},{"t":2,"d":2,"ref":false,"q":"El libro Mayor:","o":["Es legalmente voluntario.","Es imprescindible y principal desde el punto de vista contable.","Recoge, cuenta a cuenta, los movimientos trasladados del Diario.","Es obligatorio legalizarlo en el Registro Mercantil."],"c":[0,1,2],"e":"El Mayor no es obligatorio legalmente (no se legaliza), pero contablemente es imprescindible: recoge por cuentas todos los cargos y abonos y permite conocer los saldos.","id":"q2_14"},{"t":2,"d":2,"ref":false,"q":"En relación con las situaciones de equilibrio patrimonial:","o":["Hay equilibrio patrimonial total cuando el activo es mayor que el pasivo (patrimonio neto positivo).","El equilibrio parcial compara masas con igual grado de liquidez y exigibilidad.","Hay equilibrio total cuando el pasivo supera al activo.","Un patrimonio neto negativo indica equilibrio patrimonial."],"c":[0,1],"e":"Equilibrio total: A > P (PN positivo). Equilibrio parcial: comparación de masas homogéneas en liquidez/exigibilidad (p. ej. AC > PC). Si el pasivo supera al activo, el PN es negativo: desequilibrio.","id":"q2_15"},{"t":2,"d":2,"ref":false,"q":"Las cuentas diferenciales:","o":["Recogen los resultados (beneficios o pérdidas) derivados de la actividad.","Comprenden las cuentas de gastos e ingresos.","Se contraponen a las cuentas integrales, que representan elementos patrimoniales.","Reflejan únicamente la situación del patrimonio en un momento dado."],"c":[0,1,2],"e":"Según su naturaleza, las cuentas integrales representan activo, pasivo y neto, y las diferenciales recogen los resultados (gastos e ingresos). La situación del patrimonio la reflejan las integrales.","id":"q2_16"},{"t":2,"d":2,"ref":false,"q":"En relación con el reconocimiento de los gastos:","o":["El gasto se reconoce cuando se consumen los bienes o servicios (principio de devengo).","Su reconocimiento es independiente del momento del pago.","El gasto se reconoce únicamente cuando se produce el pago.","El gasto se reconoce al transferir el control del bien al cliente."],"c":[0,1],"e":"El gasto se reconoce por devengo, al consumirse los bienes o servicios, se haya pagado o no. La transferencia del control al cliente es el criterio de reconocimiento de los ingresos.","id":"q2_17"},{"t":2,"d":2,"ref":false,"q":"Según la correlación de ingresos y gastos:","o":["Los gastos se imputan, cuando es posible, a los ingresos que contribuyen a generar.","Los que no pueden vincularse directamente se distribuyen en el tiempo con criterios razonables.","Los gastos no vinculables directamente a ingresos dejan de reconocerse.","Solo se reconocen los gastos ligados directamente a las ventas."],"c":[0,1],"e":"La correlación vincula cada gasto con los ingresos que ayuda a generar; cuando el vínculo directo no existe, el importe se distribuye en el tiempo de forma razonable, pero nunca se deja de reconocer.","id":"q2_18"},{"t":2,"d":2,"ref":false,"q":"El método de la partida doble se sustenta en que:","o":["Toda operación afecta al menos a dos elementos patrimoniales, relacionados causa-efecto.","En cada asiento la suma del Debe es igual a la suma del Haber.","El equilibrio de la ecuación fundamental se mantiene tras cada operación.","Las operaciones se registran una sola vez y en un único elemento."],"c":[0,1,2],"e":"La partida doble parte de que todo hecho contable relaciona al menos dos elementos (causa y efecto); por eso cada asiento cuadra (Debe = Haber) y la igualdad A = PN + P se mantiene siempre.","id":"q2_19"},{"t":2,"d":2,"ref":false,"q":"Los estados contables (estados financieros o cuentas anuales):","o":["Son documentos que presentan la información de modo agregado y sintético.","Configuran el output del proceso de información contable externa.","Son registros cronológicos y analíticos de uso exclusivamente interno.","Equivalen al libro Diario y al libro Mayor."],"c":[0,1],"e":"Los estados contables presentan la información agregada y sintética y son el producto final de la contabilidad externa. Los libros Diario y Mayor son instrumentos de registro, no estados contables.","id":"q2_20"},{"t":2,"d":2,"ref":false,"q":"En la ecuación fundamental del patrimonio se cumple que:","o":["Estructura económica = Estructura financiera.","Inversiones = Fuentes de financiación.","Aplicaciones de fondos = Orígenes de fondos.","Activo = Patrimonio neto − Pasivo."],"c":[0,1,2],"e":"Las tres primeras igualdades expresan lo mismo: todo lo invertido (activo) procede de alguna fuente de financiación (PN + pasivo). La ecuación correcta es A = PN + P, no A = PN − P.","id":"q2_21"},{"t":2,"d":2,"ref":false,"q":"El criterio financiero de ordenación del balance postula que:","o":["El activo se ordena de menor a mayor liquidez.","El patrimonio neto y el pasivo se ordenan de menor a mayor exigibilidad.","Es el criterio que sigue, con carácter general, el modelo de balance español.","El activo se ordena según el coste de financiación."],"c":[0,1,2],"e":"El criterio financiero ordena el activo por liquidez y la financiación por exigibilidad (de menor a mayor en ambos casos), y es el que adopta el modelo de balance del PGC.","id":"q2_22"},{"t":2,"d":2,"ref":false,"q":"Al evaluar si una partida cumple la definición de activo, pasivo o patrimonio neto:","o":["Se atiende a la preeminencia del fondo económico sobre la forma jurídica.","Importa la realidad económica de la operación y no solo su forma legal.","Prima la forma jurídica del contrato sobre su fondo económico.","Se atiende exclusivamente a la denominación que le dé la empresa."],"c":[0,1],"e":"En la contabilización de las operaciones prevalece el fondo económico sobre la forma jurídica: se registra conforme a la realidad económica y no solo según la forma legal del contrato.","id":"q2_23"},{"t":2,"d":2,"ref":false,"q":"Los pasivos, según el marco conceptual:","o":["Son obligaciones actuales surgidas como consecuencia de sucesos pasados.","Para su extinción la empresa espera desprenderse de recursos que pueden producir beneficios económicos.","Incluyen las provisiones.","Son obligaciones futuras derivadas de sucesos que aún no han ocurrido."],"c":[0,1,2],"e":"Pasivo: obligación actual surgida de sucesos pasados, cuya extinción supondrá desprenderse de recursos con beneficios económicos. Se entienden incluidas las provisiones.","id":"q2_24"},{"t":2,"d":2,"ref":false,"q":"La función de agregación de las cuentas consiste en:","o":["Agrupar los elementos patrimoniales que sean homogéneos (con características comunes).","Permitir pasar de los elementos individuales a agregados como las masas patrimoniales.","Mostrar los cambios de valor y el saldo individual de cada elemento.","Registrar cronológicamente las operaciones de la empresa."],"c":[0,1],"e":"La agregación agrupa elementos homogéneos, lo que permite formar agregados (masas patrimoniales). Los cambios de valor y el saldo son la función numérica; el registro cronológico, el Diario.","id":"q2_25"},{"t":2,"d":2,"ref":false,"q":"El equilibrio patrimonial parcial:","o":["Compara masas patrimoniales con igual grado de liquidez y exigibilidad.","Se da, por ejemplo, cuando el activo corriente supera al pasivo corriente.","Se da cuando el activo no corriente es menor que la financiación básica (patrimonio neto + pasivo no corriente).","Consiste en comparar el activo total con el pasivo total."],"c":[0,1,2],"e":"El equilibrio parcial compara masas homogéneas: AC > PC o, equivalentemente, ANC < financiación básica (PN + PNC). Comparar los totales es el equilibrio patrimonial total.","id":"q2_26"},{"t":2,"d":2,"ref":false,"q":"En función del estado contable en que se presentan, las cuentas se clasifican en:","o":["Cuentas de balance: representan activo, pasivo y patrimonio neto.","Cuentas de gestión o de resultados: representan gastos e ingresos.","Cuentas de balance: recogen exclusivamente los gastos e ingresos.","Cuentas de gestión: recogen el activo y el pasivo."],"c":[0,1],"e":"Cuentas de balance = activo, pasivo y patrimonio neto; cuentas de gestión o de resultados = gastos e ingresos, que desembocan en la cuenta de pérdidas y ganancias.","id":"q2_27"},{"t":2,"d":2,"ref":false,"q":"Las cuentas creadas contablemente sin entidad real:","o":["Son cuentas correctoras.","La amortización acumulada es un ejemplo.","La variación de existencias es un ejemplo.","Representan bienes tangibles de la empresa."],"c":[0,1,2],"e":"Son cuentas creadas por la técnica contable para corregir valores: la amortización acumulada (corrige el inmovilizado) o la variación de existencias. No representan bienes con entidad física propia.","id":"q2_28"},{"t":2,"d":2,"ref":false,"q":"El libro Diario, además de aplicar la partida doble:","o":["Desarrolla la función de coordinación contable.","Pone en relación el origen o causa de cada hecho con su término o efecto.","Refleja la cuantía de cada operación.","Clasifica los elementos patrimoniales según su liquidez."],"c":[0,1,2],"e":"Para cada hecho contabilizado, el Diario relaciona causa y efecto y recoge su cuantía: es la función de coordinación contable. La clasificación por liquidez es propia del balance.","id":"q2_29"},{"t":2,"d":2,"ref":false,"q":"Para clasificar y registrar un elemento como pasivo debe tratarse de:","o":["Una obligación actual.","Una obligación surgida como consecuencia de sucesos pasados.","Una obligación para cuya extinción la empresa espera desprenderse de recursos.","Un recurso controlado del que se esperan beneficios económicos futuros."],"c":[0,1,2],"e":"El pasivo es una obligación actual, nacida de sucesos pasados, que se cancelará entregando recursos capaces de producir beneficios. Un recurso controlado con beneficios esperados es un activo.","id":"q2_30"},{"t":2,"d":2,"ref":false,"q":"Se produce un ingreso contable cuando:","o":["Hay un incremento del patrimonio neto que no procede de aportaciones de los socios.","Se presta un servicio o se entrega un bien, aunque todavía no se haya cobrado.","Los socios realizan una aportación monetaria al capital.","La empresa recibe un préstamo bancario."],"c":[0,1],"e":"El ingreso es un aumento del PN ajeno a las aportaciones de socios; por devengo nace al prestar el servicio o entregar el bien, se cobre o no. El préstamo crea un pasivo, no un ingreso.","id":"q2_31"},{"t":2,"d":2,"ref":false,"q":"Para el reconocimiento contable de un activo se exige:","o":["Que sea probable la obtención de beneficios o rendimientos económicos futuros.","Que su valor pueda determinarse con fiabilidad.","Que su propiedad jurídica esté formalizada en escritura pública.","Que exista certeza absoluta de su conversión en efectivo a corto plazo."],"c":[0,1],"e":"Los criterios de registro del activo son probabilidad de rendimientos futuros y valoración fiable. Ni la escritura pública ni la certeza absoluta son requisitos (rige el fondo económico).","id":"q2_32"},{"t":2,"d":2,"ref":false,"q":"En la terminología de las cuentas:","o":["Abonar (o acreditar) es anotar una cantidad en el Haber.","Cargar (o adeudar) es anotar una cantidad en el Debe.","Un abono disminuye las cuentas de activo y aumenta las de pasivo y patrimonio neto.","Un abono aumenta por igual las cuentas de activo y las de pasivo."],"c":[0,1,2],"e":"Cargar = anotar en el Debe; abonar = anotar en el Haber. El efecto depende de la cuenta: el abono reduce el activo y aumenta el pasivo y el patrimonio neto.","id":"q2_33"},{"t":2,"d":2,"ref":false,"q":"El libro Diario se caracteriza por:","o":["Registrar los hechos contables mediante asientos.","Seguir un orden cronológico.","Ser un instrumento material de registro.","Mostrar la situación del patrimonio al cierre como estado sintético."],"c":[0,1,2],"e":"El Diario es el instrumento material que registra, día a día y mediante asientos, los hechos contables. El estado sintético que muestra la situación patrimonial es el balance.","id":"q2_34"},{"t":2,"d":2,"ref":false,"q":"La empresa vende al contado por 500 € mercaderías que le habían costado 300 €:","o":["Se produce un ingreso de 500 €, porque se transfiere el control de los bienes.","Se produce un incremento de activo (tesorería) de 500 €.","El ingreso de la operación es de 200 €.","No hay ingreso porque la operación se cobra al contado."],"c":[0,1],"e":"El ingreso es el equivalente monetario de la venta: 500 € (los 200 € serían el beneficio, no el ingreso). Al cobrarse al contado aumenta la tesorería en 500 €. El cobro no impide el ingreso: son corrientes distintas.","id":"q2_35"},{"t":2,"d":2,"ref":false,"q":"En relación con el saldo de las cuentas:","o":["El saldo es deudor cuando la suma del Debe es mayor que la suma del Haber.","El saldo es acreedor cuando la suma del Debe es menor que la suma del Haber.","El saldo es nulo cuando las sumas del Debe y del Haber coinciden.","Las cuentas de activo aumentan por el Haber."],"c":[0,1,2],"e":"Saldo = ∑Debe − ∑Haber: deudor si ∑D > ∑H, acreedor si ∑D < ∑H y nulo si coinciden. Las cuentas de activo aumentan por el DEBE (se cargan) y disminuyen por el Haber.","id":"q2_36"},{"t":2,"d":3,"ref":false,"q":"Seleccione las sentencias que correspondan exactamente con la definición de Gastos en el Marco Conceptual:","o":["Son decrementos en el patrimonio neto de la empresa durante el ejercicio en forma de salidas o disminuciones en el valor de los activos.","Incluyen aquellos decrementos cuyo origen radica exclusivamente en las distribuciones monetarias a los propietarios.","Pueden darse en forma de reconocimiento o aumento del valor de los pasivos.","Representan el equivalente monetario puro de la corriente financiera que surge de la relación externa de cobros y pagos."],"c":[0,2],"e":"Definición de GASTOS: Decrementos en el patrimonio neto de la empresa durante el ejercicio, ya sea en forma de salidas o disminuciones en el valor de los activos, o de reconocimiento o aumento del valor de los pasivos, siempre que NO tengan su origen en distribuciones a los socios o propietarios. (Tema 2, Diapositiva 10).","id":"q2_37"},{"t":2,"d":3,"ref":false,"q":"Al evaluar los elementos del Balance de Situación y sus cuentas, marque las proposiciones rigurosamente ciertas:","o":["La financiación básica está formada exclusivamente por el Pasivo no corriente y el Pasivo corriente.","El Activo corriente incluye partidas como el realizable condicionado, el realizable cierto y el disponible.","El Patrimonio Neto incluye los fondos propios, ajustes por cambios de valor y subvenciones, donaciones y legados recibidos.","La Ecuación de Equilibrio patrimonial Parcial compara el Activo no corriente con la Financiación Básica (PNC+PN)."],"c":[1,2,3],"e":"Activo corriente: Realizable condicionado, realizable cierto, disponible. Patrimonio neto: Fondos propios; ajustes por cambios de valor; subvenciones, donaciones y legados recibidos. Parcial: comparamos masas patrimoniales con igual grado de liquidez y exigibilidad (ANC < Financiación Básica). (Tema 2, Diapositivas 20 y 25).","id":"q2_38"},{"t":2,"d":3,"ref":false,"q":"Sobre el reconocimiento contable de los Ingresos, es necesario que:","o":["Exista una certeza absoluta de cobrar la transacción antes de poder registrarla patrimonialmente en los estados contables.","Se pueda identificar el contrato (acuerdo entre partes) e identificar la obligación u obligaciones a cumplir en el contrato.","Se reconozca el ingreso por actividades ordinarias cuando la empresa cumple una obligación comprometida mediante la transferencia del control.","Se asigne el precio de la transacción de cada bien o servicio distinto que se hayan comprometido en el contrato."],"c":[1,2,3],"e":"Ingreso. Se pueda: Identificar el contrato... Identificar la obligación... Asignar el precio... Reconocer el ingreso por actividades ordinarias cuando la empresa cumple una obligación comprometida mediante la transferencia del control. (Tema 2, Diapositiva 13).","id":"q2_39"},{"t":2,"d":3,"ref":false,"q":"Relativo a los libros y su función en la representación de los hechos económicos:","o":["El Libro Mayor es el instrumento material en el que se recogen las cuentas y cada hoja corresponde a una cuenta.","El Libro Diario es un instrumento conceptual que capta de forma individualizada los elementos a través del saldo deudor y acreedor.","En las cuentas de Pasivo, las disminuciones de valor (VP) se anotan cargándolas en el Debe.","El Libro Mayor, desde un punto de vista legal, es un libro obligatorio aunque la práctica contable lo considere secundario."],"c":[0,2],"e":"Libro Mayor: Instrumento material en el que se recogen las cuentas (cada hoja corresponde a una cuenta). Cuenta de Pasivo: Las disminuciones de valor (VP) se cargan en el Debe y los aumentos se abonan en el Haber. (Tema 2, Diapositivas 22 y 24).","id":"q2_40"},{"t":2,"d":3,"ref":false,"q":"En la dinámica de cuentas y la partida doble (Tema 2), se cumple que:","o":["Las cuentas integrales son representativas de elementos patrimoniales.","Toda transacción afecta simultáneamente, al menos, a dos componentes patrimoniales entre los que se establece una relación causa a efecto.","Las cuentas de gestión o de resultados recogen las cuentas de activo, pasivo y patrimonio neto.","El saldo de una cuenta se define como la diferencia entre la suma del Debe y la suma del Haber."],"c":[0,1,3],"e":"Cuentas integrales: representativas de elementos patrimoniales. Asientos contables: Toda transacción afecta a dos componentes con relación causa-efecto. SALDO: Diferencia entre la suma del Debe y del Haber. (Tema 2, Diapositivas 22, 23 y 26).","id":"q2_41"},{"t":2,"d":3,"ref":false,"q":"En relación con el reconocimiento de pasivos:","o":["Una póliza de crédito concedida por el banco de la que la empresa aún no ha dispuesto no se registra como pasivo.","Un anticipo de 6.000 € recibido de un cliente a cuenta de un pedido pendiente de entrega es un pasivo.","Un préstamo que el banco va a conceder «con total seguridad» pero que aún no se ha firmado es un pasivo.","Para registrar un pasivo debe haberse adquirido en firme la obligación de desprenderse de recursos."],"c":[0,1,3],"e":"El pasivo exige obligación actual adquirida en firme (D). La póliza no dispuesta y el préstamo no firmado no generan todavía obligación (A correcta, C falsa). El anticipo de clientes obliga a entregar el pedido o devolver el dinero: es un pasivo (B).","id":"q2_42"},{"t":2,"d":3,"ref":true,"q":"Respecto a los Estados Contables (cuentas anuales):","o":["Se presentan de modo agregado y sintético.","Constituyen el output del proceso de información contable externa.","Estados contables, estados financieros y cuentas anuales son expresiones equivalentes.","Son registros cronológicos individualizados de cada operación."],"c":[0,1,2],"e":"Los estados contables son documentos agregados y sintéticos (A), output de la información externa (B), y equivalen a estados financieros / cuentas anuales (C). El registro cronológico individualizado es el Libro Diario, no las cuentas anuales (D falsa).","id":"q2_43"},{"t":2,"d":3,"ref":true,"q":"Sobre la ecuación fundamental del patrimonio:","o":["Estructura económica (inversiones) = Estructura financiera (fuentes de financiación).","Aplicaciones de fondos = Orígenes de fondos.","Activo = Pasivo + Patrimonio Neto.","Inversiones = Orígenes de fondos; Financiación = Aplicaciones de fondos."],"c":[0,1,2],"e":"Las inversiones (aplicaciones de fondos) se igualan con la financiación (orígenes de fondos): A, B y C son formas correctas de la identidad. La opción D intercambia los términos y es falsa.","id":"q2_44"},{"t":2,"d":3,"ref":true,"q":"Según el criterio financiero de ordenación del balance:","o":["La estructura económica (activo) se ordena de menor a mayor liquidez.","La estructura financiera (pasivo + PN) se ordena de menor a mayor exigibilidad.","El activo se ordena de mayor a menor exigibilidad.","El patrimonio neto es la fuente menos exigible."],"c":[0,1,3],"e":"Criterio financiero: el activo se ordena por liquidez creciente (A) y la financiación por exigibilidad creciente (B); el patrimonio neto es la fuente menos exigible (D). El activo no se ordena por 'exigibilidad' (C falsa).","id":"q2_45"},{"t":2,"d":3,"ref":true,"q":"Sobre la definición de los elementos de las cuentas anuales:","o":["Al evaluar si una partida cumple la definición de activo, pasivo o patrimonio neto prevalece el fondo económico sobre la forma jurídica.","Los pasivos son obligaciones actuales surgidas de sucesos pasados.","Dentro de los pasivos se entienden incluidas las provisiones.","Los pasivos son obligaciones futuras derivadas de sucesos futuros."],"c":[0,1,2],"e":"Prevalece el fondo económico (A); los pasivos son obligaciones actuales por sucesos pasados (B) e incluyen las provisiones (C). La opción D es falsa: no son obligaciones 'futuras de sucesos futuros'.","id":"q2_46"},{"t":2,"d":3,"ref":true,"q":"Sobre la clasificación de las cuentas:","o":["Las cuentas de balance recogen elementos de activo, pasivo y patrimonio neto.","Las cuentas de gestión o de resultados recogen los gastos y los ingresos.","La amortización acumulada y la variación de existencias son cuentas correctoras (sin entidad real).","Las cuentas de gestión figuran en el balance de situación."],"c":[0,1,2],"e":"Las cuentas de balance recogen activo/pasivo/PN (A) y las de gestión, gastos e ingresos (B); la amortización acumulada y la variación de existencias son cuentas correctoras creadas contablemente (C). Las cuentas de gestión van a la cuenta de resultados, no al balance (D falsa).","id":"q2_47"},{"t":2,"d":3,"ref":true,"q":"En relación con el equilibrio patrimonial:","o":["En el equilibrio total se comprueba que el activo es igual a la suma de pasivo y patrimonio neto.","En el equilibrio parcial se comparan masas con igual grado de liquidez y exigibilidad.","Que el activo corriente supere al pasivo corriente es una situación de equilibrio parcial.","El equilibrio patrimonial exige que el patrimonio neto sea siempre negativo."],"c":[0,1,2],"e":"El equilibrio total es la igualdad Activo = Pasivo + PN (A); el parcial compara masas de igual liquidez/exigibilidad (B), como AC > PC (C). Un PN negativo indica desequilibrio, no equilibrio (D falsa).","id":"q2_48"},{"t":2,"d":3,"ref":true,"q":"Sobre las funciones de las cuentas y los libros contables:","o":["La función de agregación consiste en agrupar elementos patrimoniales homogéneos.","El Libro Diario registra los hechos contables siguiendo el método de la partida doble.","En la partida doble, para cada hecho se refleja su origen (causa) y su término (efecto).","El Libro Mayor registra las operaciones por estricto orden cronológico."],"c":[0,1,2],"e":"Agregación = agrupar elementos homogéneos (A); el Diario aplica la partida doble (B), reflejando causa y efecto de cada hecho (C). El registro por orden cronológico es el Diario; el Mayor recoge el movimiento por cuentas (D falsa).","id":"q2_49"},{"t":2,"d":3,"ref":false,"q":"Los estados contables:","o":["Se presentan de modo agregado y sintético.","Son el conjunto de documentos informativos que configuran el output del proceso de información contable externa.","«Estados contables», «estados financieros» y «cuentas anuales» son expresiones equivalentes.","Registran individualmente cada operación por orden cronológico."],"c":[0,1,2],"e":"Los estados contables son documentos agregados y sintéticos, output de la información externa. El registro cronológico individual corresponde al libro Diario.","id":"h2_00"},{"t":2,"d":3,"ref":false,"q":"En relación con los elementos de los estados contables:","o":["Activos, pasivos y patrimonio neto se relacionan con la situación económico-financiera y se representan en el balance.","Gastos, ingresos y resultados se relacionan con la actividad y se representan en la cuenta de pérdidas y ganancias.","Los gastos y los ingresos se representan en el balance de situación.","Si los ingresos superan a los gastos hay beneficio; si no, pérdida."],"c":[0,1,3],"e":"A, P y PN van al balance; G, I y el resultado a la cuenta de PyG (I−G>0 beneficio; I−G<0 pérdida).","id":"h2_01"},{"t":2,"d":3,"ref":false,"q":"Para registrar contablemente un elemento de los estados contables se exige:","o":["Que cumpla la definición del elemento (activo, pasivo, patrimonio neto, gasto o ingreso).","Que cumpla los criterios de registro o reconocimiento.","Ambos aspectos están indicados en el Marco Conceptual.","Basta con que la operación esté documentada en una factura."],"c":[0,1,2],"e":"El registro exige cumplir la definición Y los criterios de reconocimiento del Marco Conceptual; la factura por sí sola no basta.","id":"h2_02"},{"t":2,"d":3,"ref":false,"q":"Según la definición de activo:","o":["Son bienes, derechos y otros recursos controlados económicamente por la empresa.","Deben resultar de sucesos pasados.","De ellos se espera obtener beneficios o rendimientos económicos en el futuro.","Se exige en todo caso la propiedad jurídica del recurso."],"c":[0,1,2],"e":"La definición exige CONTROL económico, no propiedad jurídica (preeminencia del fondo económico sobre la forma).","id":"h2_03"},{"t":2,"d":3,"ref":false,"q":"Una empresa tiene unos proyectores contabilizados en 20.000 € que va a sustituir; el proveedor de los nuevos retirará los antiguos sin pagar nada por ellos:","o":["Los proyectores antiguos dejan de cumplir la definición de activo, pues ya no se esperan beneficios futuros de ellos.","Siguen siendo un activo por estar contabilizados en 20.000 €.","Procede reconocer la pérdida correspondiente.","El precio histórico garantiza su condición de activo para siempre."],"c":[0,2],"e":"Sin expectativa de beneficios futuros no hay activo: procede darlos de baja y reconocer la pérdida, aunque figuren contabilizados.","id":"h2_04"},{"t":2,"d":3,"ref":false,"q":"Una empresa construye para sí misma un edificio, con un coste de edificación de 200.000 €:","o":["Es un activo: es un recurso controlado del que se esperan beneficios futuros.","No es un activo porque no se ha comprado a un tercero.","Su valor puede determinarse con fiabilidad a través del coste de producción.","Sólo será activo cuando se venda."],"c":[0,2],"e":"Los activos pueden proceder de la propia producción: hay control, beneficios esperados y valoración fiable (coste de producción de 200.000 €).","id":"h2_05"},{"t":2,"d":3,"ref":false,"q":"Según la definición de pasivo:","o":["Son obligaciones actuales surgidas como consecuencia de sucesos pasados.","Para su extinción la empresa espera desprenderse de recursos que puedan producir beneficios o rendimientos económicos futuros.","Se entienden incluidas las provisiones.","Incluyen cualquier obligación futura que la empresa prevea asumir."],"c":[0,1,2],"e":"El pasivo exige obligación ACTUAL nacida de sucesos PASADOS; las expectativas de obligaciones futuras no son pasivos. Las provisiones sí se incluyen.","id":"h2_06"},{"t":2,"d":3,"ref":false,"q":"El jefe de riesgos comunica que un préstamo se concederá «con total seguridad», aunque no hay fecha de firma. Además, la empresa está siendo inspeccionada y es muy probable que deba instalar una depuradora de 2 millones:","o":["El préstamo no firmado no es un pasivo: aún no existe obligación actual.","El préstamo debe registrarse ya como pasivo por la alta probabilidad.","La probable obligación medioambiental da lugar a una provisión (pasivo).","Ninguno de los dos hechos genera registro alguno."],"c":[0,2],"e":"Sin obligación adquirida en firme no hay pasivo (préstamo). En cambio, la obligación probable y estimable derivada de un suceso pasado (los vertidos) se recoge como provisión.","id":"h2_07"},{"t":2,"d":3,"ref":false,"q":"A una empresa le comunican una quita del 50% sobre una deuda de 10.000 € que mantenía con un proveedor:","o":["Su pasivo disminuye en 5.000 €.","La disminución del pasivo, que no procede de aportaciones de socios, genera un ingreso.","El pasivo se mantiene en 10.000 € hasta su pago.","La quita aumenta el patrimonio neto de la empresa deudora."],"c":[0,1,3],"e":"La quita reduce la obligación a 5.000 €; esa disminución de pasivo es un ingreso, que incrementa el patrimonio neto.","id":"h2_08"},{"t":2,"d":3,"ref":false,"q":"El patrimonio neto:","o":["Es la parte residual de los activos de la empresa una vez deducidos todos sus pasivos.","Incluye las aportaciones de socios o propietarios que no tengan la consideración de pasivos.","Incluye los resultados acumulados y otras variaciones que le afecten (subvenciones, actualizaciones de valor, correcciones de errores).","Se calcula como Activo + Pasivo."],"c":[0,1,2],"e":"PN = Activo − Pasivo. Incluye aportaciones de socios (no pasivo), resultados acumulados y otras variaciones.","id":"h2_09"},{"t":2,"d":3,"ref":false,"q":"En relación con el patrimonio neto:","o":["Si los accionistas aceptan cobrar el dividendo en acciones en vez de en efectivo, esos importes mantienen la consideración de patrimonio neto.","Si la empresa traspasa el beneficio del ejercicio a reservas, su patrimonio neto total aumenta por ello.","Un incremento de valor de 500.000 € de una inversión, registrado conforme a la normativa, afecta (aumenta) al patrimonio neto.","El beneficio del ejercicio ya forma parte del patrimonio neto antes de su distribución."],"c":[0,2,3],"e":"El dividendo en acciones permanece en el PN. Pasar el beneficio a reservas NO aumenta el PN total (ya lo integraba como resultado del ejercicio); sólo cambia de partida.","id":"h2_10"},{"t":2,"d":3,"ref":false,"q":"Según la definición de ingresos:","o":["Son incrementos en el patrimonio neto durante el ejercicio.","Pueden producirse por entradas o aumentos de valor de los activos.","Pueden producirse por disminución de los pasivos.","Incluyen las aportaciones, monetarias o no, de los socios."],"c":[0,1,2],"e":"Los ingresos aumentan el PN vía activos o pasivos, pero se EXCLUYEN las aportaciones de socios.","id":"h2_11"},{"t":2,"d":3,"ref":false,"q":"Indica en qué casos se produce un ingreso:","o":["La empresa vende al contado por 500 € mercaderías que costaron 300 €.","Un proveedor concede a la empresa un descuento de 1.000 € por volumen de pedidos, minorando su deuda.","La empresa cobra 600 € en efectivo a sus clientes.","La empresa amplía capital por 100.000 € y los accionistas lo desembolsan."],"c":[0,1],"e":"La venta (500 €) y el descuento recibido (menos pasivo) son ingresos. El cobro a clientes sólo permuta activos (derecho de cobro por efectivo) y la ampliación es aportación de socios.","id":"h2_12"},{"t":2,"d":3,"ref":false,"q":"La cotización de unas acciones que la empresa mantiene como inversión aumenta en 20.000 € y la empresa corrige su valor conforme a la normativa:","o":["Se produce un ingreso por el aumento de valor de un activo.","No hay ingreso hasta que se vendan las acciones, en ningún caso.","El activo afectado son las inversiones financieras.","Se trata de una aportación de los socios."],"c":[0,2],"e":"El aumento de valor registrado de un activo es un ingreso (incremento de PN no procedente de socios); el elemento afectado es la inversión financiera.","id":"h2_13"},{"t":2,"d":3,"ref":false,"q":"Según la definición de gastos:","o":["Son decrementos en el patrimonio neto durante el ejercicio.","Pueden producirse por salidas o disminuciones de valor de los activos.","Pueden producirse por reconocimiento o aumento del valor de los pasivos.","Incluyen las distribuciones, monetarias o no, a los socios."],"c":[0,1,2],"e":"Los gastos disminuyen el PN vía activos o pasivos, EXCLUYENDO las distribuciones a socios (dividendos, reducciones de capital).","id":"h2_14"},{"t":2,"d":3,"ref":false,"q":"Indica en qué casos se produce un gasto:","o":["La empresa concede a un cliente un descuento de 600 € por volumen, minorando el derecho de cobro.","La cotización de unas acciones de la empresa cae 20.000 € y se corrige su valor.","La empresa paga 600 € en efectivo a un proveedor.","La empresa reduce capital devolviendo 100.000 € a los accionistas."],"c":[0,1],"e":"El descuento concedido (menos activo) y la caída de valor registrada son gastos. El pago a proveedores permuta activo por pasivo y la reducción de capital es distribución a socios.","id":"h2_15"},{"t":2,"d":3,"ref":false,"q":"Para reconocer un activo se requiere:","o":["Probabilidad de obtención de beneficios o rendimientos futuros.","Que su valor pueda determinarse con fiabilidad.","Que se haya recibido el bien y los riesgos inherentes recaigan sobre la empresa.","Que el bien esté completamente pagado."],"c":[0,1,2],"e":"El reconocimiento exige probabilidad de beneficios, valoración fiable y recepción con transferencia de riesgos; el pago es irrelevante (puede deberse).","id":"h2_16"},{"t":2,"d":3,"ref":false,"q":"Una maquinaria comprada para el proceso productivo ya ha llegado a la empresa, aunque todavía no está instalada:","o":["Debe registrarse como activo: se ha recibido el bien y los riesgos recaen sobre la empresa.","No se registra hasta que esté instalada y funcionando.","La falta de instalación impide que su valor se determine con fiabilidad.","Los costes de instalación pendientes formarán parte de su precio de adquisición."],"c":[0,3],"e":"Recibido el bien con sus riesgos, se reconoce el activo; la instalación posterior se incorpora al precio de adquisición.","id":"h2_17"},{"t":2,"d":3,"ref":false,"q":"Para el reconocimiento de un ingreso por actividades ordinarias se debe:","o":["Identificar el contrato y las obligaciones a cumplir en él.","Determinar el precio de la transacción y asignarlo a cada bien o servicio comprometido.","Reconocer el ingreso cuando (o a medida que) la empresa cumple una obligación mediante la transferencia del control del bien o servicio.","Esperar en todo caso al cobro efectivo."],"c":[0,1,2],"e":"Son los pasos del reconocimiento de ingresos; el ingreso se reconoce al transferir el control, no al cobrar.","id":"h2_18"},{"t":2,"d":3,"ref":false,"q":"Para el reconocimiento de un gasto:","o":["Debe poder determinarse o estimarse con fiabilidad.","Según el principio de devengo, se reconoce cuando se produce la corriente real (consumo de productos o servicios).","Cuando proceda, hay que tener en cuenta la correlación de ingresos y gastos.","Se reconoce únicamente cuando se paga."],"c":[0,1,2],"e":"El gasto sigue la corriente real (consumo) y la correlación con los ingresos; el pago es la corriente financiera.","id":"h2_19"},{"t":2,"d":3,"ref":false,"q":"Sobre la correlación de ingresos y gastos:","o":["En las mercaderías existe una relación directa entre las ventas y las compras necesarias para realizarlas.","Los ingresos y gastos no vinculables a ingresos concretos pueden distribuirse linealmente en función del tiempo del contrato.","En algunos gastos hay que hacer estimaciones, como la amortización o los deterioros.","La correlación permite registrar activos o pasivos que no cumplan su definición."],"c":[0,1,2],"e":"La correlación nunca justifica registrar elementos que no cumplan las definiciones de activo o pasivo.","id":"h2_20"},{"t":2,"d":3,"ref":false,"q":"Si el ingreso asociado a un gasto no está asegurado:","o":["El gasto debe reconocerse en el periodo en el que se duda de su viabilidad.","El gasto puede mantenerse en el balance como activo indefinidamente.","No pueden figurar en el balance elementos que no cumplan la definición de activo.","El gasto se aplaza hasta que el ingreso se materialice."],"c":[0,2],"e":"Ante la duda, el gasto se reconoce ya; mantenerlo «activado» violaría la definición de activo.","id":"h2_21"},{"t":2,"d":3,"ref":false,"q":"Una empresa presenta activo total de 100.000 € y pasivos por 63.000 €:","o":["Su patrimonio neto es de 37.000 €.","Su patrimonio neto es de 163.000 €.","Si otra empresa tiene patrimonio neto de 20.000 € y pasivo de 45.000 €, su activo es de 65.000 €.","La ecuación fundamental es Activo = Pasivo + Patrimonio Neto."],"c":[0,2,3],"e":"PN = 100.000 − 63.000 = 37.000 €; A = 45.000 + 20.000 = 65.000 €.","id":"h2_22"},{"t":2,"d":3,"ref":false,"q":"La ecuación fundamental del patrimonio puede expresarse como:","o":["Estructura económica = Estructura financiera.","Inversiones = Fuentes de financiación.","Aplicaciones de fondos = Orígenes de fondos.","Inversiones = Aplicaciones de fondos del pasivo."],"c":[0,1,2],"e":"La estructura económica (inversiones, aplicaciones) se iguala con la financiera (fuentes, orígenes).","id":"h2_23"},{"t":2,"d":3,"ref":false,"q":"Según el criterio financiero de ordenación del balance:","o":["El activo se ordena de menor a mayor liquidez.","El pasivo y el patrimonio neto se ordenan de menor a mayor exigibilidad.","La distinción entre corriente y no corriente atiende a la permanencia menor o mayor de un año.","El patrimonio neto es la fuente de financiación más exigible."],"c":[0,1,2],"e":"El PN es la fuente MENOS exigible. Activo por liquidez creciente, financiación por exigibilidad creciente, con umbral de un año para corriente/no corriente.","id":"h2_24"},{"t":2,"d":3,"ref":false,"q":"Clasifica correctamente las siguientes partidas en las rúbricas del activo:","o":["Las mercaderías del almacén forman parte del realizable condicionado (activo corriente).","Los derechos de cobro sobre clientes forman parte del realizable cierto.","El dinero en caja y bancos constituye el disponible.","Una aplicación informática es activo corriente disponible."],"c":[0,1,2],"e":"Existencias = realizable condicionado; clientes = realizable cierto; tesorería = disponible. Las aplicaciones informáticas son inmovilizado INTANGIBLE (activo no corriente).","id":"h2_25"},{"t":2,"d":3,"ref":false,"q":"Dentro del activo no corriente se incluyen:","o":["El inmovilizado intangible y el inmovilizado material.","Las inversiones inmobiliarias.","Las inversiones financieras a largo plazo.","Los derechos de cobro sobre clientes por operaciones ordinarias."],"c":[0,1,2],"e":"Los clientes son activo CORRIENTE (realizable cierto). El ANC incluye intangible, material, inversiones inmobiliarias y financieras a largo plazo.","id":"h2_26"},{"t":2,"d":3,"ref":false,"q":"La financiación básica de la empresa está formada por:","o":["El patrimonio neto.","El pasivo no corriente.","El pasivo corriente.","Patrimonio neto + pasivo no corriente."],"c":[0,1,3],"e":"Financiación básica = PN + pasivo no corriente (recursos permanentes). El pasivo corriente no forma parte de ella.","id":"h2_27"},{"t":2,"d":3,"ref":false,"q":"Además del criterio financiero, las masas patrimoniales pueden ordenarse según:","o":["El criterio económico: la estructura económica según la rentabilidad de los bienes y la financiera según el coste o no de las fuentes.","El criterio funcional: activos funcionales y extrafuncionales.","El criterio funcional: en el pasivo, créditos de provisión y de financiamiento.","El criterio alfabético establecido en el PGC."],"c":[0,1,2],"e":"Los tres criterios de ordenación son el financiero, el económico y el funcional; no existe un criterio alfabético del PGC.","id":"h2_28"},{"t":2,"d":3,"ref":false,"q":"Las cuentas:","o":["Son instrumentos conceptuales que captan y representan cada elemento patrimonial y su evolución.","Se registran materialmente en el libro Mayor.","El libro Mayor es un instrumento material.","Son documentos que sustituyen al balance de situación."],"c":[0,1,2],"e":"La cuenta es el instrumento conceptual; el Mayor, el soporte material donde se registran. No sustituyen al balance.","id":"h2_29"},{"t":2,"d":3,"ref":false,"q":"Relaciona correctamente las funciones de las cuentas:","o":["Representación: representar individualizadamente cada objeto económico y sus variaciones.","Histórica: registrar por orden temporal todas las variaciones de los elementos.","Numérica: mostrar los cargos, abonos y el saldo del elemento en un momento determinado.","Agregación: discriminar los diferentes elementos patrimoniales."],"c":[0,1,2],"e":"La agregación consiste en AGRUPAR elementos homogéneos; discriminar y clasificar es la función CLASIFICATIVA.","id":"h2_30"},{"t":2,"d":3,"ref":false,"q":"En la anotación en las cuentas:","o":["Cargar una cuenta es anotar en el Debe.","Abonar una cuenta es anotar en el Haber.","Las cuentas de activo aumentan por el Debe y disminuyen por el Haber.","Las cuentas de pasivo y de patrimonio neto aumentan por el Debe."],"c":[0,1,2],"e":"Pasivo y PN funcionan al revés que el activo: aumentan por el Haber y disminuyen por el Debe.","id":"h2_31"},{"t":2,"d":3,"ref":false,"q":"Una empresa cobra en efectivo 600 € de un cliente. El reflejo contable correcto es:","o":["Cargar la cuenta de Caja por 600 €.","Abonar la cuenta de Clientes por 600 €.","Cargar la cuenta de Clientes por 600 €.","Se trata de una permuta de activos: aumenta la tesorería y disminuye el derecho de cobro."],"c":[0,1,3],"e":"Caja (activo) aumenta → se carga; Clientes (activo) disminuye → se abona. No hay ingreso: es un intercambio de activos.","id":"h2_32"},{"t":2,"d":3,"ref":false,"q":"Una cuenta presenta suma del Debe de 90 y suma del Haber de 40; otra, Debe de 20 y Haber de 75:","o":["La primera tiene saldo deudor de 50.","La segunda tiene saldo acreedor de 55.","La primera tiene saldo acreedor de 50.","Si las sumas coinciden, el saldo es nulo."],"c":[0,1,3],"e":"Saldo = ∑D − ∑H: 90 − 40 = 50 deudor; 20 − 75 = −55 → acreedor de 55; sumas iguales → saldo nulo.","id":"h2_33"},{"t":2,"d":3,"ref":false,"q":"En función del estado contable en que se presentan, las cuentas se clasifican en:","o":["Cuentas de balance: de activo, de pasivo y de patrimonio neto.","Cuentas de gestión o de resultados: de gastos y de ingresos.","Las cuentas de gestión figuran en el balance de situación.","Las cuentas de balance recogen los gastos del ejercicio."],"c":[0,1],"e":"Las cuentas de gestión (gastos e ingresos) van a la cuenta de resultados, no al balance; las de balance recogen A, P y PN.","id":"h2_34"},{"t":2,"d":3,"ref":false,"q":"En función de la naturaleza del elemento que representan, las cuentas se clasifican en:","o":["Integrales: representativas de elementos patrimoniales.","Diferenciales: surgen de la gestión y recogen los beneficios o pérdidas de las operaciones.","Correctoras: creadas contablemente, sin entidad real, como la amortización acumulada o la variación de existencias.","El patrimonio neto y el resultado del ejercicio son cuentas integrales."],"c":[0,1,2],"e":"PN, resultado de explotación o resultado del ejercicio son cuentas DIFERENCIALES, no integrales.","id":"h2_35"},{"t":2,"d":3,"ref":false,"q":"Los hechos contables:","o":["Son hechos económicos que afectan o pueden afectar, cuantitativa o cualitativamente, al patrimonio.","Afectan o pueden afectar a la situación de equilibrio o desequilibrio patrimonial de partida.","Se representan mediante asientos contables siguiendo el método de la partida doble.","Sólo incluyen las operaciones de compraventa."],"c":[0,1,2],"e":"Cualquier hecho económico con efecto patrimonial (cuantitativo o cualitativo) es hecho contable, no sólo las compraventas.","id":"h2_36"},{"t":2,"d":3,"ref":false,"q":"Sobre el equilibrio patrimonial:","o":["Equilibrio total: el activo supera al pasivo, de modo que el patrimonio neto es positivo.","Equilibrio parcial: se comparan masas con igual grado de liquidez y exigibilidad.","Que el activo corriente supere al pasivo corriente es un ejemplo de equilibrio parcial.","Que el activo no corriente sea inferior a la financiación básica es un desequilibrio."],"c":[0,1,2],"e":"ANC < financiación básica (PN + PNC) es precisamente una situación de EQUILIBRIO parcial, no de desequilibrio.","id":"h2_37"},{"t":2,"d":3,"ref":false,"q":"Una empresa presenta: activo no corriente 95, activo corriente 20, capital social 75, resultado del ejercicio −85 y pasivo 125:","o":["Su patrimonio neto es negativo (−10).","Se encuentra en situación de desequilibrio patrimonial.","El activo total (115) es inferior al pasivo (125).","Se encuentra en equilibrio total porque activo y financiación suman lo mismo."],"c":[0,1,2],"e":"PN = 75 − 85 = −10 < 0 y A (115) < P (125): desequilibrio. Que el balance «cuadre» no implica equilibrio patrimonial.","id":"h2_38"},{"t":2,"d":3,"ref":false,"q":"El método de la partida doble:","o":["Parte de que toda transacción afecta simultáneamente, al menos, a dos componentes patrimoniales.","Establece entre los componentes una relación de causa a efecto.","Para cada hecho se refleja su origen o causa y su término o efecto, junto con la cuantía.","Sólo se aplica a las operaciones de importe superior a 3.000 €."],"c":[0,1,2],"e":"La partida doble se aplica a TODO hecho contable, cualquiera que sea su importe.","id":"h2_39"},{"t":2,"d":3,"ref":false,"q":"Antes de realizar un asiento, la hoja de razonamiento contable básico identifica:","o":["El elemento patrimonial y su tipo (bien, derecho u obligación).","La masa a la que pertenece (activo, pasivo o patrimonio neto).","La variación (aumento o disminución) y la anotación (Debe o Haber).","El nombre del auditor de la empresa."],"c":[0,1,2],"e":"La hoja de razonamiento recoge: elemento, tipo, masa, variación, anotación e importe.","id":"h2_40"},{"t":2,"d":3,"ref":false,"q":"Una empresa compra mercaderías a crédito por 500 €. El asiento correcto es:","o":["Cargar Mercaderías por 500 € (aumento de activo).","Abonar Proveedores por 500 € (aumento de pasivo).","Cargar Proveedores y abonar Mercaderías.","La operación afecta simultáneamente a dos elementos patrimoniales."],"c":[0,1,3],"e":"Aumenta el activo (mercaderías, al Debe) y aumenta el pasivo (proveedores, al Haber): partida doble.","id":"h2_41"},{"t":2,"d":3,"ref":false,"q":"El libro Diario:","o":["Registra cronológicamente los hechos contables mediante asientos.","Es obligatorio desde el punto de vista legal y principal desde el punto de vista contable.","Desarrolla la función de coordinación contable, reflejando causa y efecto de cada hecho.","Es voluntario desde el punto de vista legal."],"c":[0,1,2],"e":"El Diario es legalmente OBLIGATORIO. Registra por orden cronológico con partida doble.","id":"h2_42"},{"t":2,"d":3,"ref":false,"q":"El libro Mayor:","o":["Recoge las cuentas: cada hoja corresponde a una cuenta que representa un elemento patrimonial.","Recibe las anotaciones a partir de los hechos reflejados en los asientos del Diario.","Es un libro voluntario desde el punto de vista legal, aunque la práctica contable lo hace imprescindible.","Es un libro obligatorio desde el punto de vista legal."],"c":[0,1,2],"e":"El Mayor es voluntario legalmente pero principal e imprescindible en la práctica; se alimenta del Diario.","id":"h2_43"},{"t":2,"d":3,"ref":false,"q":"Compara el libro Diario y el libro Mayor:","o":["El Diario registra por orden cronológico; el Mayor recoge el movimiento cuenta a cuenta.","El Diario es obligatorio legalmente; el Mayor, voluntario.","Ambos son libros principales desde el punto de vista contable.","El Mayor registra las operaciones por estricto orden cronológico y el Diario por cuentas."],"c":[0,1,2],"e":"La opción D invierte los papeles: el orden cronológico es del Diario y la agrupación por cuentas del Mayor.","id":"h2_44"},{"t":2,"d":3,"ref":false,"q":"La empresa BILBAO, S.A. tiene maderas adquiridas para su venta por 32.000 € y ordenadores que utiliza en su actividad por 2.200 €:","o":["Las maderas son mercaderías: activo corriente (realizable condicionado).","Los ordenadores son inmovilizado material: activo no corriente.","Las maderas son inmovilizado material porque son bienes tangibles.","Ambos elementos forman parte de la estructura económica (inversiones)."],"c":[0,1,3],"e":"Lo que se destina a la venta es existencias (corriente); lo que se usa en la actividad de forma duradera, inmovilizado (no corriente). Todos los activos integran la estructura económica.","id":"h2_45"},{"t":2,"d":3,"ref":false,"q":"La empresa BILBAO, S.A. tiene un préstamo recibido a devolver en 9 meses y un préstamo concedido a otra empresa que cobrará dentro de 6 meses:","o":["El préstamo recibido es un pasivo corriente.","El préstamo concedido es un activo corriente (derecho de cobro).","Ambos son pasivos.","El préstamo recibido es un pasivo no corriente por ser bancario."],"c":[0,1],"e":"Recibido a devolver en <1 año → pasivo corriente; concedido a cobrar en <1 año → activo corriente. La naturaleza bancaria no determina el plazo.","id":"h2_46"},{"t":2,"d":3,"ref":false,"q":"En la empresa BILBAO, S.A., los beneficios de ejercicios anteriores no distribuidos y las aportaciones de capital de los socios:","o":["Son reservas y capital social, respectivamente.","Forman parte del patrimonio neto.","Son pasivos exigibles a corto plazo.","Forman parte de la estructura financiera de la empresa."],"c":[0,1,3],"e":"Reservas y capital son patrimonio neto (financiación propia, no exigible) y, como toda fuente de financiación, integran la estructura financiera.","id":"h2_47"},{"t":2,"d":3,"ref":false,"q":"Obligaciones de pago con suministradores de mercaderías por 4.000 €, parte de ellas documentadas en efectos de giro por 1.300 €:","o":["Las primeras corresponden a la cuenta de Proveedores.","Las documentadas en efectos de giro corresponden a Proveedores, efectos comerciales a pagar.","Ambas son pasivo corriente.","Los efectos de giro son un derecho de cobro para la empresa."],"c":[0,1,2],"e":"Las deudas con suministradores son proveedores (y efectos a pagar si están documentadas en giros): pasivo corriente. Para la empresa deudora no son derechos de cobro.","id":"h2_48"},{"t":2,"d":3,"ref":false,"q":"Al evaluar si una partida cumple la definición de activo, pasivo o patrimonio neto:","o":["Se atenderá a su fondo económico y no sólo a su forma jurídica.","Prevalece la forma jurídica del contrato.","Es el criterio de la preeminencia del fondo sobre la forma.","Una furgoneta usada en régimen de arrendamiento financiero puede cumplir la definición de activo aunque jurídicamente no sea propiedad de la empresa."],"c":[0,2,3],"e":"El fondo económico prevalece sobre la forma jurídica: el control económico (como en el leasing) determina el registro como activo.","id":"h2_49"},{"t":3,"d":1,"ref":false,"q":"El ciclo contable:","o":["Es el conjunto de operaciones contables que se realizan durante el ejercicio económico y finaliza con la elaboración de los estados contables.","Consta de tres etapas: inicio o apertura de la contabilidad, desarrollo o registro de los hechos contables y cierre del ejercicio.","Es necesario porque la vida de la empresa se considera ilimitada y hay que acotarla en periodos más pequeños.","Finaliza con el asiento de apertura del ejercicio siguiente."],"c":[0,1,2],"e":"El ciclo contable abarca las operaciones del ejercicio y termina con los estados contables. Sus tres etapas son apertura, desarrollo y cierre. Surge de la necesidad de dividir la vida ilimitada de la empresa en periodos para observar su situación e informar a los usuarios.","id":"q3_00"},{"t":3,"d":1,"ref":false,"q":"El balance de situación inicial:","o":["Incluye todos los elementos de activo, pasivo y patrimonio neto del patrimonio empresarial en ese momento.","Coincide con el balance de situación final del ejercicio anterior.","Coincide con el inventario (recuento físico de elementos) realizado por la empresa.","Recoge únicamente los elementos del activo corriente y del pasivo corriente."],"c":[0,1,2],"e":"El balance inicial recoge todo el patrimonio (activo, pasivo y neto), coincide con el balance final del ejercicio anterior y con el inventario. No se limita a las masas corrientes.","id":"q3_01"},{"t":3,"d":1,"ref":false,"q":"El asiento de apertura:","o":["Es el primer asiento del libro Diario del ejercicio.","Se realiza el primer día del ejercicio económico.","Su estructura es: cuentas de saldo deudor a cuentas de saldo acreedor.","Su estructura es: cuentas de saldo acreedor a cuentas de saldo deudor."],"c":[0,1,2],"e":"El asiento de apertura abre la contabilidad: es el primer asiento del Diario, se realiza el primer día del ejercicio y carga las cuentas de saldo deudor abonando las de saldo acreedor. La estructura inversa corresponde al asiento de CIERRE.","id":"q3_02"},{"t":3,"d":1,"ref":false,"q":"En relación con el inventario:","o":["Es la relación, detallada y valorada, del conjunto de bienes, derechos y obligaciones que constituyen el patrimonio de la empresa en un momento determinado.","Su elaboración exige el recuento físico de los elementos de activo y pasivo.","El patrimonio neto surge por diferencia entre los activos y los pasivos.","Se recoge materialmente en el libro Diario."],"c":[0,1,2],"e":"El inventario es la relación detallada y valorada del patrimonio, exige recuento físico y el neto surge por diferencia (A − P). Materialmente se recoge en el libro de «Inventarios y Cuentas Anuales», no en el Diario.","id":"q3_03"},{"t":3,"d":1,"ref":false,"q":"En relación con la amortización de los terrenos:","o":["Los terrenos, con carácter general, no se amortizan.","No se ven afectados por las causas de depreciación (uso, paso del tiempo u obsolescencia).","Son elementos del activo no corriente.","Se amortizan igual que las construcciones."],"c":[0,1,2],"e":"Los terrenos no sufren depreciación sistemática por uso, tiempo u obsolescencia, por lo que no se amortizan (a diferencia de las construcciones). Son inmovilizado: activo no corriente.","id":"q3_04"},{"t":3,"d":1,"ref":false,"q":"El resultado empresarial:","o":["Es una magnitud flujo: la corriente de renta generada durante un periodo de tiempo.","Si supone una disminución de riqueza, se denomina pérdida o resultado negativo.","Si supone un aumento de riqueza, se denomina beneficio o resultado positivo.","Es una magnitud fondo, referida a un momento concreto del tiempo."],"c":[0,1,2],"e":"El resultado es una magnitud FLUJO (renta generada en un periodo), no fondo. Aumento de riqueza = beneficio; disminución = pérdida.","id":"q3_05"},{"t":3,"d":2,"ref":false,"q":"Diferencias entre el inventario y el balance de situación:","o":["El balance tiene un carácter contable, mientras que el inventario exige el recuento físico de los elementos.","El inventario presenta la información más detallada y desglosada que el balance.","El balance está ordenado en masas patrimoniales.","El inventario y el balance son documentos idénticos con distinto nombre."],"c":[0,1,2],"e":"El balance es un documento contable, sintético y ordenado en masas patrimoniales; el inventario es más detallado y desglosado y procede del recuento físico. No son idénticos.","id":"q3_06"},{"t":3,"d":2,"ref":false,"q":"Según la clasificación de los inventarios:","o":["Por su carácter pueden ser obligatorios y voluntarios.","Por su extensión o contenido pueden ser totales y parciales.","Por su temporalidad pueden ser iniciales o de apertura, de desarrollo y finales o de cierre.","Por las unidades de medida en que se expresen pueden ser ordinarios y extraordinarios."],"c":[0,1,2],"e":"Carácter: obligatorios/voluntarios. Extensión: totales/parciales. Temporalidad: iniciales, de desarrollo y finales. Por las unidades de medida son FÍSICOS y ECONÓMICOS; ordinarios/extraordinarios es la clasificación por su CAUSA.","id":"q3_07"},{"t":3,"d":2,"ref":false,"q":"¿Puede calcularse el resultado del ejercicio a partir del inventario?","o":["Sí, comparando dos inventarios correspondientes a momentos diferentes del tiempo.","No, el inventario nunca permite calcular el resultado.","Sí, pero con el problema de que no proporciona información sobre el modo y las causas que han generado el resultado.","Sí, y además informa detalladamente de las causas que han generado el resultado."],"c":[0,2],"e":"Comparando dos inventarios de momentos distintos se obtiene la variación de riqueza (resultado), pero este método no informa del modo ni de las causas que lo han generado.","id":"q3_08"},{"t":3,"d":2,"ref":false,"q":"El balance de comprobación o de sumas y saldos:","o":["Debe realizarse, al menos, de forma trimestral.","Sirve de comprobación para verificar si el proceso registral se ha realizado correctamente.","Proporciona información a los usuarios distinta a la anual.","Sólo puede realizarse una vez al año, coincidiendo con el cierre del ejercicio."],"c":[0,1,2],"e":"El balance de comprobación se elabora al menos trimestralmente, verifica el proceso registral y ofrece información con periodicidad distinta a la anual. Puede realizarse tantas veces como quiera la empresa.","id":"q3_09"},{"t":3,"d":2,"ref":false,"q":"El asiento de cierre:","o":["Incluye todas las cuentas que tienen saldo deudor o acreedor en el libro Mayor.","Su estructura es: cuentas de saldo acreedor a cuentas de saldo deudor.","Tras trasladarlo al libro Mayor, todas las cuentas quedan con saldo nulo.","Se realiza antes de las operaciones de regularización, correcciones valorativas y periodificación."],"c":[0,1,2],"e":"El asiento de cierre recoge todas las cuentas con saldo, cargando las de saldo acreedor y abonando las de saldo deudor, y deja todas las cuentas a cero. Las operaciones de cierre (regularización, correcciones, periodificación, reclasificación) se realizan ANTES.","id":"q3_10"},{"t":3,"d":2,"ref":false,"q":"Entre las operaciones de cierre del ejercicio que hay que realizar antes del asiento de cierre se encuentran:","o":["La regularización de cuentas que han seguido un procedimiento de contabilización especulativo.","Las correcciones valorativas.","La periodificación de ingresos y gastos.","La reclasificación de cuentas."],"c":[0,1,2,3],"e":"Todas son correctas: son las cuatro operaciones previas al asiento de cierre, necesarias para calcular el resultado del ejercicio (la reclasificación afecta al balance).","id":"q3_11"},{"t":3,"d":2,"ref":false,"q":"En el procedimiento especulativo de cuenta única:","o":["La cuenta se carga a precio de coste.","La cuenta se abona a precio de venta.","El saldo de la cuenta, antes de la regularización, es representativo de la situación del elemento.","La regularización consiste en separar la parte integral y la parte diferencial (resultado) de la cuenta."],"c":[0,1,3],"e":"En el especulativo de cuenta única se carga a coste y se abona a precio de venta, por lo que el saldo incluye el resultado y NO es representativo de la situación del elemento. Al regularizar se separa la parte integral (queda en la cuenta) de la diferencial (va a resultado de explotación).","id":"q3_12"},{"t":3,"d":2,"ref":false,"q":"En el procedimiento especulativo de cuenta única, al regularizar la cuenta de mercaderías:","o":["Si el resultado es positivo, el asiento es «Mercaderías a Resultado de explotación».","Si el resultado es negativo, el asiento es «Resultado de explotación a Mercaderías».","Antes de regularizar, el saldo de Mercaderías no refleja el valor de las existencias finales.","Si hay beneficio, el asiento es «Resultado de explotación a Mercaderías»."],"c":[0,1,2],"e":"En cuenta única el saldo de Mercaderías es heterogéneo (compras a coste y ventas a precio de venta), por lo que se ajusta a las existencias finales llevando la diferencia a resultados: con beneficio, «Mercaderías a Resultado de explotación»; con pérdida, el inverso.","id":"q3_13"},{"t":3,"d":2,"ref":false,"q":"Las correcciones valorativas incluyen:","o":["Las pérdidas ciertas, que se contabilizan conforme se van produciendo.","La amortización del inmovilizado intangible y material.","Los derechos de cobro incobrables, como ejemplo de pérdida cierta.","La amortización de los terrenos."],"c":[0,1,2],"e":"Las correcciones valorativas comprenden las pérdidas ciertas (p. ej., incobrables, incendios) y la amortización del inmovilizado intangible y material. Los terrenos NO se amortizan.","id":"q3_14"},{"t":3,"d":2,"ref":false,"q":"La amortización del inmovilizado:","o":["Es el reflejo contable de una pérdida de valor cierta, sistemática e irreversible.","La depreciación funcional se debe al uso del elemento.","La depreciación física se debe al paso del tiempo.","La depreciación económica se debe a las nuevas tecnologías, cambios de moda, etc. (obsolescencia)."],"c":[0,1,2,3],"e":"Todas son correctas: la amortización refleja una pérdida cierta, sistemática e irreversible, cuyas causas son el uso (funcional), el paso del tiempo (física) y la obsolescencia (económica).","id":"q3_15"},{"t":3,"d":2,"ref":false,"q":"En relación con los métodos de contabilización de la amortización:","o":["En el método directo, la depreciación se refleja en la propia cuenta del activo no corriente.","En el método indirecto, la depreciación se refleja en la cuenta correctora «Amortización acumulada del inmovilizado».","Con el método indirecto, los elementos se presentan en el balance por su valor contable.","El método indirecto hace desaparecer del balance el valor inicial del elemento."],"c":[0,1,2],"e":"Directo: se abona la propia cuenta del activo. Indirecto: se usa la correctora «Amortización acumulada», conservando el valor inicial del activo y presentándolo por su valor contable (Vo − AA).","id":"q3_16"},{"t":3,"d":2,"ref":false,"q":"En relación con los conceptos utilizados en la amortización:","o":["El valor inicial (Vo) es el valor del elemento en el momento de su incorporación a la empresa.","La base de amortización o valor amortizable es la suma del valor inicial y el valor residual (Va = Vo + Vr).","La vida útil (n) es el periodo que dura el proceso amortizativo.","Los sistemas de amortización financieros tienen en cuenta el posible rendimiento de la inversión de los recursos generados por la amortización."],"c":[0,2,3],"e":"La base de amortización es la DIFERENCIA entre valor inicial y residual: Va = Vo − Vr. Lo demás es correcto; los sistemas no financieros (lineal, números dígitos, etc.) no consideran el rendimiento de esos recursos.","id":"q3_17"},{"t":3,"d":2,"ref":false,"q":"Los componentes del resultado del ejercicio son:","o":["Resultado de la explotación: gastos e ingresos que surgen de la actividad principal de la empresa.","Resultado ajeno a la explotación: gastos e ingresos de operaciones habituales que no constituyen la actividad principal.","Resultado atípico: gastos e ingresos de operaciones esporádicas, no recurrentes y no habituales.","Resultado atípico: gastos e ingresos derivados de la actividad principal de la empresa."],"c":[0,1,2],"e":"Explotación = actividad principal; ajeno a la explotación = operaciones habituales no principales; atípico = operaciones esporádicas y no recurrentes.","id":"q3_18"},{"t":3,"d":2,"ref":false,"q":"La reclasificación de cuentas incluidas en el balance:","o":["Persigue dejar las cuentas con sus verdaderos importes y significado.","Un ejemplo es el paso de deudas del largo plazo al corto plazo.","Afecta al balance.","Se realiza únicamente al inicio del ejercicio económico."],"c":[0,1,2],"e":"La reclasificación ajusta importes y significado de las cuentas (p. ej., la parte de una deuda a largo que vence el próximo año pasa a corto plazo) y afecta al balance. Es una operación de CIERRE del ejercicio.","id":"q3_19"},{"t":3,"d":2,"ref":false,"q":"En relación con el resultado total y el resultado periódico:","o":["El resultado total es la diferencia entre el valor invertido en la constitución de la empresa y su valor de liquidación.","El resultado total es el único fiable y exacto, pues mide la variación de riqueza a lo largo de toda la vida de la empresa.","El resultado periódico es una magnitud relativa y temporal.","El resultado periódico es exacto porque su cálculo no requiere estimaciones."],"c":[0,1,2],"e":"El resultado total (constitución → liquidación) es el único fiable y exacto. El periódico es relativo (requiere estimaciones y decisiones sobre criterios de reconocimiento y valoración) y temporal (se refiere a un periodo concreto).","id":"q3_20"},{"t":3,"d":2,"ref":false,"q":"En la distribución del beneficio:","o":["Primero se compensan las pérdidas de ejercicios anteriores y se dotan las reservas obligatorias.","Si quedan fondos excedentarios, pueden distribuirse a los accionistas en forma de dividendos.","Si quedan fondos excedentarios, pueden dejarse en la empresa como reservas voluntarias.","Las pérdidas sólo pueden compensarse con la aportación de nuevos fondos por los accionistas."],"c":[0,1,2],"e":"El orden es: compensar pérdidas anteriores, dotar reservas obligatorias y, con el excedente, repartir dividendos o dotar reservas voluntarias. Las pérdidas pueden compensarse con beneficios futuros, con cargo a reservas o con nuevas aportaciones.","id":"q3_21"},{"t":3,"d":3,"ref":false,"q":"Una empresa lleva su cuenta de mercaderías por el procedimiento especulativo de cuenta única. Datos del ejercicio: compras 8.000 €, ventas 12.000 €, existencias iniciales 2.000 € y existencias finales 3.000 €:","o":["El resultado de la explotación es de 5.000 € de beneficio.","El resultado de la explotación es de 4.000 € de beneficio.","El resultado puede calcularse como: Ventas − Compras + Existencias finales − Existencias iniciales.","Las existencias finales son un dato que proporciona el propio libro Mayor."],"c":[0,2],"e":"Resultado = Ventas − Compras + Ef − Ei = 12.000 − 8.000 + 3.000 − 2.000 = 5.000 € (o Haber − Debe + Ef = 12.000 − 10.000 + 3.000 = 5.000). Las existencias finales son un dato EXTRACONTABLE: se obtienen por recuento físico en el almacén.","id":"q3_22"},{"t":3,"d":3,"ref":false,"q":"En el procedimiento especulativo desglosado, son cuentas de GASTOS:","o":["Compras de mercaderías.","Devoluciones de ventas de mercaderías.","«Rappels» sobre ventas.","Devoluciones de compras de mercaderías."],"c":[0,1,2],"e":"Son gastos: compras (a precio de coste), devoluciones de ventas y rappels sobre ventas. Las devoluciones de compras y los rappels sobre compras son cuentas de INGRESOS, junto con las ventas.","id":"q3_23"},{"t":3,"d":3,"ref":false,"q":"La cuenta «Variación de existencias de mercaderías»:","o":["Es una cuenta correctora, creada contablemente y sin entidad real.","Puede tener saldo deudor, si disminuyen las existencias.","Puede tener saldo acreedor, si aumentan las existencias.","Se calcula con datos exclusivamente contables, sin necesidad de recuento físico."],"c":[0,1,2],"e":"Es una cuenta correctora sin entidad real. Su saldo es deudor si las existencias disminuyen (Ei > Ef) y acreedor si aumentan. Las existencias finales son un dato extracontable obtenido por recuento físico.","id":"q3_24"},{"t":3,"d":3,"ref":false,"q":"Entre los significados de la amortización se encuentran:","o":["Financiero: modo en que el inmovilizado se va convirtiendo en efectivo mediante el cobro de la venta de los productos o servicios.","Económico: estimación de la parte consumida del inmovilizado, que se incorpora a los costes de los productos.","Técnico: pérdida de capacidad para el proceso productivo.","Jurídico: cancelación registral del elemento patrimonial."],"c":[0,1,2],"e":"Los tres significados de la amortización son el financiero (conversión en efectivo), el económico (parte consumida que va a costes) y el técnico (pérdida de capacidad productiva). No existe un «significado jurídico».","id":"q3_25"},{"t":3,"d":3,"ref":false,"q":"Una empresa adquiere una máquina por 10.000 €, estima un valor residual de 1.000 € y una vida útil de 5 años. Si aplica el sistema lineal o de cuotas constantes:","o":["La cuota de amortización anual es de 1.800 €.","La cuota de amortización anual es de 2.000 €.","La base de amortización es de 9.000 €.","Transcurridos 3 años, el valor contable de la máquina es de 4.600 €."],"c":[0,2,3],"e":"Va = 10.000 − 1.000 = 9.000 €; cuota = 9.000 / 5 = 1.800 €/año. A los 3 años: AA = 5.400 € y valor contable = 10.000 − 5.400 = 4.600 €.","id":"q3_26"},{"t":3,"d":3,"ref":false,"q":"La periodificación contable de ingresos y gastos:","o":["Se realiza para determinar las cantidades de ingresos y gastos que corresponden al ejercicio en curso.","La parte que corresponde al ejercicio son los gastos e ingresos periódicos, que van a los asientos de cálculo del resultado.","La parte que no corresponde al ejercicio son los gastos e ingresos anticipados, que van al asiento de cierre y al balance de situación final.","Los gastos anticipados se incluyen en el cálculo del resultado del ejercicio en curso."],"c":[0,1,2],"e":"La periodificación separa lo periódico (va a resultado) de lo anticipado (va al cierre y al balance). Los gastos anticipados corresponden a ejercicios futuros, por lo que NO entran en el resultado del ejercicio en curso.","id":"q3_27"},{"t":3,"d":3,"ref":false,"q":"En relación con las magnitudes «del periodo» y «periódicas»:","o":["Magnitud del periodo es la que se produce en un periodo, aunque puede corresponder o no al mismo.","Magnitud periódica es la que corresponde a un periodo, se haya producido o no en el mismo.","Ambas magnitudes coinciden siempre.","Un gasto pagado este año que corresponde al año siguiente es una magnitud del periodo, pero no periódica."],"c":[0,1,3],"e":"«Del periodo» = se produce en él; «periódica» = le corresponde. Pueden no coincidir: un gasto producido (pagado) este año que corresponde al siguiente es del periodo pero no periódico (gasto anticipado).","id":"q3_28"},{"t":3,"d":3,"ref":false,"q":"Sobre los métodos de cálculo del resultado periódico:","o":["Método estático: Resultado = PN1 − PN0, es decir, (A1 − P1) − (A0 − P0).","Método dinámico: Resultado = Ingresos periódicos − Gastos necesarios para obtener dichos ingresos.","El método estático informa detalladamente de las causas que han generado el resultado.","Una empresa con patrimonio neto inicial de 50.000 € y final de 58.000 €, sin aportaciones ni retiradas de los socios, ha obtenido un beneficio de 8.000 € según el método estático."],"c":[0,1,3],"e":"El método estático compara patrimonios netos (58.000 − 50.000 = 8.000 € de beneficio) pero no explica las causas del resultado; eso lo hace el método dinámico a través de ingresos y gastos.","id":"q3_29"},{"t":3,"d":3,"ref":false,"q":"Según la distinción del PGC 2007, en el resultado del ejercicio:","o":["El resultado de explotación incluye el que hemos denominado resultado atípico.","El resultado financiero es la diferencia entre ingresos financieros y gastos financieros.","El resultado antes de impuestos es la suma del resultado de explotación y del resultado financiero.","Se distingue entre resultado procedente de operaciones continuadas y de operaciones interrumpidas."],"c":[0,1,2,3],"e":"Todas son correctas: el PGC 2007 integra el resultado atípico dentro del de explotación, calcula el financiero (IF − GF), suma ambos para el resultado antes de impuestos y distingue operaciones continuadas e interrumpidas.","id":"q3_30"},{"t":3,"d":3,"ref":false,"q":"La cuenta de Pérdidas y Ganancias puede presentarse:","o":["En forma de cuenta, con los ingresos y gastos clasificados por su naturaleza y los distintos tipos de resultados diferenciados.","En forma de lista, que es el modelo seguido por el PGC 2007.","El PGC 2007 sigue el modelo en forma de cuenta.","En forma de lista, se presentan los ingresos y, restando, los gastos relacionados con ellos."],"c":[0,1,3],"e":"Existen dos modelos: cuenta y lista. El PGC 2007 sigue el formato de LISTA, donde se presentan los ingresos y se van restando los gastos relacionados.","id":"q3_31"},{"t":3,"d":3,"ref":false,"q":"Para asegurar la capacidad de generar beneficios en el futuro:","o":["La remuneración a los accionistas no debe superar el beneficio generado.","Deben repartirse siempre todos los beneficios como dividendos.","La condición necesaria afecta a la política de dividendos de la empresa.","Re
