partir dividendos por encima del beneficio no tiene ninguna consecuencia para la empresa."],"c":[0,2],"e":"La condición necesaria es que la remuneración a los accionistas no supere el beneficio generado, lo que condiciona la política de dividendos; repartir de más descapitaliza la empresa.","id":"q3_32"},{"t":3,"d":3,"ref":false,"q":"Las etapas del ciclo contable, en su orden correcto, son:","o":["Inicio o apertura de la contabilidad; desarrollo o registro de los hechos contables; cierre del ejercicio.","Cierre del ejercicio; apertura; desarrollo.","El ciclo finaliza con la elaboración de los estados contables.","El ciclo comienza con el asiento de cierre."],"c":[0,2],"e":"Orden: apertura → desarrollo → cierre, finalizando con los estados contables.","id":"h3_00"},{"t":3,"d":3,"ref":false,"q":"El ciclo contable es necesario para:","o":["Acotar la vida ilimitada de la empresa en periodos más pequeños.","Observar la situación en un momento determinado y la evolución de la empresa por si hay que cambiar la gestión.","Proporcionar información a los usuarios para la toma de decisiones.","Eliminar la obligación de llevar el libro Diario."],"c":[0,1,2],"e":"El ciclo divide la vida ilimitada de la empresa en ejercicios para observar su evolución e informar a los usuarios.","id":"h3_01"},{"t":3,"d":3,"ref":false,"q":"En la apertura de la contabilidad:","o":["La contabilidad comienza con el balance de situación inicial.","Se realiza el asiento de apertura en el libro Diario con los elementos e importes del balance inicial.","Se traslada la información al libro Mayor, quedando abiertas todas las cuentas del asiento de apertura.","El primer paso es elaborar la cuenta de pérdidas y ganancias."],"c":[0,1,2],"e":"Secuencia de apertura: balance inicial → asiento de apertura en el Diario → traslado al Mayor. La PyG se elabora al cierre.","id":"h3_02"},{"t":3,"d":3,"ref":false,"q":"El asiento de apertura y el asiento de cierre:","o":["El de apertura carga las cuentas de saldo deudor y abona las de saldo acreedor.","El de cierre carga las cuentas de saldo acreedor y abona las de saldo deudor.","Tienen estructuras inversas.","Tienen exactamente la misma estructura."],"c":[0,1,2],"e":"Apertura: «cuentas de saldo deudor a cuentas de saldo acreedor»; cierre: la estructura inversa.","id":"h3_03"},{"t":3,"d":3,"ref":false,"q":"El inventario, frente al balance de situación:","o":["Exige el recuento físico de los elementos de activo y pasivo.","Presenta la información más detallada y desglosada.","Se recoge materialmente en el libro de Inventarios y Cuentas Anuales.","Se ordena en masas patrimoniales como el balance."],"c":[0,1,2],"e":"El inventario es detallado, procede del recuento físico y va al libro de Inventarios y Cuentas Anuales; el ordenado en masas patrimoniales es el BALANCE.","id":"h3_04"},{"t":3,"d":3,"ref":false,"q":"Según los criterios de clasificación de los inventarios:","o":["Por su causa pueden ser ordinarios y extraordinarios.","Por el origen de la información pueden ser contables y extracontables.","Por las unidades de medida pueden ser físicos y económicos.","Por su carácter pueden ser totales y parciales."],"c":[0,1,2],"e":"Por su CARÁCTER son obligatorios/voluntarios; totales/parciales es la clasificación por su EXTENSIÓN o contenido.","id":"h3_05"},{"t":3,"d":3,"ref":false,"q":"Un inventario realizado por imposición legal, que abarca todo el patrimonio y se elabora al terminar el ejercicio es:","o":["Obligatorio, por su carácter.","Total, por su extensión o contenido.","Final o de cierre, por su temporalidad.","Extraordinario, por su causa."],"c":[0,1,2],"e":"Obligatorio (carácter), total (extensión) y final (temporalidad). Sería ordinario, no extraordinario, si responde al cierre normal del ejercicio.","id":"h3_06"},{"t":3,"d":3,"ref":false,"q":"Comparando dos inventarios de la misma empresa en momentos distintos:","o":["Puede calcularse el resultado del periodo.","Se obtiene información completa del modo y las causas que generaron el resultado.","El patrimonio neto de cada inventario surge por diferencia entre activos y pasivos.","Es un cálculo imposible: el resultado sólo puede obtenerse de la cuenta de PyG."],"c":[0,2],"e":"La comparación de patrimonios netos da el resultado, pero sin explicar sus causas (esa es su limitación).","id":"h3_07"},{"t":3,"d":3,"ref":false,"q":"En un balance de comprobación o de sumas y saldos correctamente elaborado:","o":["El total de sumas del Debe coincide con el total de sumas del Haber.","El total de saldos deudores coincide con el total de saldos acreedores.","Se incluyen todas las cuentas con saldo en el libro Mayor.","El total de saldos deudores debe coincidir con el total de sumas del Debe."],"c":[0,1,2],"e":"Por partida doble, ∑Debe = ∑Haber y ∑saldos deudores = ∑saldos acreedores. Sumas y saldos son magnitudes distintas.","id":"h3_08"},{"t":3,"d":3,"ref":false,"q":"El balance de comprobación:","o":["Debe realizarse al menos trimestralmente.","Sirve para verificar si el proceso registral se ha realizado correctamente.","Garantiza que no existe ningún error de concepto en la contabilidad.","Proporciona información con periodicidad distinta a la anual."],"c":[0,1,3],"e":"Verifica la corrección del proceso registral (cuadres), pero no detecta errores de concepto (p. ej., un asiento en una cuenta equivocada con importes correctos).","id":"h3_09"},{"t":3,"d":3,"ref":false,"q":"Al contabilizar los hechos del ejercicio hay que tener en cuenta:","o":["La definición de los elementos y los criterios de registro y reconocimiento.","Los criterios y normas de valoración.","El método de la partida doble.","Únicamente el criterio de caja."],"c":[0,1,2],"e":"El registro del ejercicio exige definiciones, criterios de reconocimiento y valoración y partida doble; rige el devengo, no la caja.","id":"h3_10"},{"t":3,"d":3,"ref":false,"q":"Una empresa paga por banco una deuda con un proveedor de 2.000 €. En la hoja de razonamiento contable:","o":["Proveedores es una obligación (pasivo) que disminuye: se anota en el Debe.","Bancos es un bien (activo) que disminuye: se anota en el Haber.","Proveedores aumenta y se anota en el Haber.","El asiento es: Proveedores a Bancos, por 2.000 €."],"c":[0,1,3],"e":"Disminuye el pasivo (cargo a Proveedores) y disminuye el activo (abono a Bancos).","id":"h3_11"},{"t":3,"d":3,"ref":false,"q":"Las operaciones de cierre del ejercicio, previas al asiento de cierre:","o":["Incluyen la regularización de cuentas especulativas, las correcciones valorativas, la periodificación y la reclasificación.","Son necesarias para calcular el resultado del ejercicio.","La reclasificación de cuentas afecta al balance.","Se realizan después del asiento de cierre."],"c":[0,1,2],"e":"Las cuatro operaciones se realizan ANTES del asiento de cierre y permiten calcular el resultado.","id":"h3_12"},{"t":3,"d":3,"ref":false,"q":"En el procedimiento especulativo de cuenta única de mercaderías:","o":["Los cargos se hacen a precio de coste y los abonos a precio de venta.","El saldo mezcla la parte integral y la parte diferencial (resultado).","Antes de regularizar, el saldo no es representativo de la situación del elemento.","El saldo siempre coincide con el valor de las existencias en almacén."],"c":[0,1,2],"e":"Al cargar a coste y abonar a venta, el saldo incluye el resultado y no representa las existencias reales.","id":"h3_13"},{"t":3,"d":3,"ref":false,"q":"En la regularización de la cuenta única especulativa:","o":["La parte integral se deja en la cuenta llevada por el procedimiento especulativo.","La parte diferencial se lleva a una cuenta de carácter diferencial (resultado de la explotación).","Las existencias finales se obtienen del recuento físico en almacén (dato extracontable).","La parte diferencial permanece en la cuenta de mercaderías."],"c":[0,1,2],"e":"Regularizar es separar: la parte integral queda en la cuenta y la diferencial va al resultado de explotación; las existencias finales son extracontables.","id":"h3_14"},{"t":3,"d":3,"ref":false,"q":"Cuenta de mercaderías (única, especulativa): compras 15.000 €, ventas 22.000 €, existencias iniciales 4.000 €, existencias finales 6.000 €:","o":["Resultado = 22.000 − 15.000 + 6.000 − 4.000 = 9.000 € de beneficio.","Resultado = Haber − Debe + Existencias finales = 22.000 − 19.000 + 6.000 = 9.000 €.","El resultado es de 7.000 €.","El asiento de regularización será: Mercaderías a Resultado de explotación, por 9.000 €."],"c":[0,1,3],"e":"Ambas fórmulas dan 9.000 € (el Debe incluye Ei 4.000 + compras 15.000 = 19.000). Con beneficio: Mercaderías a Resultado de explotación.","id":"h3_15"},{"t":3,"d":3,"ref":false,"q":"Cuenta de mercaderías (única, especulativa): compras 10.000 €, ventas 8.000 €, existencias iniciales 3.000 €, existencias finales 2.500 €:","o":["El resultado es de −2.500 € (pérdida).","El resultado es de +2.500 € (beneficio).","El asiento de regularización será: Resultado de explotación a Mercaderías.","Tras la regularización, la cuenta de mercaderías refleja las existencias finales."],"c":[0,2,3],"e":"R = 8.000 − 10.000 + 2.500 − 3.000 = −2.500 € (pérdida) → asiento inverso: Resultado de explotación a Mercaderías. La cuenta queda por Ef.","id":"h3_16"},{"t":3,"d":3,"ref":false,"q":"En el procedimiento especulativo desglosado:","o":["La información se desglosa en varias cuentas de ingresos y gastos relacionadas con las mercaderías.","Las ventas de mercaderías se registran a precio de venta como cuenta de ingresos.","Las compras de mercaderías se registran a precio de coste como cuenta de gastos.","Todas las operaciones pasan por una única cuenta de mercaderías."],"c":[0,1,2],"e":"El desglosado usa varias cuentas (compras, ventas, devoluciones, rappels); la cuenta única es el otro procedimiento.","id":"h3_17"},{"t":3,"d":3,"ref":false,"q":"En el especulativo desglosado, son cuentas de INGRESOS:","o":["Ventas de mercaderías.","Devoluciones de compras de mercaderías.","«Rappels» sobre compras.","Devoluciones de ventas de mercaderías."],"c":[0,1,2],"e":"Ingresos: ventas, devoluciones de compras y rappels sobre compras. Las devoluciones de ventas (y los rappels sobre ventas) son gastos.","id":"h3_18"},{"t":3,"d":3,"ref":false,"q":"En la regularización de la cuenta de mercaderías con el procedimiento desglosado:","o":["Al comienzo del ejercicio la cuenta de mercaderías se carga por las existencias iniciales.","Al final del ejercicio se abona por las existencias iniciales y se carga por las finales.","La diferencia se recoge en la cuenta «Variación de existencias de mercaderías».","La cuenta de mercaderías se abona por las ventas del ejercicio."],"c":[0,1,2],"e":"En el desglosado, la cuenta de mercaderías sólo recoge existencias (Ei y Ef); las ventas van a su propia cuenta de ingresos.","id":"h3_19"},{"t":3,"d":3,"ref":false,"q":"Si las existencias iniciales son 5.000 € y las finales 3.800 €:","o":["La cuenta «Variación de existencias» tendrá saldo deudor.","Las existencias han disminuido en 1.200 €.","La cuenta «Variación de existencias» tendrá saldo acreedor.","La variación de existencias es una cuenta correctora sin entidad real."],"c":[0,1,3],"e":"Ei > Ef → disminución de 1.200 € → saldo DEUDOR de la variación de existencias (cuenta correctora).","id":"h3_20"},{"t":3,"d":3,"ref":false,"q":"Si las existencias iniciales son 2.000 € y las finales 3.500 €:","o":["La variación de existencias tendrá saldo acreedor.","Las existencias han aumentado en 1.500 €.","La variación de existencias tendrá saldo deudor.","El dato de existencias finales procede del recuento físico del almacén."],"c":[0,1,3],"e":"Ef > Ei → aumento de 1.500 € → saldo ACREEDOR. Las existencias finales son un dato extracontable.","id":"h3_21"},{"t":3,"d":3,"ref":false,"q":"Son ejemplos de pérdidas ciertas (correcciones valorativas):","o":["Derechos de cobro que resultan incobrables.","La destrucción de activos por un incendio.","La venta de un inmovilizado por debajo de su valor.","La revalorización de un terreno."],"c":[0,1,2],"e":"Las pérdidas ciertas son irrecuperables y se contabilizan al producirse. Una revalorización no es una pérdida.","id":"h3_22"},{"t":3,"d":3,"ref":false,"q":"Las pérdidas ciertas:","o":["Son pérdidas irrecuperables.","Se contabilizan conforme se van produciendo.","Afectan a elementos de activo que dejan de cumplir su definición.","Sólo se registran si el ejercicio termina en beneficios."],"c":[0,1,2],"e":"Se registran cuando se producen, con independencia de que haya beneficio o pérdida en el ejercicio.","id":"h3_23"},{"t":3,"d":3,"ref":false,"q":"La amortización refleja una depreciación que es:","o":["Cierta.","Sistemática.","Irreversible.","Ocasional y reversible."],"c":[0,1,2],"e":"La amortización es el reflejo contable de una pérdida de valor cierta, sistemática e irreversible del inmovilizado.","id":"h3_24"},{"t":3,"d":3,"ref":false,"q":"Relaciona las causas de la depreciación:","o":["El uso del elemento provoca la depreciación funcional.","El paso del tiempo provoca la depreciación física.","Las nuevas tecnologías o los cambios de moda provocan la depreciación económica u obsolescencia.","El uso provoca la depreciación económica."],"c":[0,1,2],"e":"Uso → funcional; tiempo → física; obsolescencia → económica.","id":"h3_25"},{"t":3,"d":3,"ref":false,"q":"Una máquina pierde valor porque ha aparecido en el mercado una tecnología que la deja anticuada. Esta depreciación es:","o":["Económica (obsolescencia).","Funcional.","Física.","Debe reflejarse mediante la amortización."],"c":[0,3],"e":"El avance tecnológico origina depreciación ECONÓMICA, que se recoge vía amortización.","id":"h3_26"},{"t":3,"d":3,"ref":false,"q":"En el método indirecto de contabilización de la amortización:","o":["La depreciación se refleja en la cuenta correctora «Amortización acumulada del inmovilizado».","La cuenta del activo mantiene su valor inicial.","Los elementos se presentan en balance por su valor contable (valor inicial menos amortización acumulada).","La depreciación se abona directamente en la cuenta del activo."],"c":[0,1,2],"e":"El método indirecto usa la cuenta correctora y conserva el valor inicial del activo; abonar la propia cuenta del activo es el método DIRECTO.","id":"h3_27"},{"t":3,"d":3,"ref":false,"q":"Los terrenos:","o":["No se amortizan.","No se ven afectados por el uso, el paso del tiempo ni la obsolescencia.","Se amortizan al 2% anual como las construcciones.","Una construcción sí se amortiza, aunque esté edificada sobre un terreno."],"c":[0,1,3],"e":"Los terrenos no se amortizan (no se deprecian por las causas habituales); las construcciones sí.","id":"h3_28"},{"t":3,"d":3,"ref":false,"q":"En relación con los significados de la amortización:","o":["El significado financiero es el modo en que el inmovilizado se va convirtiendo en efectivo a través del cobro de las ventas.","El significado económico es la estimación de la parte consumida del inmovilizado.","El significado técnico es la pérdida de capacidad para el proceso productivo.","El significado financiero es la cancelación de las deudas a largo plazo."],"c":[0,1,2],"e":"Técnico: pérdida de capacidad productiva. Económico: estimación de la parte consumida del inmovilizado. Financiero: recuperación en efectivo vía cobro de las ventas. No guarda relación con cancelar deudas.","id":"h3_29"},{"t":3,"d":3,"ref":false,"q":"El significado económico de la amortización:","o":["Es la estimación de la parte consumida del inmovilizado.","Calcula la pérdida de valor por su incorporación al proceso productivo.","Esa cantidad se incorpora a los costes de los productos.","Es el modo en que el inmovilizado se convierte en efectivo."],"c":[0,1,2],"e":"El significado económico mide el consumo del inmovilizado, que se traslada a los costes de producción. La conversión en efectivo es el significado financiero.","id":"h3_30"},{"t":3,"d":3,"ref":false,"q":"En relación con los conceptos de la amortización:","o":["Valor inicial (Vo): valor en el momento de la incorporación a la empresa.","Valor residual (Vr): valor al final del proceso de amortización.","Base de amortización: Va = Vo − Vr.","Vida útil: periodo transcurrido entre dos inventarios consecutivos."],"c":[0,1,2],"e":"La vida útil es el periodo que dura el proceso amortizativo, no el tiempo entre inventarios.","id":"h3_31"},{"t":3,"d":3,"ref":false,"q":"Los sistemas de amortización NO financieros:","o":["No tienen en cuenta el rendimiento de la inversión de los recursos generados por la amortización.","Incluyen el método lineal o de cuotas constantes.","Incluyen el método de los números dígitos y el tanto fijo sobre el valor inicial.","Incluyen, entre otros, el sistema que considera la reinversión de los fondos liberados."],"c":[0,1,2],"e":"Los no financieros (lineal, nivel de actividad, tanto fijo, dígitos, progresiones) ignoran el rendimiento de los recursos; considerarlo es propio de los sistemas FINANCIEROS.","id":"h3_32"},{"t":3,"d":3,"ref":false,"q":"Un camión cuesta 50.000 €, con valor residual estimado de 5.000 € y vida útil de 9 años (amortización lineal):","o":["La base de amortización es de 45.000 €.","La cuota anual es de 5.000 €.","La cuota anual es de 5.555,56 €.","Tras 4 años, la amortización acumulada será de 20.000 €."],"c":[0,1,3],"e":"Va = 50.000 − 5.000 = 45.000; cuota = 45.000/9 = 5.000 €/año; AA(4) = 20.000 €.","id":"h3_33"},{"t":3,"d":3,"ref":false,"q":"Un equipo cuesta 8.000 €, sin valor residual, y se amortiza linealmente en 4 años:","o":["La cuota anual es de 2.000 €.","El valor contable al final del segundo año es de 4.000 €.","El valor contable al final del tercer año es de 6.000 €.","Al final de su vida útil, su valor contable es cero."],"c":[0,1,3],"e":"Cuota = 8.000/4 = 2.000; VC(2) = 8.000 − 4.000 = 4.000; VC(3) = 2.000; VC(4) = 0.","id":"h3_34"},{"t":3,"d":3,"ref":false,"q":"Una máquina de 12.000 € con valor residual de 2.000 € se amortiza linealmente con cuotas anuales de 2.500 €:","o":["Su vida útil estimada es de 4 años.","Su base de amortización es de 10.000 €.","Su vida útil estimada es de 5 años.","El valor contable tras 2 años es de 7.000 €."],"c":[0,1,3],"e":"Va = 10.000; n = 10.000/2.500 = 4 años; VC(2) = 12.000 − 5.000 = 7.000 €.","id":"h3_35"},{"t":3,"d":3,"ref":false,"q":"Los elementos amortizables se presentan en el balance:","o":["Por su valor contable.","Valor contable = valor inicial − amortización acumulada.","Por su valor inicial, sin ajuste alguno.","La amortización acumulada actúa como cuenta correctora del activo."],"c":[0,1,3],"e":"En balance figuran por su valor contable (Vo − AA), siendo la amortización acumulada la cuenta correctora.","id":"h3_36"},{"t":3,"d":3,"ref":false,"q":"La periodificación contable:","o":["Determina las cantidades de ingresos y gastos que corresponden al ejercicio en curso.","Separa los gastos e ingresos periódicos de los anticipados.","Los periódicos van a los asientos de cálculo del resultado del ejercicio.","Los anticipados se incluyen en el resultado del ejercicio en curso."],"c":[0,1,2],"e":"Los anticipados NO corresponden al ejercicio: van al asiento de cierre y al balance de situación final.","id":"h3_37"},{"t":3,"d":3,"ref":false,"q":"El 1 de julio la empresa paga 1.200 € por un seguro anual (julio a junio). Al cierre del 31 de diciembre:","o":["El gasto periódico del ejercicio es de 600 €.","Los 600 € restantes son un gasto anticipado.","El gasto anticipado figurará en el balance de situación final.","Todo el importe (1.200 €) es gasto del ejercicio según el devengo."],"c":[0,1,2],"e":"Se han consumido 6 de los 12 meses: 600 € de gasto periódico; el resto es gasto anticipado que va al balance.","id":"h3_38"},{"t":3,"d":3,"ref":false,"q":"El 1 de diciembre la empresa cobra 3.000 € por un servicio que prestará a partes iguales durante diciembre, enero y febrero:","o":["El ingreso periódico del ejercicio es de 1.000 €.","Los 2.000 € restantes son un ingreso anticipado.","El ingreso periódico del ejercicio es de 3.000 € por haberse cobrado.","El cobro anticipado no equivale a ingreso devengado."],"c":[0,1,3],"e":"Sólo se ha devengado diciembre (1.000 €); el resto es ingreso anticipado. Cobrar no es devengar.","id":"h3_39"},{"t":3,"d":3,"ref":false,"q":"Sobre las magnitudes «del periodo» y «periódicas»:","o":["La magnitud del periodo se produce en un periodo, aunque puede corresponder o no al mismo.","La magnitud periódica corresponde a un periodo, se haya producido o no en él.","Un alquiler de enero próximo pagado en diciembre es, respecto al ejercicio actual, magnitud del periodo pero no periódica.","Ambas expresiones son sinónimas."],"c":[0,1,2],"e":"Producirse ≠ corresponder: el pago anticipado se produce este año (del periodo) pero corresponde al siguiente (no periódico).","id":"h3_40"},{"t":3,"d":3,"ref":false,"q":"Una nómina de diciembre que se pagará en enero es, respecto al ejercicio que se cierra:","o":["Una magnitud periódica (corresponde al ejercicio).","Un gasto que debe incluirse en el resultado del ejercicio por devengo.","Una magnitud del periodo pero no periódica.","Un gasto del ejercicio siguiente, porque se paga en enero."],"c":[0,1],"e":"El trabajo se consumió en diciembre: gasto periódico del ejercicio actual aunque se pague (se produzca la salida) en enero.","id":"h3_41"},{"t":3,"d":3,"ref":false,"q":"Clasifica los componentes del resultado de una empresa comercial:","o":["El beneficio por la venta de mercaderías es resultado de la explotación.","El ingreso por alquilar un local ocioso propiedad de la empresa (operación habitual, no principal) es resultado ajeno a la explotación.","La pérdida extraordinaria por una inundación es resultado atípico.","El alquiler del local ocioso es resultado de la explotación."],"c":[0,1,2],"e":"Actividad principal → explotación; habitual no principal → ajeno; esporádico y no recurrente → atípico.","id":"h3_42"},{"t":3,"d":3,"ref":false,"q":"El resultado atípico recoge:","o":["Gastos e ingresos de operaciones esporádicas.","Gastos e ingresos de operaciones no recurrentes y no habituales.","Los gastos e ingresos de la actividad principal.","En la distinción del PGC 2007, queda integrado dentro del resultado de explotación."],"c":[0,1,3],"e":"Atípico = esporádico, no recurrente, no habitual; el PGC 2007 lo integra en el resultado de explotación.","id":"h3_43"},{"t":3,"d":3,"ref":false,"q":"En el cálculo del resultado del ejercicio (asientos de regularización):","o":["Las cuentas de gastos periódicos se abonan con cargo al Resultado del ejercicio.","Las cuentas de ingresos periódicos se cargan con abono al Resultado del ejercicio.","El resultado del ejercicio recoge gastos e ingresos de explotación, ajenos a la explotación y atípicos.","Los gastos anticipados también se traspasan al resultado."],"c":[0,1,2],"e":"Se traspasan al resultado sólo los gastos e ingresos PERIÓDICOS; los anticipados van al balance.","id":"h3_44"},{"t":3,"d":3,"ref":false,"q":"La reclasificación de cuentas:","o":["Deja las cuentas con sus verdaderos importes y significado.","Un ejemplo típico es reclasificar a corto plazo la parte de una deuda a largo que vence el próximo ejercicio.","Afecta al balance.","Es un paso posterior al asiento de cierre."],"c":[0,1,2],"e":"La reclasificación es una operación de cierre PREVIA al asiento de cierre.","id":"h3_45"},{"t":3,"d":3,"ref":false,"q":"Una empresa tiene un préstamo a devolver dentro de 4 años, del que 10.000 € vencen el próximo ejercicio. Al cierre:","o":["Debe reclasificar 10.000 € del pasivo no corriente al pasivo corriente.","Debe mantener todo el préstamo en el pasivo no corriente.","La reclasificación persigue que el balance muestre los verdaderos importes de cada masa.","La reclasificación convierte el préstamo en patrimonio neto."],"c":[0,2],"e":"La parte con vencimiento inferior al año pasa al pasivo corriente para que el balance refleje la exigibilidad real.","id":"h3_46"},{"t":3,"d":3,"ref":false,"q":"El resultado empresarial:","o":["Es el excedente que surge como consecuencia de la realización de actividades o transacciones.","Es una magnitud flujo: corriente de renta generada durante un periodo.","Supone una variación de riqueza en la empresa.","Es una magnitud fondo, como el patrimonio."],"c":[0,1,2],"e":"El resultado es flujo (renta de un periodo); el patrimonio es la magnitud fondo.","id":"h3_47"},{"t":3,"d":3,"ref":false,"q":"El resultado total:","o":["Es la diferencia entre el valor invertido en la constitución de la empresa y el valor de liquidación.","Es único, fiable y exacto.","Mide la variación de riqueza a lo largo de toda la vida de la empresa.","Es el que se calcula cada ejercicio económico."],"c":[0,1,2],"e":"El resultado total abarca TODA la vida de la empresa; el de cada ejercicio es el resultado periódico.","id":"h3_48"},{"t":3,"d":3,"ref":false,"q":"El resultado periódico:","o":["Es una magnitud relativa: requiere estimaciones y decisiones sobre criterios de reconocimiento y valoración.","Es una magnitud temporal: se refiere a un periodo concreto.","Es único, fiable y exacto.","Corresponde al ejercicio económico."],"c":[0,1,3],"e":"El único fiable y exacto es el resultado TOTAL; el periódico depende de estimaciones y criterios.","id":"h3_49"},{"t":3,"d":3,"ref":false,"q":"Método estático de cálculo del resultado periódico:","o":["Resultado = PN1 − PN0.","Equivale a (A1 − P1) − (A0 − P0).","Informa de las causas que generaron el resultado.","Debe ajustarse si ha habido aportaciones o retiradas de los socios."],"c":[0,1,3],"e":"El estático compara patrimonios netos (ajustando aportaciones/retiradas de socios) pero no explica las causas del resultado.","id":"h3_50"},{"t":3,"d":3,"ref":false,"q":"Una empresa tenía un PN inicial de 40.000 € y un PN final de 55.000 €. Durante el año los socios aportaron 10.000 € en una ampliación de capital:","o":["El resultado del ejercicio es de 5.000 € de beneficio.","El resultado del ejercicio es de 15.000 € de beneficio.","La aportación de los socios no forma parte del resultado.","Por el método estático: 55.000 − 40.000 − 10.000 = 5.000 €."],"c":[0,2,3],"e":"La variación del PN (15.000) incluye 10.000 de aportaciones, que no son resultado: beneficio = 5.000 €.","id":"h3_51"},{"t":3,"d":3,"ref":false,"q":"Método dinámico de cálculo del resultado periódico:","o":["Resultado = Ingresos periódicos − Gastos necesarios para obtenerlos.","Explica el modo y las causas de generación del resultado.","Es el que desarrolla la cuenta de pérdidas y ganancias.","Compara el patrimonio neto de dos momentos."],"c":[0,1,2],"e":"El dinámico opera con ingresos y gastos (cuenta de PyG) y sí informa de las causas; comparar patrimonios es el estático.","id":"h3_52"},{"t":3,"d":3,"ref":false,"q":"Una empresa tuvo ingresos periódicos de 80.000 € y gastos periódicos de 68.500 €:","o":["Su resultado por el método dinámico es de 11.500 € de beneficio.","Si no hubo aportaciones ni retiradas de socios, su patrimonio neto habrá aumentado en 11.500 €.","Su resultado es de 148.500 €.","El resultado calculado por el método estático debería coincidir."],"c":[0,1,3],"e":"R = 80.000 − 68.500 = 11.500 €; ambos métodos deben llegar al mismo resultado.","id":"h3_53"},{"t":3,"d":3,"ref":false,"q":"Según la distinción del PGC 2007:","o":["El resultado de explotación incluye el resultado atípico.","El resultado financiero es Ingresos financieros − Gastos financieros.","El resultado antes de impuestos = resultado de explotación + resultado financiero.","El resultado financiero incluye las ventas de mercaderías."],"c":[0,1,2],"e":"Las ventas de mercaderías son explotación; el financiero sólo recoge ingresos y gastos financieros.","id":"h3_54"},{"t":3,"d":3,"ref":false,"q":"Resultado de explotación 30.000 €, ingresos financieros 2.000 €, gastos financieros 5.000 €:","o":["El resultado financiero es de −3.000 €.","El resultado antes de impuestos es de 27.000 €.","El resultado financiero es de +3.000 €.","Si el impuesto es de 6.750 €, el resultado del ejercicio de operaciones continuadas es de 20.250 €."],"c":[0,1,3],"e":"RF = 2.000 − 5.000 = −3.000; RAI = 30.000 − 3.000 = 27.000; 27.000 − 6.750 = 20.250 €.","id":"h3_55"},{"t":3,"d":3,"ref":false,"q":"Otras clasificaciones del resultado periódico:","o":["Resultado ordinario frente a resultado atípico.","Resultado de explotación frente a resultado financiero.","Resultado antes de impuestos frente a resultado después de impuestos.","Resultado contable frente a resultado fiscal."],"c":[0,1,2,3],"e":"Todas son clasificaciones válidas del resultado periódico.","id":"h3_56"},{"t":3,"d":3,"ref":false,"q":"La cuenta de pérdidas y ganancias en forma de cuenta:","o":["Clasifica los ingresos y gastos por su naturaleza.","Presenta de forma diferenciada los distintos tipos de resultados.","Es el modelo seguido por el PGC 2007.","Es uno de los dos modelos posibles de presentación."],"c":[0,1,3],"e":"El PGC 2007 sigue el modelo en forma de LISTA; la forma de cuenta es el otro modelo posible.","id":"h3_57"},{"t":3,"d":3,"ref":false,"q":"La presentación en forma de lista de la cuenta de PyG:","o":["Es la seguida por el PGC 2007.","Ordena los ingresos y gastos según su naturaleza.","Presenta los ingresos y, restando, los gastos relacionados con ellos.","Enfrenta el Debe y el Haber en dos columnas."],"c":[0,1,2],"e":"La lista presenta ingresos menos gastos escalonadamente; el enfrentamiento en dos columnas es la forma de cuenta.","id":"h3_58"},{"t":3,"d":3,"ref":false,"q":"En la distribución del beneficio, el orden correcto es:","o":["Primero, compensar las pérdidas de ejercicios anteriores.","Después, dotar las reservas obligatorias.","Si quedan fondos excedentarios, repartir dividendos o dotar reservas voluntarias.","Primero se reparten los dividendos y con el resto se compensan pérdidas."],"c":[0,1,2],"e":"Orden: pérdidas anteriores → reservas obligatorias → excedente (dividendos o reservas voluntarias).","id":"h3_59"},{"t":3,"d":3,"ref":false,"q":"Los dividendos:","o":["Son la parte del beneficio que se distribuye a los accionistas.","Sólo pueden repartirse si quedan fondos excedentarios tras compensar pérdidas y dotar reservas obligatorias.","Los beneficios no repartidos que permanecen en la empresa se denominan reservas voluntarias.","Son un gasto de explotación del ejercicio."],"c":[0,1,2],"e":"El dividendo es distribución del resultado (no un gasto): decisión de aplicación del beneficio.","id":"h3_60"},{"t":3,"d":3,"ref":false,"q":"Las pérdidas de un ejercicio pueden compensarse:","o":["Con beneficios futuros.","Con cargo a reservas.","Con la aportación de nuevos fondos por los accionistas.","Únicamente con beneficios futuros."],"c":[0,1,2],"e":"Las tres vías son válidas: beneficios futuros, reservas o nuevas aportaciones.","id":"h3_61"},{"t":3,"d":3,"ref":false,"q":"Para asegurar la capacidad de generar beneficios futuros:","o":["La remuneración a los accionistas no debe superar el beneficio generado.","Es una condición necesaria que limita la política de dividendos.","Repartir más dividendo que beneficio descapitaliza la empresa.","La empresa debe repartir siempre el 100% del beneficio."],"c":[0,1,2],"e":"Repartir por encima del beneficio consume recursos propios; la condición limita la retribución al accionista.","id":"h3_62"},{"t":3,"d":3,"ref":false,"q":"El asiento de cierre:","o":["Cierra el libro Diario.","Incluye todas las cuentas con saldo deudor o acreedor del libro Mayor.","Al trasladarlo al Mayor, todas las cuentas quedan con saldo nulo.","Sirve de base para elaborar el balance de situación final."],"c":[0,1,2,3],"e":"Todas son correctas: con los elementos del asiento de cierre se elabora el balance de situación final.","id":"h3_63"},{"t":3,"d":3,"ref":false,"q":"Tras el asiento de cierre:","o":["Todas las cuentas del Mayor quedan saldadas (saldo nulo).","El balance de situación final se elabora con los elementos incluidos en el asiento de cierre.","Las cuentas de gestión permanecen abiertas para el ejercicio siguiente.","El balance final coincidirá con el balance inicial del ejercicio siguiente."],"c":[0,1,3],"e":"Las cuentas de gestión ya se saldaron antes contra el resultado; el balance final será el inicial del ejercicio siguiente.","id":"h3_64"},{"t":3,"d":3,"ref":false,"q":"Señala la secuencia correcta de las operaciones al final del ejercicio:","o":["Regularización, correcciones valorativas y periodificación; después, cálculo del resultado; después, asiento de cierre.","Asiento de cierre; después, regularización; después, cálculo del resultado.","El balance de situación final se elabora a partir del asiento de cierre.","El asiento de cierre es el último asiento del Diario del ejercicio."],"c":[0,2,3],"e":"Primero las operaciones de cierre y el cálculo del resultado; el asiento de cierre es el último y de él sale el balance final.","id":"h3_65"},{"t":3,"d":3,"ref":false,"q":"El resultado del ejercicio calculado en la regularización:","o":["Aparecerá en el balance de situación final dentro del patrimonio neto.","Puede ser positivo (beneficio) o negativo (pérdida).","Se traslada a la cuenta de pérdidas y ganancias del ejercicio siguiente.","Surge de enfrentar ingresos periódicos y gastos periódicos."],"c":[0,1,3],"e":"El resultado del ejercicio integra el PN del balance final; no se «traslada» al ejercicio siguiente (allí se decidirá su distribución).","id":"h3_66"},{"t":3,"d":3,"ref":false,"q":"Una empresa olvida periodificar un gasto anticipado de 900 € (ya pagado, correspondiente al ejercicio siguiente). Como consecuencia:","o":["El gasto del ejercicio queda sobrevalorado en 900 €.","El resultado del ejercicio queda infravalorado en 900 €.","El balance final omite un activo (gasto anticipado) de 900 €.","No hay ningún efecto sobre el resultado."],"c":[0,1,2],"e":"Sin periodificar, 900 € que no corresponden al ejercicio se quedan como gasto: menos resultado y falta el gasto anticipado en el activo del balance.","id":"h3_67"},{"t":3,"d":3,"ref":false,"q":"La cuenta única especulativa de mercaderías presenta una suma del Debe de 14.000 € (existencias iniciales más compras) y una suma del Haber de 18.000 € (ventas). Las existencias finales del almacén ascienden a 2.000 €:","o":["El resultado de la explotación es de 6.000 € de beneficio.","Puede calcularse como: Haber − Debe + Existencias finales.","El resultado es de 4.000 € de beneficio.","Las existencias finales se obtienen directamente del libro Mayor."],"c":[0,1],"e":"Resultado = 18.000 − 14.000 + 2.000 = 6.000 €. Las existencias finales son un dato extracontable (recuento físico), no salen del Mayor.","id":"h3_68"},{"t":3,"d":3,"ref":false,"q":"En el método directo de contabilización de la amortización:","o":["La depreciación se abona directamente en la cuenta del activo no corriente.","Se utiliza la cuenta correctora «Amortización acumulada del inmovilizado».","El valor inicial del elemento deja de figurar como tal en la cuenta.","El activo figura por su nuevo valor tras restar la depreciación."],"c":[0,2,3],"e":"En el método directo la propia cuenta del activo se abona por la depreciación, perdiéndose la referencia al valor inicial; la cuenta correctora es propia del método INDIRECTO.","id":"h3_69"},{"t":4,"d":1,"ref":false,"q":"La normalización contable:","o":["Consiste en establecer pautas comunes a los diferentes agentes económicos para la elaboración y presentación de la información contable.","Persigue que la información sea homogénea, comparable y comprensible para los usuarios.","Significa una uniformidad rígida, sin posibilidad de adaptación.","Es una forma de asegurar que la información sea debidamente elaborada, comunicada, verificada y controlada."],"c":[0,1,3],"e":"La normalización establece pautas comunes para lograr información homogénea, comparable y comprensible, y asegura su correcta elaboración y control. NO es uniformidad rígida: debe ser flexible para adaptarse a nuevas realidades.","id":"q4_00"},{"t":4,"d":1,"ref":false,"q":"La normalización contable la llevan a cabo:","o":["Agentes que tengan la autoridad suficiente.","Las Administraciones Públicas.","Los organismos profesionales de contabilidad.","Exclusivamente cada empresa de forma individual."],"c":[0,1,2],"e":"Normalizan los agentes con autoridad suficiente: las Administraciones Públicas y los organismos profesionales de contabilidad. No es una decisión individual de cada empresa.","id":"q4_01"},{"t":4,"d":1,"ref":false,"q":"Las cuentas anuales que establece el PGC 2007:","o":["Son cinco: balance, cuenta de pérdidas y ganancias, estado de cambios en el patrimonio neto, estado de flujos de efectivo y memoria.","Son tres: balance, cuenta de pérdidas y ganancias e informe de gestión.","Forman una unidad y deben mostrar la imagen fiel del patrimonio, de la situación financiera y de los resultados.","Deben ser redactadas con claridad."],"c":[0,2,3],"e":"Las cuentas anuales son cinco documentos que forman una unidad, redactados con claridad para mostrar la imagen fiel. El informe de gestión NO forma parte de las cuentas anuales.","id":"q4_02"},{"t":4,"d":1,"ref":false,"q":"En relación con los estados que informan del patrimonio neto y de la tesorería:","o":["El estado de cambios en el patrimonio neto muestra las causas de variación del patrimonio neto.","El estado de flujos de efectivo informa de los movimientos de tesorería (cobros y pagos).","El balance muestra el patrimonio en un momento determinado.","La memoria es el documento que recoge las variaciones del patrimonio neto."],"c":[0,1,2],"e":"El ECPN explica las variaciones del patrimonio neto del periodo; el EFE, los cobros y pagos; y el balance, la situación patrimonial a una fecha. La memoria comenta y amplía, no recoge esas variaciones.","id":"q4_03"},{"t":4,"d":1,"ref":false,"q":"En relación con el ejercicio económico y los plazos de las cuentas anuales:","o":["El ejercicio económico tiene, con carácter general, una duración de 12 meses.","Las cuentas anuales deben formularse en el plazo de 3 meses desde el cierre.","Deben aprobarse por la Junta General dentro de los 6 meses siguientes al cierre.","La duración del ejercicio la decide libremente la Junta General cada año."],"c":[0,1,2],"e":"El ejercicio dura 12 meses. Tras el cierre: 3 meses para formular las cuentas, 6 meses para aprobarlas en Junta y 1 mes desde la aprobación para depositarlas en el Registro Mercantil.","id":"q4_04"},{"t":4,"d":2,"ref":false,"q":"Entre los objetivos de la normalización contable se encuentran:","o":["Aumentar la eficacia de la contabilidad como instrumento básico para la gestión.","Lograr que los documentos contables sean un eficaz medio de información en las relaciones económico-financieras entre empresas y terceros.","Conseguir una homogeneización de los documentos contables.","Que el modelo contable normalizado sea un instrumento de política económica, financiera y fiscal."],"c":[0,1,2,3],"e":"Todas son correctas: son los cuatro objetivos de la normalización contable (eficacia para la gestión, medio de información con terceros, homogeneización y ser instrumento de política económica: es una de las principales fuentes de la Contabilidad Nacional).","id":"q4_05"},{"t":4,"d":2,"ref":false,"q":"En relación con las dos grandes áreas culturales dentro de la profesión contable:","o":["El área de influencia anglosajona se basa en normas dictadas por asociaciones profesionales contables.","En el área anglosajona, las normas se refieren a casos concretos y se elaboran según las necesidades de cada momento y las consultas realizadas.","En la doctrina y práctica francesa o continental, los organismos públicos realizan la normalización mediante normas y leyes de aplicación obligatoria.","La doctrina continental se ha basado tradicionalmente en planes de contabilidad."],"c":[0,1,2,3],"e":"Todas son correctas: el modelo anglosajón se apoya en asociaciones profesionales y normas para casos concretos; el continental o francés, en organismos públicos con normas obligatorias, tradicionalmente planes de contabilidad.","id":"q4_06"},{"t":4,"d":2,"ref":false,"q":"En la normalización contable a nivel internacional se enfrentan dos filosofías:","o":["El IASB (International Accounting Standards Board) emite las Normas Internacionales de Información Financiera (NIIF).","Las NIIF siguen métodos basados en principios y son aplicables en Europa.","El FASB sigue métodos basados en reglas (limita las opciones posibles) y sus normas se aplican en EEUU.","El FASB emite normas basadas en principios que son las aplicables en Europa."],"c":[0,1,2],"e":"IASB → NIIF, basadas en PRINCIPIOS, aplicables en Europa. FASB → métodos basados en REGLAS, aplicables en EEUU. La convergencia entre ambos ha avanzado poco.","id":"q4_07"},{"t":4,"d":2,"ref":false,"q":"Los requisitos legales de la contabilidad en España se recogen en:","o":["El Código de Comercio.","El Texto Refundido de la Ley de Sociedades de Capital.","El Plan General de Contabilidad.","El Reglamento del Registro Mercantil."],"c":[0,1,2,3],"e":"Todas son correctas: las cuatro normas recogen los requisitos legales de la contabilidad en España (el PGC es aplicable desde el 1-1-2008 y está adaptado a las NIIF acordadas por la UE).","id":"q4_08"},{"t":4,"d":2,"ref":false,"q":"En relación con los libros contables:","o":["El libro Diario y el libro de Inventarios y Cuentas Anuales son libros obligatorios para todas las empresas.","Los libros principales contables son el Mayor, el Diario y las Cuentas anuales.","El libro Mayor es un libro obligatorio desde el punto de vista legal.","El libro de Actas es un libro obligatorio de las sociedades."],"c":[0,1,3],"e":"Diario e Inventarios y Cuentas Anuales son obligatorios; las sociedades añaden además el libro de Actas, entre otros. El Mayor es legalmente VOLUNTARIO, aunque es un libro principal e imprescindible en la práctica contable.","id":"q4_09"},{"t":4,"d":2,"ref":false,"q":"Entre los requisitos generales de los libros obligatorios se encuentran:","o":["Pueden llevarse encuadernados o en hojas sueltas.","La legalización se realiza antes de la utilización (encuadernados) o después de la encuadernación (hojas sueltas).","Actualmente la legalización se hace telemáticamente.","Deben llevarse con claridad, por orden de fechas, sin tachaduras, sin espacios en blanco y con cifras en euros."],"c":[0,1,2,3],"e":"Todas son correctas: son los requisitos generales de los libros obligatorios (formato, legalización —hoy telemática— y normas de llevanza).","id":"q4_10"},{"t":4,"d":2,"ref":false,"q":"El libro de Inventarios y Cuentas Anuales:","o":["Se abre con el balance inicial de la empresa.","Recoge trimestralmente los balances de comprobación o de sumas y saldos.","Al cierre del ejercicio recoge el inventario final y las cuentas anuales.","Registra diariamente todas las operaciones relativas a la actividad de la empresa."],"c":[0,1,2],"e":"El libro de Inventarios y Cuentas Anuales se abre con el balance inicial, incorpora trimestralmente los balances de comprobación y se cierra con el inventario final y las cuentas anuales. El registro diario de operaciones corresponde al libro DIARIO.","id":"q4_11"},{"t":4,"d":2,"ref":false,"q":"En relación con la evolución del Plan General de Contabilidad:","o":["El PGC de 1973 era de aplicación voluntaria.","El PGC de 1990 fue de aplicación obligatoria y estaba ajustado a las Directivas contables de la Unión Europea.","El PGC de 2007 está adaptado a las NIIF adoptadas por la Unión Europea.","El PGC de 2007 es de aplicación voluntaria para las grandes empresas."],"c":[0,1,2],"e":"1973: voluntario. 1990: obligatorio y ajustado a las Directivas. 2007: adaptado a las NIIF de la UE y de aplicación OBLIGATORIA para todas las empresas.","id":"q4_12"},{"t":4,"d":2,"ref":false,"q":"El Plan General de Contabilidad de 2007:","o":["Fue elaborado por el ICAC.","Es de aplicación obligatoria para todas las empresas.","Se complementa con un Plan General de Contabilidad de Pequeñas y Medianas Empresas.","Está constituido por tres partes."],"c":[0,1,2],"e":"El PGC 2007 lo elaboró el ICAC, es obligatorio para todas las empresas y existe además un PGC de PYMES. Está constituido por CINCO partes, no tres.","id":"q4_13"},{"t":4,"d":2,"ref":false,"q":"En relación con lo que muestra cada cuenta anual:","o":["El balance muestra el patrimonio (riqueza) que controla la empresa en un momento determinado.","La cuenta de pérdidas y ganancias muestra la renta generada (resultado) por la empresa en un periodo de tiempo.","El estado de flujos de efectivo muestra dónde se origina la tesorería y dónde se aplica (entradas y salidas).","La memoria muestra las causas de variación del patrimonio neto en un periodo de tiempo."],"c":[0,1,2],"e":"Balance = patrimonio en un momento; PyG = renta de un periodo; EFE = origen y aplicación de la tesorería. Las causas de variación del patrimonio neto las muestra el ESTADO DE CAMBIOS EN EL PATRIMONIO NETO; la memoria complementa y aclara la información de los demás estados.","id":"q4_14"},{"t":4,"d":2,"ref":false,"q":"El balance de situación, como cuenta anual:","o":["Presenta una síntesis de las cuentas patrimoniales.","Refleja la posición estática del patrimonio, distinguiendo inversiones y fuentes de financiación al cierre del ejercicio.","Los elementos del activo figuran por su valor contable.","En el patrimonio neto se distingue entre fondos propios, ajustes por cambios de valor y subvenciones, donaciones y legados recibidos."],"c":[0,1,2,3],"e":"Todas son correctas: el balance sintetiza las cuentas patrimoniales, muestra la posición estática (inversiones vs. financiación), presenta los activos por su valor contable y desglosa el patrimonio neto en esas tres rúbricas.","id":"q4_15"},{"t":4,"d":2,"ref":false,"q":"La cuenta de pérdidas y ganancias, como cuenta anual:","o":["Refleja el resultado derivado de la actividad económica de la empresa durante un periodo determinado.","Los ingresos y gastos se clasifican por su naturaleza (personal, suministros, financieros, etc.).","Distingue tipos de resultados: de explotación, financiero y procedente de operaciones interrumpidas.","Refleja la situación del patrimonio de la empresa en un momento determinado."],"c":[0,1,2],"e":"La PyG refleja el resultado del periodo, con ingresos y gastos clasificados por naturaleza y distinguiendo resultados de explotación, financiero y de operaciones interrumpidas. La situación del patrimonio en un momento dado la refleja el BALANCE.","id":"q4_16"},{"t":4,"d":2,"ref":false,"q":"El estado de flujos de efectivo:","o":["Muestra las entradas de fondos (cobros) producidas durante el ejercicio y la aplicación de las mismas (pagos).","Clasifica los movimientos por actividades de explotación, inversión y financiación.","Proporciona información útil para conocer la capacidad de la empresa para atender sus obligaciones de pago.","Clasifica los ingresos y gastos por su naturaleza."],"c":[0,1,2],"e":"El EFE muestra cobros y pagos clasificados en explotación, inversión y financiación, e informa de la capacidad para atender pagos. La clasificación de ingresos y gastos por naturaleza corresponde a la cuenta de PyG.","id":"q4_17"},{"t":4,"d":2,"ref":false,"q":"La memoria:","o":["Completará, ampliará y comentará la información contenida en los otros documentos que integran las cuentas anuales.","Es una importante fuente de información, principalmente de carácter cualitativo.","No forma parte de las cuentas anuales.","Sustituye al balance en las empresas de pequeño tamaño."],"c":[0,1],"e":"La memoria completa, amplía y comenta los demás estados y aporta sobre todo información cualitativa. SÍ forma parte de las cuentas anuales y nunca sustituye al balance.","id":"q4_18"},{"t":4,"d":2,"ref":false,"q":"El informe de auditoría:","o":["Es elaborado por el auditor de cuentas, un profesional independiente.","Indica si las cuentas anuales ofrecen la imagen fiel del patrimonio, de la situación financiera y de los resultados.","Indica, en su caso, la concordancia del informe de gestión con las cuentas anuales del ejercicio.","Lo elabora la gerencia de la empresa."],"c":[0,1,2],"e":"El informe de auditoría lo elabora un profesional independiente (el auditor) y se pronuncia sobre la imagen fiel de las cuentas y la concordancia del informe de gestión. Es obligatorio para las empresas que presentan balance normal.","id":"q4_19"},{"t":4,"d":2,"ref":false,"q":"En relación con los libros obligatorios y su regulación:","o":["Todas las empresas deben llevar un libro Diario y un libro de Inventarios y Cuentas Anuales.","Las sociedades deben llevar, además, un libro de Actas.","El libro Diario admite la posibilidad de realizar anotaciones conjuntas.","El registro diario de las operaciones se realiza en el libro de Inventarios y Cuentas Anuales."],"c":[0,1,2],"e":"Diario e Inventarios y Cuentas Anuales son obligatorios para toda empresa; las sociedades añaden el libro de Actas, entre otros. El Diario permite anotaciones conjuntas de periodos no superiores al trimestre; el registro diario de operaciones es propio del DIARIO.","id":"q4_20"},{"t":4,"d":3,"ref":false,"q":"El proceso de convergencia europea en materia de contabilidad:","o":["Se inició con las Directivas europeas: IV Directiva (1978) y VII Directiva (1983).","El Reglamento (CE) nº 1606/2002 supuso la adaptación a las NIIF del IASB.","Tomó como referencia las normas del área continental.","En el año 2000 comenzó el proceso de convergencia europea hacia las normas internacionales."],"c":[0,1,3],"e":"Europa partió de las Directivas (IV de 1978 y VII de 1983), inició la convergencia en 2000 y la materializó con el Reglamento 1606/2002 adoptando las NIIF. La confluencia mundial toma como referencia las normas del ámbito ANGLOSAJÓN.","id":"q4_21"},{"t":4,"d":3,"ref":false,"q":"En la aplicación de las NIIF en España:","o":["Los grupos cotizados deben aplicar las NIIF en sus cuentas consolidadas desde el 1-1-2005.","Los grupos que no cotizan pueden optar, en sus cuentas consolidadas, entre las NIIF y la normativa española.","Si un grupo no cotizado opta por las NIIF, deberá continuar aplicándolas en el futuro.","Las sociedades individuales aplican obligatoriamente las NIIF."],"c":[0,1,2],"e":"NIIF obligatorias sólo para las cuentas CONSOLIDADAS de grupos cotizados; los grupos no cotizados pueden optar (sin vuelta atrás). Las cuentas individuales y las sociedades individuales siguen la normativa española.","id":"q4_22"},{"t":4,"d":3,"ref":false,"q":"En relación con los plazos legales de la información contable:","o":["Las cuentas anuales deben formularse en el plazo máximo de 3 meses desde el cierre del ejercicio.","La Junta General de Accionistas debe aprobar las cuentas en el plazo de 6 meses desde el cierre del ejercicio.","El depósito de las cuentas se realiza en el plazo de 1 mes desde su aprobación.","La legalización de los libros obligatorios se realiza en el plazo de 4 meses."],"c":[0,1,2,3],"e":"Todas son correctas: formulación 3 meses, aprobación por la Junta 6 meses, depósito 1 mes desde la aprobación y legalización de libros 4 meses (el ejercicio económico dura 12 meses).","id":"q4_23"},{"t":4,"d":3,"ref":false,"q":"Sobre las partes del Plan General de Contabilidad de 2007:","o":["Sus cinco partes son: marco conceptual, normas de registro y valoración, cuentas anuales, cuadro de cuentas y definiciones y relaciones contables.","Sus cinco partes son: marco conceptual, principios contables, balance, memoria y cuadro de cuentas.","El cuadro de cuentas es la relación de cuentas que se utilizan para reflejar las problemáticas contables.","Las definiciones y relaciones contables recogen la definición de cada elemento y los motivos de cargo y abono de cada cuenta."],"c":[0,2,3],"e":"Las cinco partes son: marco conceptual, normas de registro y valoración, cuentas anuales, cuadro de cuentas y definiciones y relaciones contables. C y D describen correctamente las partes 4ª y 5ª.","id":"q4_24"},{"t":4,"d":3,"ref":false,"q":"Las empresas que presentan balance y memoria abreviados:","o":["No han de elaborar el estado de flujos de efectivo.","No han de elaborar el estado de cambios en el patrimonio neto.","Están obligadas igualmente a elaborar las cinco cuentas anuales.","Los criterios para poder presentar modelos abreviados tienen en cuenta el total del activo, la cifra de negocios y el número de empleados."],"c":[0,1,3],"e":"Quien presenta balance y memoria abreviados queda dispensado del EFE y del ECPN. Los umbrales de los modelos abreviados atienden al activo, la cifra de negocios y el número de empleados.","id":"q4_25"},{"t":4,"d":3,"ref":false,"q":"El balance de comprobación o de sumas y saldos:","o":["Se puede realizar en cualquier momento y tantas veces como desee la empresa, al menos trimestralmente.","Es una relación de todas las cuentas con saldo en el libro Mayor.","Es previo a la determinación del resultado del ejercicio.","Tiene un formato obligatorio establecido en el PGC."],"c":[0,1,2],"e":"Se elabora cuando se desee (mínimo trimestral), relaciona todas las cuentas con saldo del Mayor y es previo al cálculo del resultado. NO tiene formato obligatorio; normalmente adopta forma de lista.","id":"q4_26"},{"t":4,"d":3,"ref":false,"q":"El estado de cambios en el patrimonio neto:","o":["Surge por la existencia de variaciones en el valor de activos y pasivos que tienen como contrapartida cuentas de patrimonio neto en lugar de la cuenta de resultados.","Consta de dos partes.","El estado de ingresos y gastos reconocidos distingue los reconocidos en la cuenta de pérdidas y ganancias y los reconocidos en el patrimonio neto.","El estado total de cambios en el patrimonio neto recoge los elementos que componen el patrimonio neto y sus variaciones."],"c":[0,1,2,3],"e":"Todas son correctas: el ECPN existe porque hay variaciones de valor que van directamente al patrimonio neto, y consta del estado de ingresos y gastos reconocidos y del estado total de cambios en el patrimonio neto.","id":"q4_27"},{"t":4,"d":3,"ref":false,"q":"El informe de gestión:","o":["Es obligatorio para las empresas que presentan balance normal.","Sirve para contextualizar la información contenida en las cuentas anuales.","Incluye información no financiera.","Forma parte de las cuentas anuales."],"c":[0,1,2],"e":"El informe de gestión (obligatorio con balance normal) contextualiza las cuentas anuales, trata aspectos relevantes para evaluar riesgos y estrategias e incluye información no financiera. NO forma parte de las cuentas anuales: las acompaña.","id":"q4_28"},{"t":4,"d":3,"ref":false,"q":"Entre la información adicional que pueden divulgar las empresas se encuentra:","o":["El estado del valor añadido, que informa del modo en que se genera y reparte el beneficio entre los grupos de interés.","La información segmentada, que presenta la realidad empresarial por líneas de negocio o zonas geográficas.","La información intermedia, elaborada con una periodicidad inferior al año.","El informe integrado, que representa cómo la organización se gestiona y cómo crea y mantiene valor."],"c":[0,1,2,3],"e":"Todas son correctas: junto al informe de gobierno corporativo y RSC, son los principales documentos de información adicional a las cuentas anuales.","id":"q4_29"},{"t":4,"d":3,"ref":false,"q":"El proceso de normalización contable consiste en:","o":["Establecer pautas comunes a los diferentes agentes económicos para elaborar y presentar la información contable.","Lograr que la información sea homogénea, comparable y comprensible para los usuarios.","Asegurar que la información sea debidamente elaborada, comunicada, verificada y controlada.","Imponer una única solución contable para cualquier operación, sin excepciones."],"c":[0,1,2],"e":"La normalización fija pautas comunes, pero no es una uniformidad rígida: caben diferentes soluciones según la naturaleza y función del elemento.","id":"h4_00"},{"t":4,"d":3,"ref":false,"q":"La normalización contable no significa uniformidad rígida porque:","o":["Debe poseer la flexibilidad necesaria para introducir las adaptaciones que demandan las empresas.","Debe adaptarse a las nuevas realidades económicas o financieras y a los avances de la contabilidad.","Sirve de referente, pero hay que considerar la naturaleza del elemento y la función que desempeña.","Cada empresa puede inventar libremente sus propios criterios sin referencia alguna."],"c":[0,1,2],"e":"La norma es flexible y sirve de referente; ello no autoriza a prescindir de ella.","id":"h4_01"},{"t":4,"d":3,"ref":false,"q":"Entre los objetivos de la normalización contable están:","o":["Aumentar la eficacia de la contabilidad como instrumento básico para la gestión.","Homogeneizar los documentos contables, posibilitando la comparación y mejorando la terminología.","Que el modelo normalizado sea un instrumento de política económica, financiera y fiscal.","Reducir la información disponible para los usuarios externos."],"c":[0,1,2],"e":"La normalización amplía y mejora la información, no la reduce; es además una de las principales fuentes de la Contabilidad Nacional.","id":"h4_02"},{"t":4,"d":3,"ref":false,"q":"¿Quién lleva a cabo la normalización contable?","o":["Agentes con la autoridad suficiente.","Las Administraciones Públicas.","Los organismos profesionales de contabilidad.","Los departamentos comerciales de las empresas."],"c":[0,1,2],"e":"Normalizan las AAPP y los organismos profesionales; no es competencia de las empresas individuales.","id":"h4_03"},{"t":4,"d":3,"ref":false,"q":"El área de influencia anglosajona de la profesión contable:","o":["Se basa en normas dictadas por asociaciones profesionales contables.","Emite normas referidas a casos concretos.","Elabora las normas según las necesidades de cada momento y las consultas que se realizan.","Se basa en planes de contabilidad emitidos por organismos públicos."],"c":[0,1,2],"e":"Los planes de contabilidad de organismos públicos caracterizan a la doctrina FRANCESA o continental.","id":"h4_04"},{"t":4,"d":3,"ref":false,"q":"La doctrina y práctica francesa o continental:","o":["La normalización la realizan los organismos públicos.","Se basa en la emisión de normas y leyes de aplicación obligatoria.","Tradicionalmente se ha materializado en planes de contabilidad.","Se basa en normas voluntarias emitidas por asociaciones privadas."],"c":[0,1,2],"e":"Continental = organismos públicos + normas obligatorias + planes de contabilidad; las asociaciones privadas son el modelo anglosajón.","id":"h4_05"},{"t":4,"d":3,"ref":false,"q":"La globalización de los mercados hizo necesaria la armonización contable mundial:","o":["Se produjo una confluencia de las dos grandes áreas culturales contables.","Se tomaron como referencia las normas del ámbito anglosajón.","Se tomaron como referencia las normas del ámbito continental.","La adopción de normas internacionales beneficia el funcionamiento de los mercados financieros y la internacionalización de las relaciones comerciales."],"c":[0,1,3],"e":"La confluencia tomó como referencia el ámbito ANGLOSAJÓN.","id":"h4_06"},{"t":4,"d":3,"ref":false,"q":"El International Accounting Standards Board (IASB):","o":["Emite las Normas Internacionales de Información Financiera (NIIF).","Sus métodos están basados en principios.","Sus normas son las aplicables en Europa.","Es el organismo normalizador de los Estados Unidos."],"c":[0,1,2],"e":"El organismo de EEUU es el FASB; el IASB emite las NIIF, basadas en principios y aplicables en Europa.","id":"h4_07"},{"t":4,"d":3,"ref":false,"q":"El Financial Accounting Standards Board (FASB):","o":["Sigue métodos basados en reglas.","Sus normas limitan las opciones posibles a la hora de reflejar la realidad.","Sus normas son aplicables en EEUU.","Emite las NIIF aplicables en Europa."],"c":[0,1,2],"e":"FASB = reglas, EEUU. Las NIIF son del IASB.","id":"h4_08"},{"t":4,"d":3,"ref":false,"q":"Sobre la convergencia entre IASB y FASB:","o":["Se han dado pasos en el marco conceptual y en algunas problemáticas concretas.","Parece difícil que se produzcan nuevos avances.","Ya se ha logrado una norma única mundial plenamente convergente.","Cada filosofía (principios frente a reglas) tiene sus ventajas e inconvenientes."],"c":[0,1,3],"e":"Hay avances parciales, pero no existe todavía una norma única mundial.","id":"h4_09"},{"t":4,"d":3,"ref":false,"q":"En el proceso de convergencia europea en materia contable:","o":["La IV Directiva es de 1978.","La VII Directiva es de 1983.","En el año 2000 comenzó el proceso de convergencia hacia las normas internacionales.","El Reglamento (CE) nº 1606/2002 supuso la adaptación a las NIIF del IASB."],"c":[0,1,2,3],"e":"Todas son correctas: Directivas (1978 y 1983) → proceso de convergencia (2000) → Reglamento 1606/2002 (NIIF).","id":"h4_10"},{"t":4,"d":3,"ref":false,"q":"En España, los grupos de sociedades que cotizan en Bolsa:","o":["Deben aplicar las NIIF en sus cuentas consolidadas desde el 1-1-2005.","Aplican la normativa española en sus cuentas individuales.","Pueden elegir libremente entre NIIF y normativa española para las cuentas consolidadas.","Aplican las NIIF también en las cuentas individuales de cada sociedad del grupo."],"c":[0,1],"e":"Cotizados: NIIF obligatorias en consolidadas desde 2005; las cuentas individuales siguen la normativa española.","id":"h4_11"},{"t":4,"d":3,"ref":false,"q":"En España, los grupos que NO cotizan:","o":["Pueden optar entre las NIIF y la normativa española para sus cuentas consolidadas.","Si optan por las NIIF, deberán continuar aplicándolas en el futuro.","Están obligados a aplicar las NIIF en sus cuentas consolidadas.","Aplican la normativa española en las cuentas individuales."],"c":[0,1,3],"e":"Para no cotizados la NIIF es OPCIONAL en consolidadas (opción irreversible); individuales siempre con normativa española.","id":"h4_12"},{"t":4,"d":3,"ref":false,"q":"Las sociedades individuales españolas (no grupos):","o":["Aplican la normativa española.","Aplican las NIIF obligatoriamente desde 2005.","Pueden optar por las NIIF en sus cuentas individuales.","La normativa española que aplican está adaptada a las NIIF adoptadas por la UE."],"c":[0,3],"e":"Las cuentas individuales se rigen por la normativa española (PGC 2007, adaptado a las NIIF de la UE); no cabe opción NIIF.","id":"h4_13"},{"t":4,"d":3,"ref":false,"q":"Los requisitos legales de la contabilidad en España se recogen en:","o":["El Código de Comercio y el Texto Refundido de la Ley de Sociedades de Capital.","El Plan General de Contabilidad.","El Reglamento del Registro Mercantil.","La Ley del IRPF."],"c":[0,1,2],"e":"Las cuatro fuentes son CdC, TRLSC, PGC y Reglamento del Registro Mercantil; el IRPF es normativa fiscal de personas físicas.","id":"h4_14"},{"t":4,"d":3,"ref":false,"q":"El Plan General de Contabilidad vigente:","o":["Es aplicable a partir del 1-1-2008.","Está adaptado a las NIIF que acordó la Unión Europea.","Fue elaborado por el ICAC.","Data de 1990."],"c":[0,1,2],"e":"El PGC 2007 (aplicable desde 1-1-2008) fue elaborado por el ICAC y está adaptado a las NIIF de la UE.","id":"h4_15"},{"t":4,"d":3,"ref":false,"q":"Son libros obligatorios para todas las empresas:","o":["El libro Diario.","El libro de Inventarios y Cuentas Anuales.","El libro Mayor.","El libro de facturas emitidas del IVA es uno de los libros contables principales."],"c":[0,1],"e":"Diario e Inventarios y Cuentas Anuales son los obligatorios contables; el Mayor es voluntario legalmente.","id":"h4_16"},{"t":4,"d":3,"ref":false,"q":"Los libros principales desde el punto de vista contable son:","o":["El Mayor.","El Diario.","Las Cuentas anuales.","El libro de Actas."],"c":[0,1,2],"e":"Principales contables: Mayor, Diario y Cuentas anuales. El libro de Actas es un libro societario obligatorio, no contable principal.","id":"h4_17"},{"t":4,"d":3,"ref":false,"q":"El libro Mayor:","o":["Es un libro principal desde el punto de vista contable.","Es legalmente voluntario.","Es legalmente obligatorio.","La práctica contable lo hace imprescindible."],"c":[0,1,3],"e":"El Mayor no es obligatorio por ley, pero sí principal e imprescindible en la práctica.","id":"h4_18"},{"t":4,"d":3,"ref":false,"q":"Entre los requisitos generales de los libros obligatorios:","o":["Pueden llevarse encuadernados o en hojas sueltas.","Los encuadernados se legalizan antes de su utilización.","Los de hojas sueltas se legalizan después de la encuadernación.","La legalización presencial es la única forma admitida en la actualidad."],"c":[0,1,2],"e":"Actualmente la legalización se realiza TELEMÁTICAMENTE.","id":"h4_19"},{"t":4,"d":3,"ref":false,"q":"Los libros obligatorios deben llevarse:","o":["Con claridad y por orden de fechas.","Sin tachaduras y sin espacios en blanco.","Con las cifras expresadas en euros.","En cualquier idioma y moneda, a elección de la empresa."],"c":[0,1,2],"e":"Claridad, orden cronológico, sin tachaduras ni espacios en blanco y cifras en euros.","id":"h4_20"},{"t":4,"d":3,"ref":false,"q":"El libro Diario, según sus requisitos particulares:","o":["Registra diariamente todas las operaciones relativas a la actividad de la empresa.","Admite la posibilidad de anotaciones conjuntas.","Sólo admite una anotación por mes.","Es el libro que recoge el inventario final."],"c":[0,1],"e":"El Diario registra a diario (con posibilidad de anotaciones conjuntas de periodos); el inventario final va al libro de Inventarios y Cuentas Anuales.","id":"h4_21"},{"t":4,"d":3,"ref":false,"q":"El libro de Inventarios y Cuentas Anuales, según sus requisitos particulares:","o":["Se abre con el balance inicial de la empresa.","Recoge trimestralmente los balances de comprobación o de sumas y saldos.","Al cierre del ejercicio recoge el inventario final y las cuentas anuales.","Se abre con la cuenta de pérdidas y ganancias."],"c":[0,1,2],"e":"Apertura con balance inicial, balances de comprobación trimestrales y, al cierre, inventario final y cuentas anuales.","id":"h4_22"},{"t":4,"d":3,"ref":false,"q":"Sobre los plazos legales de la información contable:","o":["El ejercicio económico dura, con carácter general, 12 meses.","Las cuentas anuales deben formularse en un plazo máximo de 3 meses desde el cierre.","La Junta General debe aprobar las cuentas en un plazo de 6 meses desde el cierre.","Las cuentas se formulan en un plazo de 6 meses y se aprueban en 3 meses."],"c":[0,1,2],"e":"Formulación: 3 meses; aprobación: 6 meses desde el cierre. La opción D invierte los plazos.","id":"h4_23"},{"t":4,"d":3,"ref":false,"q":"Una sociedad cierra su ejercicio el 31 de diciembre. Conforme a los plazos legales:","o":["Debe formular las cuentas anuales, como máximo, el 31 de marzo.","La Junta General debe aprobarlas, como máximo, el 30 de junio.","El depósito debe realizarse en el mes siguiente a la aprobación.","Puede formular las cuentas en cualquier momento del año siguiente."],"c":[0,1,2],"e":"3 meses para formular (31-3), 6 para aprobar (30-6) y 1 mes desde la aprobación para depositar.","id":"h4_24"},{"t":4,"d":3,"ref":false,"q":"Sobre los plazos de legalización y depósito:","o":["La legalización de los libros obligatorios se realiza en el plazo de 4 meses.","El depósito de las cuentas se realiza en el plazo de 1 mes desde su aprobación.","La auditoría dispone del plazo de 1 mes.","El depósito de cuentas puede demorarse hasta 2 años."],"c":[0,1,2],"e":"Legalización: 4 meses; auditoría: 1 mes; depósito: 1 mes desde la aprobación.","id":"h4_25"},{"t":4,"d":3,"ref":false,"q":"En la evolución del Plan General de Contabilidad:","o":["El PGC de 1973 era de aplicación voluntaria.","El PGC de 1990 pasó a ser de aplicación obligatoria.","El PGC de 1990 estaba ajustado a las Directivas contables de la Unión Europea.","El PGC de 1973 era obligatorio para las grandes empresas."],"c":[0,1,2],"e":"1973: voluntario para todas; 1990: obligatorio y ajustado a las Directivas.","id":"h4_26"},{"t":4,"d":3,"ref":false,"q":"El Plan General de Contabilidad de 2007:","o":["Fue elaborado por el ICAC.","Se acompaña de un Plan General de Contabilidad de Pequeñas y Medianas Empresas.","Es de aplicación obligatoria para todas las empresas.","Sólo es obligatorio para las empresas cotizadas."],"c":[0,1,2],"e":"El PGC 2007 obliga a TODAS las empresas (con el PGC de PYMES como adaptación); no se limita a cotizadas.","id":"h4_27"},{"t":4,"d":3,"ref":false,"q":"Las cinco partes del PGC 2007 son:","o":["Marco conceptual; normas de registro y valoración; cuentas anuales; cuadro de cuentas; definiciones y relaciones contables.","El marco conceptual recoge los fundamentos, principios y conceptos básicos que conducen a la imagen fiel.","Las normas de registro y valoración recogen criterios y reglas aplicables a distintas transacciones y elementos.","Balance; memoria; Diario; Mayor; inventario."],"c":[0,1,2],"e":"Las cinco partes son las de la opción A; la D mezcla estados contables y libros.","id":"h4_28"},{"t":4,"d":3,"ref":false,"q":"La parte de «cuentas anuales» del PGC 2007:","o":["Incluye las normas de elaboración de las cuentas anuales.","Incluye los modelos, normales y abreviados.","Comprende cinco documentos.","Incluye el cuadro de cuentas."],"c":[0,1,2],"e":"Esta parte contiene normas de elaboración y modelos (normales y abreviados) de los cinco documentos; el cuadro de cuentas es otra parte del plan.","id":"h4_29"},{"t":4,"d":3,"ref":false,"q":"El cuadro de cuentas y las definiciones y relaciones contables del PGC:","o":["El cuadro de cuentas es la relación de cuentas para reflejar las problemáticas contables.","Las definiciones y relaciones contables definen cada elemento y los motivos de cargo y abono de cada cuenta.","Ambas son partes del Plan General de Contabilidad.","Ambas forman parte del marco conceptual."],"c":[0,1,2],"e":"Son las partes 4ª y 5ª del PGC; el marco conceptual es una parte distinta (la 1ª).","id":"h4_30"},{"t":4,"d":3,"ref":false,"q":"Las cuentas anuales:","o":["Forman una unidad.","Deben redactarse con claridad.","Deben mostrar la imagen fiel del patrimonio, de la situación financiera y de los resultados.","Cada documento se interpreta de forma aislada, sin relación con los demás."],"c":[0,1,2],"e":"Forman una UNIDAD: se interpretan conjuntamente.","id":"h4_31"},{"t":4,"d":3,"ref":false,"q":"Son cuentas anuales según el PGC 2007:","o":["El balance y la cuenta de pérdidas y ganancias.","El estado de cambios en el patrimonio neto y el estado de flujos de efectivo.","La memoria.","El informe de gestión y el informe de auditoría."],"c":[0,1,2],"e":"Los informes de gestión y auditoría acompañan a las cuentas anuales pero no forman parte de ellas.","id":"h4_32"},{"t":4,"d":3,"ref":false,"q":"Relaciona cada estado con lo que muestra:","o":["Balance: patrimonio (riqueza) que controla la empresa en un momento determinado.","Cuenta de pérdidas y ganancias: renta generada (resultado) en un periodo.","Estado de cambios en el patrimonio neto: causas de variación del patrimonio neto en un periodo.","Memoria: entradas y salidas de tesorería del periodo."],"c":[0,1,2],"e":"Las entradas y salidas de tesorería las muestra el estado de FLUJOS DE EFECTIVO; la memoria complementa y aclara.","id":"h4_33"},{"t":4,"d":3,"ref":false,"q":"El estado de flujos de efectivo:","o":["Muestra dónde se origina la tesorería y dónde se aplica durante un periodo.","Recoge los cobros y los pagos del ejercicio.","Informa de la capacidad de la empresa para atender sus obligaciones de pago.","Muestra el resultado devengado del ejercicio."],"c":[0,1,2],"e":"El EFE trabaja con cobros y pagos (tesorería), no con el resultado devengado (que corresponde a la PyG).","id":"h4_34"},{"t":4,"d":3,"ref":false,"q":"Las empresas que presentan balance y memoria abreviados:","o":["No están obligadas a elaborar el estado de flujos de efectivo.","No están obligadas a elaborar el estado de cambios en el patrimonio neto.","Siguen obligadas a elaborar balance, cuenta de pérdidas y ganancias y memoria.","Quedan exentas de elaborar la memoria."],"c":[0,1,2],"e":"La dispensa afecta al EFE y al ECPN; balance, PyG y memoria siguen siendo obligatorios.","id":"h4_35"},{"t":4,"d":3,"ref":false,"q":"Los criterios para poder utilizar modelos abreviados tienen en cuenta:","o":["El total del activo.","La cifra de negocios.","El número de empleados.","El número de accionistas."],"c":[0,1,2],"e":"Los tres umbrales son activo, cifra de negocios y plantilla; el número de accionistas es irrelevante.","id":"h4_36"},{"t":4,"d":3,"ref":false,"q":"El balance de situación como cuenta anual:","o":["Presenta una síntesis de las cuentas patrimoniales.","Refleja la posición estática del patrimonio al cierre, distinguiendo inversiones y fuentes de financiación.","Los elementos del activo figuran por su valor contable.","Refleja los flujos de tesorería del ejercicio."],"c":[0,1,2],"e":"El balance es una foto estática del patrimonio; los flujos de tesorería van al EFE.","id":"h4_37"},{"t":4,"d":3,"ref":false,"q":"En el patrimonio neto del balance se distingue entre:","o":["Fondos propios.","Ajustes por cambios de valor.","Subvenciones, donaciones y legados recibidos.","Pasivos por provisiones."],"c":[0,1,2],"e":"Las tres rúbricas del PN son fondos propios, ajustes por cambios de valor y subvenciones, donaciones y legados. Las provisiones son PASIVO.","id":"h4_38"},{"t":4,"d":3,"ref":false,"q":"El balance de comprobación (sumas y saldos) frente al balance de situación:","o":["El de comprobación puede realizarse en cualquier momento y al menos trimestralmente.","El de comprobación es una relación de todas las cuentas con saldo en el Mayor y es previo a la determinación del resultado.","El de comprobación no tiene formato obligatorio y suele adoptar forma de lista.","El de situación incluye también las cuentas de gastos e ingresos del ejercicio."],"c":[0,1,2],"e":"El balance de situación sólo recoge cuentas patrimoniales (A, P y PN); los gastos e ingresos van a la PyG.","id":"h4_39"},{"t":4,"d":3,"ref":false,"q":"La cuenta de pérdidas y ganancias como cuenta anual:","o":["Refleja el resultado del periodo, identificando los flujos de ingresos y gastos que lo ocasionan.","Clasifica los ingresos y gastos por su naturaleza (personal, suministros, financieros…).","Distingue resultado de explotación, resultado financiero y resultado de operaciones interrumpidas.","Puede presentarse en modelo abreviado según el activo, la cifra de negocios y el número de trabajadores."],"c":[0,1,2,3],"e":"Todas son correctas.","id":"h4_40"},{"t":4,"d":3,"ref":false,"q":"En el modelo de cuenta de PyG del PGC 2007:","o":["El resultado de explotación se obtiene antes que el resultado financiero.","El resultado antes de impuestos suma el resultado de explotación y el financiero.","El resultado del ejercicio incorpora, en su caso, el resultado de operaciones interrumpidas neto de impuestos.","El impuesto sobre beneficios se resta antes de calcular el resultado de explotación."],"c":[0,1,2],"e":"El impuesto se aplica sobre el resultado ANTES de impuestos (A.3), después del de explotación y financiero.","id":"h4_41"},{"t":4,"d":3,"ref":false,"q":"El estado de cambios en el patrimonio neto surge porque:","o":["Existen variaciones de valor de activos y pasivos cuya contrapartida son cuentas de patrimonio neto y no la cuenta de resultados.","Es necesario conocer las causas de variación del patrimonio neto.","Todos los ingresos y gastos pasan siempre por la cuenta de pérdidas y ganancias.","Hay ingresos y gastos que se imputan directamente al patrimonio neto."],"c":[0,1,3],"e":"Precisamente porque NO todo pasa por la PyG (subvenciones, valoración de ciertos instrumentos…), el ECPN es necesario.","id":"h4_42"},{"t":4,"d":3,"ref":false,"q":"Las dos partes del estado de cambios en el patrimonio neto son:","o":["El estado de ingresos y gastos reconocidos.","El estado total de cambios en el patrimonio neto.","El estado de flujos de efectivo.","El balance de comprobación."],"c":[0,1],"e":"ECPN = estado de ingresos y gastos reconocidos + estado total de cambios en el patrimonio neto.","id":"h4_43"},{"t":4,"d":3,"ref":false,"q":"El estado de ingresos y gastos reconocidos:","o":["Refleja exclusivamente los ingresos y gastos generados por la actividad durante el ejercicio.","Distingue los reconocidos en la cuenta de pérdidas y ganancias y los reconocidos directamente en el patrimonio neto.","Incluye las transferencias a la cuenta de pérdidas y ganancias.","Recoge las operaciones de la empresa con sus socios."],"c":[0,1,2],"e":"Las operaciones con socios figuran en el estado TOTAL de cambios en el patrimonio neto, no en el de ingresos y gastos reconocidos.","id":"h4_44"},{"t":4,"d":3,"ref":false,"q":"El estado total de cambios en el patrimonio neto recoge:","o":["Los elementos que componen el patrimonio neto y las variaciones que han experimentado.","El total de ingresos y gastos reconocidos.","Las operaciones con socios o propietarios.","Únicamente el saldo de la cuenta de caja."],"c":[0,1,2],"e":"Parte del PN inicial y llega al final a través de ingresos y gastos reconocidos, operaciones con socios y otras variaciones.","id":"h4_45"},{"t":4,"d":3,"ref":false,"q":"En el estado de flujos de efectivo, clasifica correctamente:","o":["El cobro a clientes es un flujo de las actividades de explotación.","El pago por la compra de maquinaria es un flujo de las actividades de inversión.","El pago de dividendos es un flujo de las actividades de financiación.","La compra de maquinaria es un flujo de financiación."],"c":[0,1,2],"e":"Explotación: operaciones corrientes; inversión: compra/venta de inmovilizado; financiación: operaciones con socios y deuda.","id":"h4_46"},{"t":4,"d":3,"ref":false,"q":"En el estado de flujos de efectivo:","o":["Los cobros por desinversiones (venta de inmovilizado) son flujos de inversión.","La devolución de deudas con entidades de crédito es un flujo de financiación.","La variación neta del efectivo es la suma de los flujos de explotación, inversión y financiación.","El resultado del ejercicio antes de impuestos no interviene en el cálculo de los flujos de explotación."],"c":[0,1,2],"e":"El cálculo de los flujos de explotación PARTE del resultado antes de impuestos, ajustándolo.","id":"h4_47"},{"t":4,"d":3,"ref":false,"q":"La memoria:","o":["Completa, amplía y comenta la información de los demás documentos de las cuentas anuales.","Es una importante fuente de información, principalmente cualitativa.","Incluye notas como actividad de la empresa, bases de presentación, aplicación de resultados o normas de registro y valoración.","Es un documento voluntario."],"c":[0,1,2],"e":"La memoria es una cuenta anual OBLIGATORIA (aunque pueda ser abreviada).","id":"h4_48"},{"t":4,"d":3,"ref":false,"q":"El informe de gestión:","o":["Es obligatorio para las empresas que presentan balance normal.","Contextualiza la información contenida en las cuentas anuales.","Agrupa aspectos relevantes para evaluar los riesgos y las estrategias de la empresa.","Es una de las cinco cuentas anuales."],"c":[0,1,2],"e":"El informe de gestión acompaña a las cuentas anuales, pero NO es una de ellas.","id":"h4_49"},{"t":4,"d":3,"ref":false,"q":"El informe de gestión incluye:","o":["Información no financiera.","Aspectos y temas relevantes para evaluar riesgos y estrategias.","Información que contextualiza las cuentas anuales.","Exclusivamente datos monetarios del balance."],"c":[0,1,2],"e":"Su valor añadido es precisamente la información no financiera y de contexto.","id":"h4_50"},{"t":4,"d":3,"ref":false,"q":"El informe de auditoría:","o":["Lo elabora un profesional independiente: el auditor de cuentas.","Indica si las cuentas anuales ofrecen la imagen fiel del patrimonio, de la situación financiera y de los resultados.","Indica, en su caso, la concordancia del informe de gestión con las cuentas anuales del ejercicio.","Es obligatorio para todas las empresas, incluidas las que presentan modelos abreviados."],"c":[0,1,2],"e":"Es obligatorio para las empresas que presentan balance NORMAL, no para todas.","id":"h4_51"},{"t":4,"d":3,"ref":false,"q":"Quién certifica la imagen fiel de la información contable:","o":["La auditoría.","Un profesional indep
