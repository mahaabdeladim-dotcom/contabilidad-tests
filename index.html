      save();
      ids = shuffle(ids);   // dentro del test, orden aleatorio
    } else {
      let pool = buildPool();
      if(c.src==="failfirst"){
        const failed = shuffle(pool.filter(q=>S.pool.includes(q.id)).map(q=>q.id));
        const rest = shuffle(pool.filter(q=>!S.pool.includes(q.id)).map(q=>q.id));
        ids = shuffle(failed.concat(rest).slice(0,c.n));
      } else {
        ids = shuffle(pool.map(q=>q.id)).slice(0,c.n);
      }
    }
    startQuiz(ids, { kind:"random", name: c.src==="slow"?"Tanda de preguntas lentas":"Test aleatorio" });
  },
  quickRandom(mode){
    let qs, name;
    if(mode==="unseen"){ qs = DATA.questions.filter(q=>!S.seen[q.id]); name="Preguntas nuevas"; }
    else if(mode==="ref"){ qs = DATA.questions.filter(q=>q.ref); name="Preguntas de referencia"; }
    else { qs = DATA.questions.filter(q=>q.d===3); name="Simulacro de examen"; }
    const n = mode==="exam"? 20 : S.cfg.n;
    startQuiz(shuffle(qs.map(q=>q.id)).slice(0,n), { kind:"random", name });
  },

  /* --- examen literal --- */
  litStart(id){
    const x = DATA.lit.find(t=>t.id===id);
    startQuiz(shuffle(x.ids), { kind:"lit", lit:id, name:"Examen literal · "+x.name });
  },
  litAll(){
    const ids = DATA.lit.reduce((a,x)=>a.concat(x.ids),[]);
    startQuiz(shuffle(ids), { kind:"lit", lit:"all", name:"Examen literal · Todas" });
  },

  /* --- práctica de asientos --- */
  pStart(id){ pstate = { caso:id, idx:0, score:0, checked:false, lastOk:false, userLines:null, finished:false }; go("pquiz"); },
  pAddLine(){ const pl=document.getElementById("pl"); if(!pl) return; pl.insertAdjacentHTML("beforeend", pRowHTML()); },
  pRemoveLine(btn){ const pl=document.getElementById("pl"); const row=btn.closest(".prow"); if(pl && pl.querySelectorAll(".prow").length>1){ row.remove(); A.pTotals(); } else { const sel=row.querySelector(".pc"); if(sel)sel.value=""; row.querySelectorAll(".pdh button").forEach(b=>b.classList.remove("on")); const inp=row.querySelector(".pn"); if(inp)inp.value=""; A.pTotals(); } },
  pSide(btn){ const g=btn.parentNode; g.querySelectorAll("button").forEach(b=>b.classList.remove("on")); btn.classList.add("on"); },
  pTotals(){
    const tot=document.getElementById("ptot"); if(!tot) return;
    let d=0,h=0;
    document.querySelectorAll("#pl .prow").forEach(r=>{
      const on=r.querySelector(".pdh button.on"); const n=parseFloat(r.querySelector(".pn").value);
      if(on && n>0){ if(on.dataset.s==="D") d+=n; else h+=n; }
    });
    tot.innerHTML = `<span>Debe: ${pFmt(d)}</span><span>Haber: ${pFmt(h)}</span>`;
    tot.classList.toggle("ok", d>0 && Math.round(d*100)===Math.round(h*100));
  },
  pCheck(){
    const rows=[...document.querySelectorAll("#pl .prow")];
    const userLines=[];
    rows.forEach(r=>{
      const c=r.querySelector(".pc").value;
      const on=r.querySelector(".pdh button.on"); const l=on?on.dataset.s:"";
      const n=parseFloat(r.querySelector(".pn").value);
      if(c && l && n>0) userLines.push({c,l,n});
    });
    if(!userLines.length){ toast("Añade al menos una línea con cuenta, D/H e importe"); return; }
    const caso=PRACTICA.find(c=>c.id===pstate.caso), op=caso.ops[pstate.idx];
    const um=pNet(userLines), sm=pNet(op.a);
    const keys=new Set([...Object.keys(um),...Object.keys(sm)]);
    let ok=true; for(const k of keys){ if(um[k]!==sm[k]){ ok=false; break; } }
    pstate.userLines=userLines; pstate.checked=true; pstate.lastOk=ok;
    if(ok) pstate.score++;
    render();
  },
  pNext(){
    const caso=PRACTICA.find(c=>c.id===pstate.caso);
    if(pstate.idx>=caso.ops.length-1){
      pstate.finished=true;
      S.pr[caso.id]={ score:pstate.score, total:caso.ops.length }; save();
    } else { pstate.idx++; }
    pstate.checked=false; pstate.userLines=null; pstate.lastOk=false;
    render();
  },
  pQuit(){ pstate=null; go("practica"); },

  /* --- repaso de fallos --- */
  errLast(){
    const last = S.tests.find(t=>t.failed.length>0);
    if(!last) return;
    startQuiz(shuffle(last.failed), { kind:"errors", name:"Errores · "+last.name });
  },
  errRandom(){
    const pool = S.pool.filter(id=>QMAP[id]);
    startQuiz(shuffle(pool).slice(0, S.cfg.n), { kind:"errors", name:"Repaso de fallos" });
  },
  errFrom(gi){
    const t = S.tests[gi]; if(!t||!t.failed.length) return;
    startQuiz(shuffle(t.failed), { kind:"errors", name:"Errores · "+t.name });
  },
  errOfLast(){
    const r = session.summary;
    startQuiz(shuffle(r.failed), { kind:"errors", name:"Errores · "+r.name });
  },
  repeat(){
    const r = session.summary;
    startQuiz(shuffle(r.ids), { kind:r.kind, tema:r.tema, ti:r.ti, lit:r.lit, name:r.name });
  },

  /* --- dentro del quiz --- */
  pick(oi){
    const s=session; if(s.graded || s.review!==null) return;
    if(s.sel.has(oi)) s.sel.delete(oi); else s.sel.add(oi);
    render();
  },
  check(){
    const s=session; if(s.review!==null || s.graded) return;
    gradeCurrent();
    render();
    if(session.graded.correct){
      session._auto = setTimeout(()=>{ if(session && session.graded) A.next(); }, 1300);
    }
  },
  prev(){
    const s=session; if(!s) return;
    clearTimeout(s._auto);
    if(s.review===null){
      if(s.idx===0) return;
      if(!s.graded) s.qtPause = Date.now();   // pausa el crono de la pregunta actual
      s.review = s.idx-1;
    } else if(s.review>0){
      s.review--;
    }
    render();
  },
  revNext(){
    const s=session; if(!s || s.review===null) return;
    const nxt = s.review+1;
    if(nxt>=s.results.length || nxt===s.idx){ A.revExit(); return; }
    s.review = nxt;
    render();
  },
  revExit(){
    const s=session; if(!s || s.review===null) return;
    s.review=null;
    if(!s.graded && s.qtPause){ s.qt += Date.now()-s.qtPause; }
    s.qtPause=null;
    render();
  },
  next(){
    const s=session; if(!s.graded || s.review!==null) return;
    clearTimeout(s._auto);
    if(s.idx === s.ids.length-1){ finishQuiz(); return; }
    s.idx++; s.sel=new Set(); s.graded=null; s.qt=Date.now();
    render();
  },
  quitAsk(){
    openSheet(`<div class="grab"></div><h3>¿Salir del test?</h3>
      <p style="color:var(--text2);font-size:14.5px;margin:0 0 16px">Perderás el progreso de este test (las preguntas ya corregidas sí cuentan para tu repaso).</p>
      <button class="btn red" onclick="A.quit()">Salir</button>
      <button class="btn gray" onclick="A.closeSheet()">Seguir con el test</button>`);
  },
  quit(){ clearTimeout(session&&session._auto); session=null; closeSheet(); go("home"); },

  /* --- resultados / historial --- */
  expandFail(el){
    const fx = el.querySelector(".fx");
    const open = fx.style.display!=="none";
    fx.style.display = open? "none":"block";
    if(!open) fx.innerHTML = "<b style='color:var(--green)'>Correctas: "+el.dataset.c+"</b> — "+el.dataset.e;
  },
  histSheet(i){
    const t = S.tests[i];
    const nota = t.score/t.total*10;
    openSheet(`<div class="grab"></div><h3>${esc(t.name)}</h3>
      <div class="frow"><div class="fl">Nota</div><b style="color:${notaColor(nota)};font-size:17px">${nota.toFixed(1)} / 10</b></div>
      <div class="frow"><div class="fl">Aciertos</div><b>${t.score} de ${t.total}</b></div>
      <div class="frow"><div class="fl">Tiempo</div><b>${fmtT(t.secs)} · ${t.avgQ.toFixed(1)}s por pregunta</b></div>
      <div class="frow"><div class="fl">Fecha</div><b>${fmtDate(t.ts)}</b></div>
      <div style="margin-top:14px">
      ${t.failed.length? `<button class="btn red" onclick="A.closeSheet();A.errFrom(${i})">${I.redo} Repasar sus ${t.failed.length} fallos</button>`:""}
      <button class="btn gray" onclick="A.closeSheet();A.repeatHist(${i})">Repetir este test</button>
      <button class="btn soft" onclick="A.closeSheet()">Cerrar</button></div>`);
  },
  repeatHist(i){
    const t = S.tests[i];
    startQuiz(shuffle(t.ids), { kind:t.kind, tema:t.tema, ti:t.ti, lit:t.lit, name:t.name });
  }
};
window.A = A;

/* ================== ARRANQUE ================== */
applyTheme();
render();
SY.boot();
</script>
