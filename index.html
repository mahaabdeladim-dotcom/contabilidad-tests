<!doctype html>
<html lang="es">
<meta charset="utf-8">
<link rel="manifest" href="manifest.webmanifest">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>Contabilidad · Tests</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
/* ============ TOKENS (oscuro por defecto) ============ */
:root{
  --bg:#0a0a0c; --card:#1c1c1e; --card2:#2c2c2e; --fill:#3a3a3c;
  --sep:rgba(255,255,255,.08); --text:#f2f2f7; --text2:#98989f; --text3:#636369;
  --tint:#0a84ff; --tint-soft:rgba(10,132,255,.16);
  --green:#30d158; --green-soft:rgba(48,209,88,.14);
  --red:#ff453a; --red-soft:rgba(255,69,58,.13);
  --orange:#ff9f0a; --yellow:#ffd60a;
  --c1:#0a84ff; --c1s:rgba(10,132,255,.15);
  --c2:#64d2ff; --c2s:rgba(100,210,255,.14);
  --c3:#ff9f0a; --c3s:rgba(255,159,10,.14);
  --c4:#bf5af2; --c4s:rgba(191,90,242,.14);
  --blur:rgba(18,18,20,.78); --shadow:0 8px 28px rgba(0,0,0,.45);
  color-scheme:dark;
}
:root[data-theme="light"]{
  --bg:#f2f2f7; --card:#ffffff; --card2:#f2f2f7; --fill:#e3e3e8;
  --sep:rgba(0,0,0,.08); --text:#111114; --text2:#6e6e76; --text3:#a3a3ab;
  --tint:#007aff; --tint-soft:rgba(0,122,255,.12);
  --green:#28a745; --green-soft:rgba(52,199,89,.14);
  --red:#e0332a; --red-soft:rgba(255,59,48,.11);
  --orange:#f08c00; --yellow:#f5c400;
  --c1:#007aff; --c1s:rgba(0,122,255,.10);
  --c2:#0aa4c8; --c2s:rgba(50,173,200,.12);
  --c3:#f08c00; --c3s:rgba(255,149,0,.13);
  --c4:#af52de; --c4s:rgba(175,82,222,.11);
  --blur:rgba(249,249,251,.82); --shadow:0 8px 24px rgba(60,60,80,.14);
  color-scheme:light;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:17px; line-height:1.45; -webkit-font-smoothing:antialiased;
  min-height:100dvh; transition:background .3s ease;
}
#wrap{max-width:660px;margin:0 auto;padding:12px 16px calc(96px + env(safe-area-inset-bottom));}
button{font:inherit;color:inherit;background:none;border:none;padding:0;cursor:pointer}
button:focus-visible,.row:focus-visible{outline:2px solid var(--tint);outline-offset:2px;border-radius:10px}

/* ============ CABECERAS ============ */
.lt{display:flex;align-items:flex-end;justify-content:space-between;margin:14px 2px 14px}
.lt h1{font-size:33px;font-weight:800;letter-spacing:-.6px;margin:0;line-height:1.1;text-wrap:balance}
.lt .sub{color:var(--text2);font-size:14px;margin-top:3px}
.hbtns{display:flex;gap:8px}
.cbtn{width:38px;height:38px;border-radius:50%;background:var(--card);display:inline-flex;align-items:center;justify-content:center;color:var(--tint);box-shadow:var(--shadow)}
.cbtn:active{transform:scale(.92)}
.nav{display:flex;align-items:center;gap:6px;margin:10px 0 6px}
.back{display:inline-flex;align-items:center;gap:2px;color:var(--tint);font-size:17px;font-weight:600;padding:6px 8px 6px 0}
.sechead{font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);margin:26px 8px 8px}

/* ============ TARJETAS / LISTAS ============ */
.card{background:var(--card);border-radius:16px;overflow:hidden}
.card+.card{margin-top:12px}
.row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:13px 16px;position:relative}
.row+.row::before{content:"";position:absolute;top:0;left:16px;right:0;height:1px;background:var(--sep)}
.row:active{background:var(--card2)}
.row .grow{flex:1;min-width:0}
.row .ttl{font-weight:600;font-size:16px}
.row .dt{color:var(--text2);font-size:13.5px;margin-top:1px}
.chev{color:var(--text3);flex:none}
.icobox{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
.pill{font-size:13px;font-weight:700;padding:4px 10px;border-radius:999px;font-variant-numeric:tabular-nums;flex:none}
.tag{font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:6px;display:inline-flex;align-items:center;gap:4px}

/* ============ BOTONES ============ */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:14px;font-size:16.5px;font-weight:700;background:var(--tint);color:#fff;transition:transform .12s ease}
.btn:active{transform:scale(.975)}
.btn.gray{background:var(--card2);color:var(--text)}
.btn.soft{background:var(--tint-soft);color:var(--tint)}
.btn.red{background:var(--red-soft);color:var(--red)}
.btn.green{background:var(--green)}
.btn:disabled{opacity:.4;transform:none}
.btn+.btn{margin-top:10px}

/* ============ TAB BAR ============ */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--blur);-webkit-backdrop-filter:saturate(180%) blur(22px);backdrop-filter:saturate(180%) blur(22px);border-top:1px solid var(--sep)}
.tabbar .in{max-width:660px;margin:0 auto;display:flex;padding:6px 8px calc(6px + env(safe-area-inset-bottom))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 0;color:var(--text3);font-size:10.5px;font-weight:600}
.tab.on{color:var(--tint)}
.tab svg{width:25px;height:25px}

/* ============ QUIZ ============ */
.qtop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:8px 0 4px}
.qtop .cnt{font-weight:700;font-size:15px;color:var(--text2);font-variant-numeric:tabular-nums}
.qtop .tm{display:flex;align-items:center;gap:5px;color:var(--text2);font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;background:var(--card);padding:6px 12px;border-radius:999px}
.pbar{height:5px;background:var(--card2);border-radius:99px;overflow:hidden;margin:10px 0 18px}
.pbar>div{height:100%;background:var(--tint);border-radius:99px;transition:width .35s ease}
.qmeta{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.dots{display:inline-flex;gap:3px}
.dots i{width:6px;height:6px;border-radius:50%;background:var(--fill)}
.dots i.on{background:currentColor}
.qtext{font-size:20px;font-weight:700;letter-spacing:-.2px;line-height:1.35;margin:2px 0 6px;text-wrap:balance}
.hint{color:var(--text2);font-size:13.5px;margin-bottom:14px}
.prevrow{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:4px}
.btnprev{display:inline-flex;align-items:center;gap:2px;background:none;color:var(--text3);font-size:13.5px;font-weight:600;padding:9px 10px;border-radius:10px}
.btnprev svg{width:15px;height:15px}
.btnprev:active{color:var(--text2);background:var(--card2)}
.opt{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;background:var(--card);border:1.5px solid transparent;border-radius:14px;padding:14px;margin-bottom:10px;font-size:16px;line-height:1.4;transition:transform .1s ease,border-color .15s ease,background .15s ease}
.opt:active{transform:scale(.985)}
.opt .mk{flex:none;width:26px;height:26px;border-radius:8px;border:2px solid var(--fill);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--text2);transition:all .15s ease}
.opt.sel{border-color:var(--tint);background:var(--tint-soft)}
.opt.sel .mk{background:var(--tint);border-color:var(--tint);color:#fff}
.opt.ok{border-color:var(--green);background:var(--green-soft)}
.opt.ok .mk{background:var(--green);border-color:var(--green);color:#fff}
.opt.ko{border-color:var(--red);background:var(--red-soft)}
.opt.ko .mk{background:var(--red);border-color:var(--red);color:#fff}
.opt.miss{border-color:var(--green)}
.opt.miss .mk{border-color:var(--green);color:var(--green)}
.opt:disabled{cursor:default}
.opt:disabled:active{transform:none}
.fb{border-radius:14px;padding:14px 16px;margin:14px 0 4px;animation:up .25s ease}
.fb.good{background:var(--green-soft)} .fb.bad{background:var(--red-soft)}
.fb .v{font-weight:800;font-size:16px;display:flex;gap:7px;align-items:center;margin-bottom:5px}
.fb.good .v{color:var(--green)} .fb.bad .v{color:var(--red)}
.fb p{margin:0;font-size:14.5px;color:var(--text);opacity:.92;line-height:1.5}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ============ RESULTADOS ============ */
.hero{display:flex;flex-direction:column;align-items:center;padding:26px 16px 20px;text-align:center}
.ringwrap{position:relative;width:158px;height:158px}
.ringwrap svg{transform:rotate(-90deg)}
.ringwrap .c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ringwrap .n{font-size:38px;font-weight:800;letter-spacing:-1px;line-height:1;font-variant-numeric:tabular-nums}
.ringwrap .n small{font-size:16px;color:var(--text2);font-weight:700}
.ringwrap .l{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
ring-circle{transition:stroke-dashoffset 1s ease}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.stat{background:var(--card);border-radius:14px;padding:12px 14px}
.stat .k{font-size:12.5px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.stat .v{font-size:21px;font-weight:800;margin-top:2px;font-variant-numeric:tabular-nums}
.bar{display:flex;align-items:center;gap:10px;padding:11px 16px}
.bar .nm{width:64px;font-size:14px;font-weight:700;flex:none}
.bar .tr{flex:1;height:9px;background:var(--card2);border-radius:99px;overflow:hidden}
.bar .tr>div{height:100%;border-radius:99px;transition:width .7s ease}
.bar .pc{width:74px;text-align:right;font-size:13px;color:var(--text2);font-weight:600;font-variant-numeric:tabular-nums;flex:none}

/* ============ SHEETS / SEGMENTOS / CHIPS ============ */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60;animation:fade .2s ease}
@keyframes fade{from{opacity:0}}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:61;background:var(--card);border-radius:18px 18px 0 0;max-width:660px;margin:0 auto;padding:8px 18px calc(20px + env(safe-area-inset-bottom));animation:slide .28s cubic-bezier(.3,1,.4,1);max-height:86dvh;overflow:auto}
@keyframes slide{from{transform:translateY(60%)}}
.grab{width:38px;height:5px;border-radius:99px;background:var(--fill);margin:6px auto 12px}
.sheet h3{font-size:19px;font-weight:800;margin:2px 0 14px;letter-spacing:-.3px}
.frow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 2px;border-bottom:1px solid var(--sep)}
.frow:last-of-type{border-bottom:none}
.frow .fl{font-weight:600;font-size:15.5px}
.frow .fd{font-size:12.5px;color:var(--text2);margin-top:1px}
.seg{display:flex;background:var(--card2);border-radius:10px;padding:2.5px;gap:2px}
.seg button{flex:1;padding:6px 12px;border-radius:8px;font-size:13.5px;font-weight:650;color:var(--text2);white-space:nowrap}
.seg button.on{background:var(--fill);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.25)}
:root[data-theme="light"] .seg button.on{background:#fff}

/* ============ PRÁCTICA DE ASIENTOS ============ */
.penun{background:var(--card);border-radius:14px;padding:14px 16px;font-size:16px;line-height:1.45;font-weight:500;margin-bottom:10px}
.pcard{background:var(--card);border-radius:16px;padding:14px 14px 12px}
.prow{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.prow select.pc{flex:1;min-width:0;background:var(--card2);color:var(--text);border:1.5px solid var(--sep);border-radius:10px;padding:10px 8px;font-size:13.5px}
.prow .pdh{display:flex;background:var(--card2);border-radius:9px;padding:2px;flex:none}
.prow .pdh button{width:32px;padding:7px 0;border-radius:7px;font-size:13px;font-weight:800;color:var(--text2)}
.prow .pdh button.on[data-s="D"]{background:var(--tint);color:#fff}
.prow .pdh button.on[data-s="H"]{background:var(--c4);color:#fff}
.prow input.pn{width:82px;flex:none;background:var(--card2);color:var(--text);border:1.5px solid var(--sep);border-radius:10px;padding:10px 8px;font-size:14px;text-align:right;font-variant-numeric:tabular-nums}
.prow .pdel{flex:none;color:var(--text3);width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.ptot{display:flex;justify-content:space-between;font-size:13.5px;color:var(--text2);font-weight:700;font-variant-numeric:tabular-nums;padding:8px 2px 2px;border-top:1px solid var(--sep);margin-top:4px}
.ptot.ok span{color:var(--green)}
.pverd{border-radius:12px;padding:12px 14px;margin:12px 0;font-weight:700;font-size:15.5px;display:flex;align-items:center;gap:8px}
.pverd.ok{background:var(--green-soft);color:var(--green)}
.pverd.no{background:var(--red-soft);color:var(--red)}
.asol{background:var(--card2);border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:14.5px}
.asol .ttl{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--text2);margin-bottom:6px}
.asol .al{display:flex;justify-content:space-between;gap:10px;padding:3px 0;font-variant-numeric:tabular-nums}
.asol .al.h{padding-left:20px}
.asol .al .cc{color:var(--text)}
.asol .al.h .cc{color:var(--text2)}
.asol .exp{margin-top:8px;padding-top:8px;border-top:1px solid var(--sep);color:var(--text2);font-size:13.5px;line-height:1.5}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:999px;background:var(--card2);font-size:14px;font-weight:700;color:var(--text2);border:1.5px solid transparent}
.chip.on{color:#fff}
.sw{position:relative;width:50px;height:30px;border-radius:999px;background:var(--fill);transition:background .2s ease;flex:none}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:26px;height:26px;border-radius:50%;background:#fff;transition:transform .2s ease;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.sw.on{background:var(--green)}
.sw.on::after{transform:translateX(20px)}

/* ============ VARIOS ============ */
.big2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.action{background:var(--card);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:10px;align-items:flex-start;text-align:left;transition:transform .12s ease}
.action:active{transform:scale(.97)}
.action .t{font-weight:700;font-size:15.5px}
.action .d{font-size:12.5px;color:var(--text2);line-height:1.35}
.empty{text-align:center;color:var(--text2);padding:34px 20px;font-size:15px}
.empty .e{font-size:38px;margin-bottom:8px}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(104px + env(safe-area-inset-bottom));background:var(--card2);color:var(--text);padding:11px 20px;border-radius:999px;font-size:14px;font-weight:600;z-index:80;box-shadow:var(--shadow);animation:up .25s ease;max-width:86%;text-align:center}
.view{animation:vin .28s ease}
@keyframes vin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.banner{background:var(--orange);color:#111;font-size:13.5px;font-weight:600;padding:10px 14px;border-radius:12px;margin-bottom:12px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<div id="wrap"></div>
<div class="tabbar" id="tabbar"><div class="in"></div></div>

<script>
"use strict";
/* ================== DATOS ================== */
const DATA = {"temas":[{"id":1,"name":"Tema 1","desc":"La contabilidad"},{"id":2,"name":"Tema 2","desc":"La representación contable"},{"id":3,"name":"Tema 3","desc":"El ciclo contable"},{"id":4,"name":"Tema 4","desc":"Normalización y regulación"}],"questions":[{"t":1,"d":1,"ref":false,"q":"La contabilidad como sistema de información:","o":["Se encarga de elaborar y suministrar información económica útil para la toma de decisiones.","Capta, mide y registra la realidad económica de la unidad y comunica los resultados.","Se ocupa principalmente de gestionar la información sobre la política.","Se limita a archivar facturas, sin elaborar información nueva."],"c":[0,1],"e":"La contabilidad gestiona y aporta la información sobre la economía: capta, mide, registra y comunica información económica para poder tomar decisiones. No versa sobre la política ni es un mero archivo de documentos.","id":"q1_00"},{"t":1,"d":1,"ref":false,"q":"Los objetos económicos calificados como reales:","o":["Incluyen los bienes tangibles.","Incluyen los bienes intangibles.","Incluyen los servicios.","Incluyen los subsidios y los donativos."],"c":[0,1,2],"e":"Los objetos económicos reales son los elementos sobre los que se realiza la actividad: bienes (tangibles e intangibles) y servicios. Los subsidios o donativos no forman parte de esa categoría.","id":"q1_01"},{"t":1,"d":1,"ref":false,"q":"En relación con la corriente financiera de la empresa:","o":["El pago es la salida de dinero ocasionada por un gasto.","El cobro es la entrada de dinero ocasionada por un ingreso.","El cobro es la salida de dinero ocasionada por un gasto.","La corriente financiera coincide siempre en el tiempo con la corriente real."],"c":[0,1],"e":"La corriente financiera la forman los pagos (salidas de dinero por gastos) y los cobros (entradas de dinero por ingresos). Por el principio de devengo puede no coincidir en el tiempo con la corriente real.","id":"q1_02"},{"t":1,"d":1,"ref":false,"q":"Para que la información financiera cumpla el requisito de fiabilidad:","o":["Debe estar libre de errores materiales.","Debe ser neutral, es decir, libre de sesgos.","Debe ser parcial, favoreciendo los intereses de los propietarios.","Basta con que sea fácilmente comprensible para cualquier usuario."],"c":[0,1],"e":"La fiabilidad exige información libre de errores materiales y neutral (sin sesgos). La parcialidad la vicia, y la facilidad de comprensión es otro requisito distinto (la claridad).","id":"q1_03"},{"t":1,"d":1,"ref":false,"q":"El principio de devengo establece que:","o":["Los efectos de los hechos económicos se registran cuando ocurren.","Los gastos e ingresos se imputan al ejercicio al que correspondan.","La imputación es independiente de la fecha de pago o cobro.","Los gastos se imputan al ejercicio en el que se pagan."],"c":[0,1,2],"e":"Por devengo, los efectos de los hechos se registran cuando ocurren y los gastos e ingresos se imputan al ejercicio al que corresponden, con total independencia de la fecha de su pago o cobro.","id":"q1_04"},{"t":1,"d":1,"ref":false,"q":"Según el principio de prudencia:","o":["Solo se contabilizan los beneficios obtenidos hasta la fecha de cierre del ejercicio.","Los riesgos se tienen en cuenta tan pronto como sean conocidos.","Los beneficios previstos se registran antes de obtenerse.","Se permite infravalorar deliberadamente los activos para dar una imagen conservadora."],"c":[0,1],"e":"La prudencia exige registrar únicamente los beneficios obtenidos al cierre y, en cambio, todos los riesgos en cuanto se conozcan. No ampara ni beneficios no realizados ni infravaloraciones deliberadas.","id":"q1_05"},{"t":1,"d":1,"ref":false,"q":"El principio de no compensación establece que:","o":["No se compensarán las partidas de activo con las de pasivo.","No se compensarán las partidas de gastos con las de ingresos.","Los elementos de las cuentas anuales se valorarán por separado.","Se puede compensar libremente cualquier partida para simplificar el balance."],"c":[0,1,2],"e":"Salvo que una norma disponga lo contrario, no se compensan partidas de activo y pasivo ni de gastos e ingresos, y los elementos integrantes de las cuentas anuales se valoran por separado.","id":"q1_06"},{"t":1,"d":1,"ref":false,"q":"En relación con el valor contable o en libros de un activo:","o":["Es el importe neto por el que figura registrado en el balance.","Se calcula deduciendo la amortización acumulada.","Se calcula deduciendo cualquier corrección valorativa por deterioro.","Se calcula sumando la amortización acumulada al precio de adquisición."],"c":[0,1,2],"e":"Valor contable = importe neto por el que el activo figura en balance: su valor inicial menos la amortización acumulada y las correcciones por deterioro. Nunca se obtiene sumando la amortización.","id":"q1_07"},{"t":1,"d":1,"ref":false,"q":"Los usuarios externos de la información contable:","o":["Tienen un acceso limitado a la información de la empresa.","Incluyen, entre otros, a inversores, acreedores y la Administración.","Realizan las funciones de planificación y control interno del sistema.","Son los destinatarios de la información previsional interna de la gerencia."],"c":[0,1],"e":"Los usuarios externos (inversores, acreedores, bancos, Administración…) tienen un acceso limitado: reciben la información normalizada. La planificación y el control son funciones de los usuarios internos.","id":"q1_08"},{"t":1,"d":1,"ref":false,"q":"En relación con la verificación de la información contable:","o":["La imagen fiel es certificada mediante la auditoría.","La auditoría la realiza un profesional independiente de la empresa.","La certificación corre a cargo de una empresa de publicidad.","La imagen fiel no puede ser objeto de verificación externa."],"c":[0,1],"e":"La auditoría, realizada por profesionales independientes, verifica y certifica que las cuentas muestran la imagen fiel del patrimonio y de la situación financiera de la empresa.","id":"q1_09"},{"t":1,"d":2,"ref":false,"q":"En relación con la definición de contabilidad:","o":["Su objeto formal es el conocimiento cuantitativo y cualitativo de la realidad económica.","Su objeto material es la realidad económica.","Su objeto formal es la elaboración de las normas que rigen en la práctica.","Su objeto material es el proceso de creación de las leyes mercantiles."],"c":[0,1],"e":"El objeto material de la contabilidad es la realidad económica; el objeto formal (su perspectiva de estudio) es el conocimiento cuantitativo y cualitativo de esa realidad. (Tema 1, «Definición de contabilidad».)","id":"q1_10"},{"t":1,"d":2,"ref":false,"q":"Dentro de los objetos económicos reales:","o":["Los bienes de producción son los necesarios para obtener los bienes de consumo.","Los bienes de consumo sirven directamente para satisfacer las necesidades humanas.","Las máquinas, las instalaciones y las materias primas son bienes de producción.","Los bienes de producción son los derechos y los medios de cobro y pago."],"c":[0,1,2],"e":"Los bienes de consumo satisfacen directamente necesidades; los de producción (máquinas, instalaciones, materias primas…) sirven para obtener aquellos. Los derechos y medios de pago son objetos financieros, no reales.","id":"q1_11"},{"t":1,"d":2,"ref":false,"q":"La problemática de carácter económico-técnico (ámbito interno) de la empresa:","o":["Integra los costes de los factores utilizados, en términos monetarios.","Integra el coste de la producción obtenida, en términos monetarios.","Recoge el proceso de transformación interna que se realiza en el seno de la empresa.","Integra los actos de inversión y financiación con el exterior."],"c":[0,1,2],"e":"La problemática económico-técnica abarca el proceso productivo interno: los costes de los factores y el coste de la producción. La inversión y la financiación pertenecen a la problemática económico-financiera.","id":"q1_12"},{"t":1,"d":2,"ref":false,"q":"Los usuarios internos de la información contable:","o":["Realizan funciones de planificación y control.","Tienen cierta capacidad de control sobre el sistema de información contable.","Incluyen a la gerencia, los mandos intermedios y los consejos de administración.","Tienen un acceso muy limitado a los datos de la empresa."],"c":[0,1,2],"e":"Los usuarios internos (gerencia y dirección, mandos intermedios, consejos de administración) planifican y controlan, y disponen de amplio acceso al sistema de información. El acceso limitado caracteriza a los externos.","id":"q1_13"},{"t":1,"d":2,"ref":false,"q":"Para que la información financiera sea comparable:","o":["Debe poder contrastarse con la de la misma empresa en otro momento del tiempo.","Debe poder contrastarse con la información de otras empresas.","Basta con que esté libre de errores materiales y de sesgos.","Debe elaborarse cada año con criterios distintos."],"c":[0,1],"e":"Comparabilidad: la información debe poder compararse en el tiempo (misma empresa) y entre empresas, lo que exige uniformidad de criterios. Estar libre de errores y sesgos es la fiabilidad, otro requisito.","id":"q1_14"},{"t":1,"d":2,"ref":false,"q":"Si no resulta de aplicación el principio de empresa en funcionamiento:","o":["Se suministrará información en la memoria sobre los criterios aplicados.","Deja de presumirse que la gestión de la empresa continuará en un futuro previsible.","Se contabiliza sistemáticamente el deterioro de todos los activos, sin más requisitos.","No hay que informar de nada en las cuentas anuales."],"c":[0,1],"e":"El principio presume la continuidad de la gestión. Cuando no es aplicable (por ejemplo, empresa en liquidación) debe informarse en la memoria de los criterios de valoración aplicados.","id":"q1_15"},{"t":1,"d":2,"ref":false,"q":"Ante un conflicto entre principios contables obligatorios:","o":["Prevalece el que mejor conduzca a que las cuentas anuales muestren la imagen fiel.","La imagen fiel del patrimonio, de la situación financiera y de los resultados es el objetivo último.","Prevalece siempre el principio de prudencia.","Decide el auditor externo qué principio se debe aplicar."],"c":[0,1],"e":"En caso de conflicto prevalece el principio que mejor conduzca a la imagen fiel, que es el objetivo último de las cuentas anuales; la prudencia ya no tiene carácter preferente.","id":"q1_16"},{"t":1,"d":2,"ref":false,"q":"En relación con el valor residual de un activo:","o":["Es el importe que la empresa estima que podría obtener por su venta u otra forma de disposición.","Se estima deduciendo los costes de venta.","Se calcula considerando que el activo hubiese alcanzado ya la antigüedad y condiciones del final de su vida útil.","Es el importe neto por el que el activo figura registrado en el balance."],"c":[0,1,2],"e":"El valor residual es lo que se estima obtener actualmente por la venta del activo (deducidos los costes de venta), suponiéndolo ya al final de su vida útil. El importe neto en balance es el valor contable.","id":"q1_17"},{"t":1,"d":2,"ref":false,"q":"El valor neto realizable de un activo:","o":["Es el importe que se puede obtener por su venta en el mercado.","Se refiere al curso normal del negocio.","Se calcula deduciendo los costes estimados de venta.","Es el importe por el que puede intercambiarse entre partes interesadas e independientes."],"c":[0,1,2],"e":"VNR = importe obtenible por la venta en el mercado, en el curso normal del negocio, menos los costes estimados de venta. El intercambio entre partes independientes define el valor razonable.","id":"q1_18"},{"t":1,"d":2,"ref":false,"q":"La contabilidad como ciencia social:","o":["Sus definiciones y normas se fijan mediante consenso.","No existen en ella conceptos naturales inmutables: se determinan y expresan socialmente.","Busca la exactitud matemática absoluta en todas las operaciones.","Establece teoremas inmutables, independientes del contexto."],"c":[0,1],"e":"Al ser una ciencia social, sus conceptos se determinan y expresan socialmente y las definiciones o normas se fijan por consenso; no hay exactitud absoluta ni teoremas inmutables.","id":"q1_19"},{"t":1,"d":2,"ref":false,"q":"Según el marco conceptual, en relación con los requisitos de la información financiera:","o":["La fiabilidad exige que la información esté libre de errores materiales y sea neutral.","La relevancia implica que la información sea útil para evaluar sucesos pasados, presentes o futuros.","La comparabilidad permite contrastar la información en el tiempo y entre empresas.","La fiabilidad consiste en que los usuarios puedan entender la información sin dificultad."],"c":[0,1,2],"e":"Fiabilidad: libre de errores materiales y neutral. Relevancia: útil para evaluar sucesos y tomar decisiones. Comparabilidad: contrastable en el tiempo y entre empresas. Entenderla sin dificultad es la claridad.","id":"q1_20"},{"t":1,"d":2,"ref":false,"q":"En relación con el principio de devengo:","o":["Los gastos e ingresos se imputan al ejercicio al que correspondan.","La imputación es independiente de la fecha de pago o cobro.","Atiende a la corriente real de bienes y servicios.","Los efectos de las transacciones se registran únicamente cuando se cobran o se pagan."],"c":[0,1,2],"e":"El devengo imputa los gastos e ingresos al ejercicio al que corresponden atendiendo a la corriente real, con independencia de la corriente financiera (cobros y pagos).","id":"q1_21"},{"t":1,"d":2,"ref":false,"q":"En las operaciones de compra de la empresa:","o":["La corriente real es la entrada de bienes y servicios (el gasto).","La corriente financiera es la salida de dinero (el pago).","Gasto y pago pueden no coincidir en el tiempo.","La corriente financiera es la entrada de dinero ocasionada por un ingreso."],"c":[0,1,2],"e":"En las compras, la corriente real es la recepción de bienes/servicios (gasto) y la financiera, el pago. Por devengo pueden no ser simultáneos. La entrada de dinero por un ingreso corresponde a las ventas (cobro).","id":"q1_22"},{"t":1,"d":2,"ref":false,"q":"Según los criterios de valoración del marco conceptual:","o":["El valor contable es el importe neto por el que un activo figura en balance, deducidas la amortización acumulada y los deterioros.","El valor razonable es el importe por el que puede intercambiarse un activo entre partes interesadas, informadas e independientes.","El valor en uso es el valor actual de los flujos de efectivo futuros esperados por su utilización.","El valor contable se obtiene sumando al precio de adquisición la amortización acumulada."],"c":[0,1,2],"e":"Valor contable = importe neto en libros (deducidas amortizaciones y deterioros); valor razonable = importe de intercambio entre partes independientes e informadas; valor en uso = valor actual de los flujos futuros esperados.","id":"q1_23"},{"t":1,"d":2,"ref":false,"q":"En caso de conflicto entre principios contables:","o":["Prevalecerá el que mejor conduzca a la imagen fiel del patrimonio, de la situación financiera y de los resultados.","No prevalece automáticamente el principio de prudencia.","Prevalece siempre el principio de devengo.","Debe consultarse a los auditores externos para que decidan según su juicio."],"c":[0,1],"e":"El criterio de desempate es la imagen fiel: prevalece el principio que mejor conduzca a ella. Ni la prudencia ni el devengo tienen preferencia automática, ni la decisión corresponde al auditor.","id":"q1_24"},{"t":1,"d":2,"ref":false,"q":"Durante un ejercicio, una empresa presta servicios por 3.000 €: cobra al contado 1.700 € y quedan pendientes de cobro 1.300 €. Paga a sus empleados la nómina del periodo por 900 €:","o":["Según el criterio de devengo, el resultado del ejercicio es de 2.100 €.","Según el criterio de caja, el resultado del ejercicio es de 800 €.","Según el criterio de devengo, el resultado del ejercicio es de 800 €.","El ingreso devengado del ejercicio asciende a 3.000 €."],"c":[0,1,3],"e":"Devengo (corriente real): 3.000 − 900 = 2.100 €. Caja (corriente financiera): 1.700 − 900 = 800 €. El ingreso devengado es el total del servicio prestado, 3.000 €, con independencia de lo cobrado.","id":"q1_25"},{"t":1,"d":3,"ref":false,"q":"Identifique cuáles de las siguientes afirmaciones recogen estrictamente los supuestos del criterio de Valor Actual y Valor Razonable:","o":["El valor actual es el importe neto por el que un pasivo se encuentra registrado en balance una vez deducida su amortización.","El valor razonable es el importe por el que puede ser intercambiado un activo, entre partes interesadas y debidamente informadas en condiciones de mutua independencia.","El valor razonable se calcula, con carácter general, por referencia a un valor fiable de mercado.","El valor actual es el importe de los flujos de efectivo a recibir o pagar en el curso normal del negocio, según se trate de un activo o de un pasivo."],"c":[1,2,3],"e":"Valor razonable: Importe por el que puede ser intercambiado un activo o liquidado un pasivo... Con carácter general, se calculará por referencia a un valor fiable de mercado. Valor actual: Importe de los flujos de efectivo a recibir o pagar en el curso normal del negocio. (Tema 1, Diapositivas 34 y 37).","id":"q1_26"},{"t":1,"d":3,"ref":false,"q":"Al analizar los requisitos cualitativos y principios del Marco Conceptual, ¿qué afirmaciones son precisas?","o":["El principio de empresa en funcionamiento asume que la gestión continuará, salvo prueba en contrario, para no determinar el valor del patrimonio a efectos de liquidación.","El principio de uniformidad impide modificar un criterio adoptado bajo cualquier circunstancia, garantizando así la imagen fiel.","El requisito de integridad indica que la información muestra la imagen fiel y, para ello, la información también debe ser completa.","El principio de devengo obliga a registrar los efectos de las transacciones imputando gastos e ingresos según su fecha de cobro o pago."],"c":[0,2],"e":"Principio de empresa en funcionamiento: se considera que la gestión continuará en un futuro previsible (no determinar valor del patrimonio a efectos de transmisión o liquidación). Para que la información muestre la imagen fiel de la realidad económica, también debe ser íntegra (completa). (Tema 1, Diapositivas 21 y 22).","id":"q1_27"},{"t":1,"d":3,"ref":false,"q":"Identifique las opciones que describan correctamente los conceptos de Valor Residual y Costes de Venta de un activo:","o":["Valor residual es el importe de los flujos de efectivo a recibir en el curso normal del negocio.","Valor residual es el importe que la empresa estima que podría obtener en el momento actual por su venta, tomando en consideración que el activo hubiese alcanzado el final de su vida útil.","Costes de venta excluyen los gastos financieros y los impuestos sobre beneficios vinculados directamente a la transacción.","Costes de venta son los incrementales directamente atribuibles en los que la empresa no habría incurrido de no haber decidido vender."],"c":[1,2,3],"e":"Valor residual: Importe que se podría obtener en el momento actual por su venta tomando en consideración que hubiese alcanzado la antigüedad esperada al final de su vida útil. Costes de venta: Costes incrementales directamente atribuibles a la venta, excluidos gastos financieros e impuestos sobre beneficios. (Tema 1, Diapositivas 36 y 37).","id":"q1_28"},{"t":1,"d":3,"ref":false,"q":"Marque las afirmaciones que definan correctamente la corriente real y financiera en el fenómeno de circulación:","o":["Los pagos representan siempre la entrada de factores materiales al proceso productivo interno de la empresa.","Las ventas representan bienes entregados o servicios prestados a terceros expresados en unidades físicas (desinversión).","El cobro es la entrada de dinero ocasionada por un ingreso (venta).","La problemática de carácter económico-técnico recoge la actividad realizada en el interior de la empresa."],"c":[1,2,3],"e":"Ventas (desinversión): Bienes entregados o servicios prestados a terceros en unidades físicas. Cobro: Entrada de dinero ocasionada por un ingreso. Problemática económico-técnico (ámbito interno): Actividad en el interior de la empresa. (Tema 1, Diapositivas 7, 8 y 9).","id":"q1_29"},{"t":1,"d":3,"ref":false,"q":"Sobre el conflicto entre principios contables y el principio de no compensación:","o":["Ante un conflicto de principios, prevalecerá el que mejor conduzca a que las cuentas anuales muestren la imagen fiel del patrimonio.","El principio de no compensación indica que, salvo norma en contrario, las partidas de pasivo y patrimonio neto sí pueden ser compensadas si son de la misma naturaleza.","El principio de no compensación obliga a valorar por separado los elementos de las cuentas anuales.","Se admitirá la no aplicación estricta del principio de no compensación si la variación alterando la imagen fiel es escasamente significativa y lo autoriza la importancia relativa."],"c":[0,2],"e":"Conflicto de principios: Prevalecerá el que mejor conduzca a mostrar la imagen fiel. Principio de no compensación: No se compensarán partidas de activo y pasivo, ni de gastos e ingresos; se valorarán por separado. (Tema 1, Diapositivas 29 y 30).","id":"q1_30"},{"t":1,"d":3,"ref":false,"q":"Una empresa compra una maquinaria y realiza los siguientes pagos: factura del proveedor 12.000 €, descuento acordado 1.000 €, gastos de transporte 100 €, gastos de instalación 300 €, gastos de mantenimiento anual 300 € y componentes para incrementar su capacidad 400 €. En relación con el precio de adquisición:","o":["El precio de adquisición de la maquinaria es de 11.800 €.","El precio de adquisición de la maquinaria es de 13.100 €.","Los gastos de mantenimiento no forman parte del precio de adquisición.","El descuento acordado no se resta del precio de adquisición."],"c":[0,2],"e":"Precio de adquisición = 12.000 − 1.000 (descuento) + 100 (transporte) + 300 (instalación) + 400 (componentes) = 11.800 €. Incluye todos los gastos adicionales necesarios hasta la puesta en funcionamiento; el mantenimiento es un gasto del ejercicio y los descuentos SÍ se deducen.","id":"q1_31"},{"t":1,"d":3,"ref":true,"q":"En relación a las transacciones que se producen en una empresa:","o":["Gasto y compra siempre tienen lugar de forma simultánea.","Compra y pago siempre ocurren de forma simultánea.","Gasto y pago pueden ocurrir o no de forma simultánea.","Gasto y pago siempre tienen lugar de forma simultánea."],"c":[2],"e":"Por el principio de devengo, la corriente real (gasto/ingreso) es independiente de la corriente financiera (pago/cobro): pueden coincidir o no en el tiempo.","id":"q1_32"},{"t":1,"d":3,"ref":true,"q":"La contabilidad es una ciencia empírica:","o":["Que pertenece al campo científico de las ciencias sociales.","Cuyo objeto material es el conocimiento cualitativo y cuantitativo de la realidad concreta.","Que comparte su objeto formal con la Economía.","Cuyo fin genérico es poner de manifiesto la situación de la unidad económica y su evolución en el tiempo."],"c":[0,3],"e":"Es una ciencia social (A) y su fin es mostrar la situación y evolución del patrimonio (D). El objeto MATERIAL es la realidad económica; el objeto FORMAL (perspectiva de estudio) es el conocimiento de esa realidad, no se comparte con la Economía.","id":"q1_33"},{"t":1,"d":3,"ref":true,"q":"Si una empresa vende a crédito 200 kg de mercaderías a 2 euros/kg, en ese momento:","o":["Ha cobrado 400 euros.","La venta ha sido de 200 kg.","El ingreso asciende a 400 euros.","El importe de la venta y del gasto son iguales."],"c":[1,2],"e":"Al ser a crédito todavía no se ha cobrado (A falsa). La venta física es de 200 kg (B) y el ingreso devengado es 200 × 2 = 400 € (C). Venta (ingreso) y gasto no tienen por qué coincidir (D falsa).","id":"q1_34"},{"t":1,"d":3,"ref":true,"q":"Entre las actuaciones que realiza una empresa:","o":["La problemática económico-técnica integra, entre otros, los actos de inversión y financiación.","La problemática económico-financiera está constituida por los procesos de transformación interna de las inversiones.","La problemática económico-financiera integra, entre otros, los actos de inversión y desinversión.","La problemática económico-técnica recoge las transacciones correspondientes al proceso de producción que se realiza en el seno de la empresa."],"c":[2,3],"e":"La problemática económico-financiera abarca la captación de recursos y los actos de inversión/desinversión (C). La económico-técnica recoge los procesos productivos internos de transformación (D).","id":"q1_35"},{"t":1,"d":3,"ref":true,"q":"Según el marco conceptual:","o":["La información financiera se elabora para cumplir el objetivo principal y único de la rendición de cuentas a los propietarios.","La aplicación del mismo conduce a la obtención de una imagen fiel de la realidad.","La información contable se elabora principalmente para los usuarios externos.","En la contabilización de las operaciones hay una preeminencia del fondo económico sobre la forma jurídica de la operación."],"c":[1,2,3],"e":"No es un objetivo único ni exclusivo de los propietarios (A falsa). El marco persigue la imagen fiel (B), prioriza a los usuarios externos (C) y aplica la preeminencia del fondo económico sobre la forma jurídica (D).","id":"q1_36"},{"t":1,"d":3,"ref":true,"q":"El marco conceptual del Plan General de Contabilidad de 2007 incluye los siguientes elementos:","o":["Los principios contables.","Los requisitos o características cualitativas de la información financiera.","Los elementos de las cuentas anuales.","Los criterios de registro o reconocimiento de los elementos."],"c":[0,1,2,3],"e":"Todas son correctas. El Marco Conceptual del PGC 2007 incluye: cuentas anuales (imagen fiel), requisitos de la información, principios contables, elementos de las cuentas anuales, y criterios de registro/reconocimiento y de valoración.","id":"q1_37"},{"t":1,"d":3,"ref":true,"q":"Una empresa que se declara en suspensión de pagos, es decir, que no puede atender a sus obligaciones de pago, no cumple el principio de:","o":["Prudencia.","No compensación.","Devengo.","Empresa en funcionamiento."],"c":[3],"e":"El principio de empresa en funcionamiento presume que la gestión continuará en un futuro previsible. Una suspensión de pagos pone en duda esa continuidad.","id":"q1_38"},{"t":1,"d":3,"ref":true,"q":"En relación a los usuarios y objetivos de la información financiera:","o":["Los marcos conceptuales toman como referencia principal las necesidades de información de los usuarios externos.","Todos los usuarios potenciales de la información financiera de una empresa presentan las mismas necesidades informativas.","Los objetivos de la información financiera están condicionados por los usuarios a los que va destinada dicha información.","La información económico-financiera obligatoria de la empresa está accesible para los usuarios internos y externos."],"c":[0,2,3],"e":"El marco prioriza a los usuarios externos (A) y los objetivos dependen de a quién se destina la información (C); la información obligatoria es accesible a internos y externos (D). Los usuarios NO tienen las mismas necesidades (B falsa).","id":"q1_39"},{"t":1,"d":3,"ref":true,"q":"Los requisitos que debe cumplir la información contable, según el Plan General de Contabilidad de 2007, hacen referencia a:","o":["La relevancia, a que la información sea útil para tomar decisiones.","La integridad, a que la información sea comprensible para los usuarios.","La fiabilidad, a que la información sea neutral y esté libre de errores materiales.","La comparabilidad, a que la información sea clara."],"c":[0,2],"e":"Relevancia = útil para decidir (A) y fiabilidad = neutral y sin errores materiales (C). La integridad NO es 'comprensible' (eso es la claridad), y la comparabilidad NO es 'clara', sino poder comparar en el tiempo o entre empresas.","id":"q1_40"},{"t":1,"d":3,"ref":true,"q":"El 1 de septiembre se contrata y paga al contado 1.200 u.m. por una campaña publicitaria que se desarrolla de septiembre a enero (5 meses). Si la empresa cierra resultados a 31 de diciembre, en «Publicidad» llevaría a resultados:","o":["Según el criterio de devengo, 1.200 u.m.","Según el criterio de devengo, 960 u.m.","Según el criterio de caja, 1.200 u.m.","Según el criterio de caja, 960 u.m."],"c":[1,2],"e":"1.200 / 5 meses = 240 u.m./mes. Por devengo se imputan los 4 meses consumidos (sep-dic) = 960 u.m. (B). Por criterio de caja se imputa todo lo pagado = 1.200 u.m. (C).","id":"q1_41"},{"t":1,"d":3,"ref":true,"q":"El cumplimiento de los requisitos recogidos en el marco conceptual debe conducir a:","o":["La obtención de la imagen exacta del patrimonio, de la situación financiera y de los resultados.","La obtención del valor razonable o fair value del patrimonio, de la situación financiera y de los resultados.","La obtención de la imagen fiel del patrimonio, de la situación financiera y de los resultados.","La obtención del valor actual del patrimonio, de la situación financiera y de los resultados."],"c":[2],"e":"El fin último de la contabilidad es expresar la IMAGEN FIEL (no 'exacta') del patrimonio, de la situación financiera y de los resultados.","id":"q1_42"},{"t":1,"d":3,"ref":true,"q":"En relación con los criterios de valoración:","o":["El coste histórico de un elemento es su precio de adquisición o coste de producción.","El valor contable es el importe neto del valor del activo aumentando, en su caso, la amortización acumulada.","El precio de adquisición incluye, en el caso de que se produzcan, los gastos de transporte a cargo de la empresa.","El valor razonable se calcula en referencia a un valor de mercado fiable, por ejemplo, la Bolsa o el mercado de valores."],"c":[0,2,3],"e":"A, C y D son correctas. El valor contable se obtiene DEDUCIENDO (no aumentando) la amortización acumulada y los deterioros, por lo que B es falsa.","id":"q1_43"},{"t":1,"d":3,"ref":true,"q":"En relación con el objeto de la contabilidad:","o":["El objeto material es la realidad económica.","El objeto formal es el conocimiento cuantitativo y cualitativo de esa realidad económica.","El objeto material es la elaboración de las normas que rigen la práctica contable.","El objeto formal es idéntico al del Derecho mercantil."],"c":[0,1],"e":"Objeto material = la realidad económica (A). Objeto formal = la perspectiva desde la que se estudia, esto es, su conocimiento cuantitativo y cualitativo (B).","id":"q1_44"},{"t":1,"d":3,"ref":true,"q":"Respecto a los objetos económicos reales:","o":["Los bienes de consumo satisfacen directamente las necesidades humanas.","Los bienes de producción son necesarios para la obtención de los bienes de consumo.","Las máquinas, instalaciones y materias primas son bienes de consumo.","Los derechos y obligaciones son bienes de producción."],"c":[0,1],"e":"Los bienes de consumo satisfacen necesidades directamente (A) y los de producción sirven para obtener los de consumo (B). Las máquinas, instalaciones y materias primas son bienes de PRODUCCIÓN (C falsa); los derechos y obligaciones son medios de cobro/pago, no bienes de producción (D falsa).","id":"q1_45"},{"t":1,"d":3,"ref":true,"q":"Sobre los usuarios de la información contable:","o":["Los usuarios internos realizan funciones de planificación y control del sistema.","La gerencia, la dirección y los mandos intermedios son usuarios internos.","Los inversores, las entidades de crédito y la Hacienda Pública son usuarios externos.","Los usuarios externos tienen capacidad de control sobre el sistema de información contable."],"c":[0,1,2],"e":"Los usuarios internos planifican y controlan (A) e incluyen gerencia, dirección y mandos intermedios (B). Inversores, bancos y Hacienda son externos (C). Quienes tienen capacidad de control sobre el sistema son los INTERNOS, no los externos (D falsa).","id":"q1_46"},{"t":1,"d":3,"ref":true,"q":"Para que la información financiera cumpla el requisito de comparabilidad, debe poder compararse:","o":["Con la información de la propia empresa en otro momento del tiempo.","Con la información de otras empresas.","Únicamente con la información del ejercicio actual.","Con datos que sean a la vez relevantes y fiables."],"c":[0,1],"e":"Comparable significa poder contrastar con la misma empresa en otro momento (A) y con otras empresas (B). No se limita al ejercicio actual (C falsa); que sea relevante y fiable son OTROS requisitos distintos de la comparabilidad (D).","id":"q1_47"},{"t":1,"d":3,"ref":true,"q":"Ante un conflicto entre principios contables obligatorios:","o":["Prevalecerá el que mejor conduzca a que las cuentas anuales muestren la imagen fiel.","Prevalecerá siempre el principio de prudencia sobre los demás.","Prevalecerá siempre el principio de devengo sobre los demás.","La imagen fiel es el criterio que resuelve el conflicto."],"c":[0,3],"e":"El conflicto entre principios se resuelve a favor del que mejor conduzca a la imagen fiel (A y D). El PGC 2007 ya no otorga prevalencia automática a la prudencia (B falsa) ni al devengo (C falsa).","id":"q1_48"},{"t":1,"d":3,"ref":true,"q":"Sobre los criterios de valoración valor residual y valor neto realizable:","o":["El valor residual es el importe estimado que se obtendría por el activo al final de su vida útil, deducidos los costes de venta.","El valor neto realizable es el importe que la empresa puede obtener por la venta del activo en el curso normal del negocio, deduciendo los costes estimados de venta.","El valor residual coincide siempre con el valor contable del activo.","El valor neto realizable se calcula sin deducir ningún coste de venta."],"c":[0,1],"e":"A y B recogen correctamente ambas definiciones. El valor residual no coincide con el valor contable (C falsa) y el valor neto realizable SÍ deduce los costes de venta (D falsa).","id":"q1_49"},{"t":1,"d":3,"ref":true,"q":"En relación con los principios contables del PGC 2007:","o":["El principio de devengo imputa gastos e ingresos en función de la corriente real, no de la financiera.","El principio de no compensación impide compensar partidas de activo y pasivo o de gastos e ingresos.","El principio de uniformidad obliga a no cambiar nunca de criterio contable.","El principio de prudencia permite contabilizar beneficios no realizados."],"c":[0,1],"e":"Devengo = corriente real (A); no compensación = no enfrentar partidas (B). La uniformidad permite cambiar de criterio justificándolo en la memoria (C falsa) y la prudencia NO permite registrar beneficios no realizados (D falsa).","id":"q1_50"},{"t":1,"d":3,"ref":false,"q":"En relación con la actividad económica y sus elementos:","o":["La actividad económica adapta o adecua los recursos disponibles para atender las demandas de productos y servicios.","Puede realizarse sobre bienes o servicios: actividades industriales, comerciales o de servicios.","Los agentes económicos son los elementos sobre los que se realiza la actividad económica.","La unidad económica es el marco de realización de la actividad económica, agrupando agentes y objetos."],"c":[0,1,3],"e":"Los agentes son las PERSONAS involucradas en la actividad (clientes, proveedores, propietarios, empleados); los elementos sobre los que se realiza son los OBJETOS económicos.","id":"h1_00"},{"t":1,"d":3,"ref":false,"q":"Sobre los agentes y las unidades económicas:","o":["Los agentes económicos son las personas involucradas en la realización de la actividad económica.","Clientes, proveedores, propietarios y empleados son ejemplos de agentes económicos.","Las empresas son unidades económicas de producción.","Las empresas son unidades económicas de consumo."],"c":[0,1,2],"e":"Los agentes son personas (clientes, proveedores, propietarios, empleados, etc.) y las empresas son unidades económicas de PRODUCCIÓN, no de consumo.","id":"h1_01"},{"t":1,"d":3,"ref":false,"q":"En relación con los objetos económicos:","o":["Los objetos financieros incluyen los derechos, las obligaciones y los medios de cobro y pago.","Los objetos reales incluyen los bienes (tangibles e intangibles) y los servicios.","Los derechos de cobro son objetos económicos reales.","Los servicios son actividades que afectan o suponen un cambio en la empresa que los contrata."],"c":[0,1,3],"e":"Los derechos son objetos FINANCIEROS, no reales. Reales son los bienes y servicios.","id":"h1_02"},{"t":1,"d":3,"ref":false,"q":"En una panadería, según la clasificación de los bienes:","o":["La harina utilizada para fabricar el pan es un bien de producción.","El horno es un bien de producción.","El pan vendido al consumidor final es un bien de consumo.","La harina es un bien de consumo porque acaba consumiéndose en el proceso."],"c":[0,1,2],"e":"Son bienes de producción los necesarios para obtener bienes de consumo (harina, horno, maquinaria). El pan satisface directamente necesidades humanas: bien de consumo. Que un bien se consuma en el proceso no lo convierte en «bien de consumo».","id":"h1_03"},{"t":1,"d":3,"ref":false,"q":"En el fenómeno de circulación de valor de la empresa:","o":["La compra es la adquisición de bienes y servicios expresada en unidades físicas.","El gasto es el equivalente monetario de la compra.","El ingreso es el equivalente monetario de la venta.","El pago y el gasto son siempre el mismo concepto expresado de dos formas."],"c":[0,1,2],"e":"Compra/venta = corriente real en unidades físicas; gasto/ingreso = su equivalente monetario; pago/cobro = corriente financiera (movimiento de dinero). Gasto y pago son conceptos distintos que pueden no coincidir en el tiempo.","id":"h1_04"},{"t":1,"d":3,"ref":false,"q":"La corriente financiera de la empresa:","o":["Está formada por los pagos y los cobros.","El pago es la salida de dinero ocasionada por un gasto (compra).","El cobro es la entrada de dinero ocasionada por un ingreso (venta).","Coincide siempre en el tiempo con la corriente real."],"c":[0,1,2],"e":"La corriente financiera (pagos y cobros) es independiente de la corriente real: pueden coincidir o no en el tiempo (ventas a crédito, pagos aplazados…).","id":"h1_05"},{"t":1,"d":3,"ref":false,"q":"Una empresa compra a crédito mercaderías por 1.000 €. En ese momento:","o":["Se produce una compra (corriente real).","Se produce un gasto de 1.000 € (equivalente monetario de la compra).","Se produce un pago de 1.000 €.","Cuando meses después abone la factura, se producirá el pago, sin que ello suponga un nuevo gasto."],"c":[0,1,3],"e":"Al comprar a crédito hay compra y gasto, pero NO pago (no sale dinero). El pago se producirá al abonar la factura y no genera un gasto nuevo.","id":"h1_06"},{"t":1,"d":3,"ref":false,"q":"Una empresa vende 500 kg de producto a 3 €/kg y cobra al contado la mitad del importe. En ese momento:","o":["La venta ha sido de 500 kg.","El ingreso asciende a 1.500 €.","El cobro asciende a 750 €.","El ingreso asciende a 750 €."],"c":[0,1,2],"e":"Venta (corriente real) = 500 kg; ingreso devengado = 500 × 3 = 1.500 €; cobro (corriente financiera) = la mitad, 750 €. El ingreso no depende de lo cobrado.","id":"h1_07"},{"t":1,"d":3,"ref":false,"q":"La problemática de carácter económico-técnico de la empresa:","o":["Corresponde al ámbito interno de la empresa.","Integra los factores utilizados, expresados como costes en términos monetarios.","Integra la producción, valorada al coste en unidades monetarias.","Surge de la relación de la empresa con el mundo exterior."],"c":[0,1,2],"e":"La problemática económico-técnica es la actividad interna (proceso productivo): factores y producción valorados a coste. La relación con el exterior es la problemática económico-FINANCIERA.","id":"h1_08"},{"t":1,"d":3,"ref":false,"q":"El 1 de octubre una empresa paga 3.000 € por el alquiler de un local correspondiente a 6 meses (octubre a marzo). Si cierra el ejercicio el 31 de diciembre:","o":["Según el criterio de devengo, el gasto del ejercicio es de 1.500 €.","Según el criterio de caja, el gasto del ejercicio es de 3.000 €.","Según el criterio de devengo, el gasto del ejercicio es de 3.000 €.","La cuota mensual devengada es de 500 €."],"c":[0,1,3],"e":"3.000 / 6 = 500 €/mes. Por devengo se imputan los 3 meses consumidos (oct-dic) = 1.500 €; por caja se imputa todo lo pagado, 3.000 €.","id":"h1_09"},{"t":1,"d":3,"ref":false,"q":"En la evolución histórica de la contabilidad:","o":["Los romanos utilizaron la partida simple.","La partida doble aparece a partir del Renacimiento (1494).","En los años 50 del siglo XX se intentó formalizar la ciencia contable con teoremas y leyes.","Los marcos conceptuales surgen en los años 70 del siglo XX, cuando se pone el énfasis en el carácter social de la contabilidad."],"c":[0,1,2,3],"e":"Todas son correctas: partida simple (Roma), partida doble (Renacimiento, 1494), formalización (años 50) y marcos conceptuales con énfasis social (años 70).","id":"h1_10"},{"t":1,"d":3,"ref":false,"q":"La contabilidad como sistema de información:","o":["Es la principal encargada de elaborar y suministrar la información económica.","Ofrece información estructurada y relevante sobre la situación de la empresa.","Informa sobre el proceso de creación de valor y riqueza y su distribución.","Sólo ofrece información a los accionistas de la empresa."],"c":[0,1,2],"e":"La contabilidad informa de la situación de la empresa y del proceso de creación y distribución de valor a MÚLTIPLES usuarios, no sólo a los accionistas.","id":"h1_11"},{"t":1,"d":3,"ref":false,"q":"Entre las funciones del marco conceptual (AECA, 2012) se encuentran:","o":["Ser punto de referencia común para elaboradores, usuarios y auditores de la información financiera.","Orientar la elaboración de normas contables y su aplicación a hechos concretos.","Suministrar criterios para resolver conflictos entre normas.","Facilitar la comprensión de la información financiera y el cumplimiento del requisito de imagen fiel."],"c":[0,1,2,3],"e":"Todas son funciones del marco conceptual según AECA (2012), junto con la adaptación de la contabilidad a los retos del entorno.","id":"h1_12"},{"t":1,"d":3,"ref":false,"q":"El marco conceptual:","o":["Es una base teórica consistente para elaborar las reglas y normas que rigen en la práctica.","Es el conjunto de fundamentos, principios y conceptos básicos cuyo cumplimiento conduce a la imagen fiel.","Surge en los años 70 ligado al carácter social de la contabilidad.","Es un conjunto de normas de valoración detalladas para cada elemento patrimonial concreto."],"c":[0,1,2],"e":"El marco conceptual es la base teórica general; las normas detalladas por elemento son las «normas de registro y valoración» del PGC, no el marco.","id":"h1_13"},{"t":1,"d":3,"ref":false,"q":"La estructura del marco conceptual del PGC 2007 incluye:","o":["Las cuentas anuales y la imagen fiel.","Los requisitos de la información y los principios contables.","Los elementos de las cuentas anuales y los criterios de registro o reconocimiento.","El cuadro de cuentas."],"c":[0,1,2],"e":"El marco conceptual tiene 6 componentes: cuentas anuales/imagen fiel, requisitos, principios, elementos, criterios de registro y criterios de valoración. El cuadro de cuentas es otra PARTE del PGC, no del marco conceptual.","id":"h1_14"},{"t":1,"d":3,"ref":false,"q":"La contabilidad es una ciencia:","o":["Empírica y aplicada.","Económica y social.","Exacta: sus definiciones no admiten discusión.","En la que las definiciones y normas se fijan por consenso, buscando el acuerdo y no la exactitud."],"c":[0,1,3],"e":"La contabilidad es ciencia empírica, aplicada, económica y social: no existen conceptos naturales, se determinan socialmente y se busca el acuerdo, no la exactitud.","id":"h1_15"},{"t":1,"d":3,"ref":false,"q":"Que la contabilidad sea una ciencia social implica que:","o":["No existen conceptos naturales: se determinan y expresan socialmente.","Las definiciones o normas se fijan por consenso.","Se busca la exactitud matemática por encima del acuerdo.","Los usuarios han de conocer el marco y las pautas establecidas."],"c":[0,1,3],"e":"Se busca el ACUERDO, no la exactitud: los conceptos se fijan por consenso y los usuarios deben conocer el marco establecido.","id":"h1_16"},{"t":1,"d":3,"ref":false,"q":"En la definición de contabilidad:","o":["El objeto material (campo de actuación) es la realidad económica.","El objeto formal (perspectiva de estudio) es el conocimiento cuantitativo y cualitativo de la realidad económica.","Su fin es mostrar la situación de la empresa y su evolución en el tiempo de modo útil para la toma de decisiones.","El objeto formal es la realidad económica y el material su conocimiento."],"c":[0,1,2],"e":"Objeto material = realidad económica; objeto formal = su conocimiento cuantitativo y cualitativo. La opción D los intercambia.","id":"h1_17"},{"t":1,"d":3,"ref":false,"q":"Entre los objetivos y fines de la contabilidad se encuentran:","o":["El registro y la detección de errores.","La rendición de cuentas y el control.","Servir de herramienta de gestión.","La utilidad para la toma de decisiones."],"c":[0,1,2,3],"e":"Todas son correctas: son los cuatro objetivos de la contabilidad, que dependen de las necesidades de los usuarios y del contexto.","id":"h1_18"},{"t":1,"d":3,"ref":false,"q":"Según el enfoque de utilidad para el usuario externo:","o":["Los usuarios principales son los inversores, prestamistas y otros acreedores, existentes o potenciales.","La información debe permitir evaluar la situación económica y financiera de la entidad.","La información debe permitir evaluar la liquidez y la capacidad para obtener flujos de caja.","El usuario principal es la Administración tributaria."],"c":[0,1,2],"e":"El usuario de referencia son inversores, prestamistas y otros acreedores (existentes o potenciales); la información debe permitir evaluar situación, comportamiento y capacidad de generar flujos.","id":"h1_19"},{"t":1,"d":3,"ref":false,"q":"Los usuarios internos de la información contable:","o":["Tienen cierta capacidad de control sobre el sistema de información contable.","Realizan funciones de planificación y control.","Incluyen la gerencia y dirección, los mandos intermedios y los consejos de administración.","Tienen un acceso más limitado a la información que los externos."],"c":[0,1,2],"e":"Los internos controlan el sistema y planifican; quienes tienen acceso más limitado son los EXTERNOS.","id":"h1_20"},{"t":1,"d":3,"ref":false,"q":"Dentro de los usuarios externos se distinguen:","o":["Los proveedores de recursos: propietarios, trabajadores, acreedores, etc.","Los receptores de bienes y servicios y con intereses indirectos: gobierno, consumidores, sindicatos, legisladores.","Los que ejercen funciones de control de la información: los auditores.","La gerencia y los mandos intermedios."],"c":[0,1,2],"e":"La gerencia y los mandos intermedios son usuarios INTERNOS. Los externos se agrupan en proveedores de recursos, receptores/intereses indirectos y control (auditores).","id":"h1_21"},{"t":1,"d":3,"ref":false,"q":"En relación con los usuarios de la información contable, señala las afirmaciones correctas:","o":["Los propietarios y los trabajadores se clasifican como usuarios externos (proveedores de recursos).","Los auditores son usuarios externos con funciones de control de la información.","La información divulgada toma como referencia las necesidades de los usuarios externos (IASB, 2015).","Toda la información que elabora la empresa se divulga."],"c":[0,1,2],"e":"Propietarios y trabajadores son externos (proveedores de recursos) y los auditores externos de control. NO toda la información elaborada se divulga.","id":"h1_22"},{"t":1,"d":3,"ref":false,"q":"El requisito de relevancia implica que la información:","o":["Es útil para la toma de decisiones.","Ayuda a evaluar sucesos pasados, presentes o futuros.","Está libre de errores materiales y es neutral.","Puede compararse con la de otras empresas."],"c":[0,1],"e":"Relevante = útil para decidir y evaluar sucesos. Libre de errores y neutral es FIABILIDAD; comparar con otras empresas es COMPARABILIDAD.","id":"h1_23"},{"t":1,"d":3,"ref":false,"q":"El requisito de fiabilidad de la información financiera:","o":["Exige que la información esté libre de errores materiales.","Exige que la información sea neutral, es decir, libre de sesgos.","Requiere que la información sea íntegra (completa).","Consiste en que los usuarios puedan entender la información."],"c":[0,1,2],"e":"Fiable = sin errores materiales + neutral, y para ello íntegra (completa). Que se pueda entender es la CLARIDAD.","id":"h1_24"},{"t":1,"d":3,"ref":false,"q":"En relación con los requisitos de la información financiera:","o":["Clara: los usuarios pueden entenderla y formarse juicios que faciliten sus decisiones.","Comparable: con la propia empresa en el tiempo y con otras empresas en el espacio.","Íntegra: sinónimo de comprensible.","La integridad (información completa) se vincula a la fiabilidad."],"c":[0,1,3],"e":"Claridad = comprensible; comparabilidad = en el tiempo y en el espacio; la integridad significa información COMPLETA y es condición de la fiabilidad, no de la claridad.","id":"h1_25"},{"t":1,"d":3,"ref":false,"q":"El principio de empresa en funcionamiento:","o":["Considera, salvo prueba en contrario, que la gestión de la empresa continuará en un futuro previsible.","Implica no determinar el valor del patrimonio a efectos de su transmisión global o liquidación.","Si no resulta aplicable, la empresa debe informar en la memoria sobre los criterios aplicados.","Obliga a valorar siempre los activos a valor de liquidación."],"c":[0,1,2],"e":"El principio presume la continuidad; sólo si la empresa va a liquidarse se aplican criterios de liquidación, informando en la memoria.","id":"h1_26"},{"t":1,"d":3,"ref":false,"q":"Una empresa va a liquidar su patrimonio y finalizar su actividad, y decide valorar sus activos a valor de mercado en lugar del precio de adquisición:","o":["Aplica bien el principio de empresa en funcionamiento, pues al liquidarse deben aplicarse los criterios adecuados a esa situación.","Vulnera el principio de empresa en funcionamiento.","Si un auditor detecta riesgos pero la actividad continúa, la empresa debe mantener sus criterios de valoración habituales.","La liquidación no afecta nunca a los criterios de valoración."],"c":[0,2],"e":"Cuando decae la continuidad se aplican criterios de liquidación (correcto). Si la empresa sigue en funcionamiento pese a los riesgos, mantiene sus criterios.","id":"h1_27"},{"t":1,"d":3,"ref":false,"q":"El caso Toshiba (2015), en el que se registraron en el ejercicio siguiente gastos ya consumidos para inflar el beneficio, supone una vulneración de:","o":["El principio de devengo.","El principio de no compensación.","La correcta imputación temporal de los gastos: deben registrarse en el ejercicio en que se devengan.","El principio de importancia relativa."],"c":[0,2],"e":"Retrasar el registro de gastos consumidos vulnera el DEVENGO: los gastos se imputan al ejercicio en que se producen, con independencia de su pago.","id":"h1_28"},{"t":1,"d":3,"ref":false,"q":"Una empresa presta servicios por 3.000 € en diciembre del año X0 y los cobra en enero del X1:","o":["Según el criterio de devengo, el ingreso corresponde al ejercicio X0.","Según el criterio de devengo, el ingreso corresponde al ejercicio X1.","El cobro se producirá en X1 sin que ello genere un nuevo ingreso.","Si los cobros se realizan con normalidad, con el tiempo el resultado por devengo y por caja tienden a coincidir."],"c":[0,2,3],"e":"El ingreso se devenga al prestar el servicio (X0); el cobro posterior es sólo corriente financiera. A largo plazo ambos criterios convergen si se cobra con normalidad.","id":"h1_29"},{"t":1,"d":3,"ref":false,"q":"El principio de uniformidad:","o":["Obliga a mantener el criterio adoptado mientras se mantengan los supuestos que motivaron su elección.","Permite cambiar de criterio si se alteran los supuestos, indicando en la memoria la incidencia cuantitativa y cualitativa del cambio.","Se vulnera si la empresa aplica tasas de amortización distintas a construcciones, maquinaria y elementos de transporte.","Se aplica de manera uniforme para transacciones, eventos y condiciones que sean similares."],"c":[0,1,3],"e":"Aplicar tasas distintas a elementos DISTINTOS no vulnera la uniformidad: el principio exige el mismo criterio para elementos y condiciones similares.","id":"h1_30"},{"t":1,"d":3,"ref":false,"q":"Una empresa corrige cada cierre el valor de sus acciones a corto plazo para que figuren por su cotización, por lo que su valor cambia cada año:","o":["Vulnera el principio de uniformidad porque el valor no se mantiene constante.","No vulnera la uniformidad: el criterio (valor de cotización) se mantiene, aunque el valor resultante cambie.","La uniformidad se refiere a mantener los criterios, no los importes.","Debería congelar el valor de las acciones para cumplir la uniformidad."],"c":[1,2],"e":"La uniformidad exige mantener el CRITERIO de valoración, no el importe: si el criterio es la cotización, es correcto que el valor fluctúe.","id":"h1_31"},{"t":1,"d":3,"ref":false,"q":"El principio de prudencia:","o":["Implica ser prudente en las estimaciones y valoraciones en condiciones de incertidumbre.","Permite contabilizar únicamente los beneficios obtenidos hasta el cierre del ejercicio.","Obliga a tener en cuenta todos los riesgos tan pronto sean conocidos, aunque procedan de ejercicios anteriores.","Exime de contabilizar amortizaciones y deterioros cuando el ejercicio arroja pérdidas."],"c":[0,1,2],"e":"La prudencia sólo admite beneficios realizados y obliga a recoger los riesgos conocidos. Amortizaciones y deterioros se registran SIEMPRE, haya beneficio o pérdida.","id":"h1_32"},{"t":1,"d":3,"ref":false,"q":"El 31-12 del X0 una empresa recibe notificación de Hacienda y su asesor estima que, con casi total probabilidad, le impondrán una sanción de unos 6.000 €:","o":["Por el principio de prudencia, debe registrar la posible sanción ya en el X0.","Debe esperar a que la sanción sea firme para reflejar cualquier información.","Los riesgos se contabilizan tan pronto son conocidos.","Sólo debe registrarla si Hacienda la comunica antes de formular las cuentas… del ejercicio X5."],"c":[0,2],"e":"La prudencia obliga a recoger los riesgos conocidos al cierre: procede registrar la provisión estimada de 6.000 € en el X0.","id":"h1_33"},{"t":1,"d":3,"ref":false,"q":"Un contable, viendo que un cliente y un acreedor son la misma persona jurídica, registra sólo el neto: un ingreso por arrendamiento de 400 € (1.000 € de ingreso menos 600 € del servicio de transporte recibido):","o":["Aplica correctamente el principio de no compensación.","Vulnera el principio de no compensación: debe registrar el ingreso de 1.000 € y el gasto de 600 € por separado.","Salvo que una norma disponga lo contrario, no se compensan partidas de activo y pasivo ni de gastos e ingresos.","Los elementos de las cuentas anuales se valoran por separado."],"c":[1,2,3],"e":"Compensar ingresos con gastos (o créditos con deudas) vulnera el principio de no compensación: cada partida se registra y valora por separado.","id":"h1_34"},{"t":1,"d":3,"ref":false,"q":"Una empresa compra dos sillas por 60 € en total, con una duración estimada de 10 años, y las contabiliza como gasto del ejercicio:","o":["Vulnera gravemente el principio de devengo.","Es admisible por el principio de importancia relativa, dada la escasa significación cuantitativa del importe.","El principio de importancia relativa admite la no aplicación estricta de algunos principios cuando la variación sea escasamente significativa y no altere la imagen fiel.","Las partidas de importancia escasamente significativa pueden agruparse con otras de naturaleza o función similar."],"c":[1,2,3],"e":"Por importancia relativa, un importe insignificante (60 €) puede llevarse a gastos aunque el bien dure años, sin alterar la imagen fiel.","id":"h1_35"},{"t":1,"d":3,"ref":false,"q":"En caso de conflicto entre principios contables obligatorios:","o":["Prevalece el que mejor conduzca a que las cuentas anuales muestren la imagen fiel del patrimonio, de la situación financiera y de los resultados.","Prevalece siempre el principio de prudencia.","Prevalece siempre el principio de devengo.","El PGC 2007 eliminó la prevalencia automática de la prudencia."],"c":[0,3],"e":"Desde el PGC 2007 no hay prevalencia automática de ningún principio: gana el que mejor conduzca a la imagen fiel.","id":"h1_36"},{"t":1,"d":3,"ref":false,"q":"La valoración contable:","o":["Es el proceso de determinación de los importes monetarios por los que se reconocen y registran los elementos.","Resulta de multiplicar la cuantificación en unidades físicas (medición) por un factor de conversión (precio).","Utiliza un único criterio de valoración para todos los elementos.","El criterio aplicable depende de la naturaleza del elemento y del papel que desempeña en la actividad."],"c":[0,1,3],"e":"Valor = medición × precio. Existen DIFERENTES criterios según la naturaleza y función de cada elemento: no hay un criterio único.","id":"h1_37"},{"t":1,"d":3,"ref":false,"q":"Una empresa compra una máquina: factura 20.000 €, descuento 2.000 €, transporte 500 €, seguro del transporte 200 €, instalación 1.000 € y un contrato de mantenimiento anual de 600 €. El precio de adquisición es:","o":["19.700 €.","22.300 €.","El mantenimiento anual se excluye por ser un gasto del ejercicio.","El descuento no se deduce."],"c":[0,2],"e":"20.000 − 2.000 + 500 + 200 + 1.000 = 19.700 €. Se incluyen los gastos adicionales hasta la puesta en funcionamiento; el mantenimiento es gasto del ejercicio y los descuentos se deducen.","id":"h1_38"},{"t":1,"d":3,"ref":false,"q":"El coste de producción incluye:","o":["El precio de adquisición de las materias primas y otras materias consumibles.","Los costes directamente imputables al producto.","La parte que razonablemente corresponda de los costes indirectos.","El beneficio esperado en la venta del producto."],"c":[0,1,2],"e":"Coste de producción = materias primas y consumibles + costes directos + parte razonable de indirectos. El beneficio no forma parte del coste.","id":"h1_39"},{"t":1,"d":3,"ref":false,"q":"La empresa A adquirió 200 acciones de Endesa a 13,8 €/acción; hoy cotizan a 20 €:","o":["El precio de adquisición fue de 2.760 €.","El valor razonable actual es de 4.000 €.","El valor razonable se calcula, con carácter general, por referencia a un valor fiable de mercado.","El valor razonable es el importe por el que puede intercambiarse un activo entre partes interesadas y debidamente informadas en condiciones de independencia mutua."],"c":[0,1,2,3],"e":"200 × 13,8 = 2.760 € (coste); 200 × 20 = 4.000 € (valor razonable, referido a un mercado fiable como la Bolsa).","id":"h1_40"},{"t":1,"d":3,"ref":false,"q":"Una maquinaria costó 10.000 € y acumula una depreciación registrada de 3.000 €:","o":["Su valor contable o en libros es de 7.000 €.","El valor contable es el importe neto una vez deducidas la amortización acumulada y las correcciones por deterioro.","Su valor contable es de 13.000 €.","El valor contable se obtiene sumando la amortización acumulada al valor inicial."],"c":[0,1],"e":"Valor contable = 10.000 − 3.000 = 7.000 €: el neto tras DEDUCIR amortización acumulada y deterioros.","id":"h1_41"},{"t":1,"d":3,"ref":false,"q":"El valor residual de un activo:","o":["Es el importe que la empresa estima que podría obtener por su venta u otra forma de disposición al final de su vida útil.","Se calcula deduciendo los costes de venta.","Considera que el activo ya ha alcanzado la antigüedad y condiciones esperadas al final de su vida útil.","Coincide siempre con el valor neto realizable."],"c":[0,1,2],"e":"El valor residual estima lo que se obtendría al FINAL de la vida útil, netos los costes de venta. El VNR se refiere a la venta en el curso normal del negocio, son criterios distintos.","id":"h1_42"},{"t":1,"d":3,"ref":false,"q":"El valor neto realizable de un activo:","o":["Es el importe que la empresa puede obtener por su venta en el mercado en el curso normal del negocio, deduciendo los costes estimados de venta.","En el caso de las materias primas y de los productos en curso, deduce además los costes estimados necesarios para terminar su producción.","Es el valor actual de los flujos de efectivo futuros esperados.","No deduce ningún coste."],"c":[0,1],"e":"El VNR deduce los costes de venta (y, en materias primas y productos en curso, los costes para terminar la producción). El valor actual de flujos futuros es el VALOR EN USO.","id":"h1_43"},{"t":1,"d":3,"ref":false,"q":"El valor en uso de un activo:","o":["Es el valor actual de los flujos de efectivo futuros esperados a través de su utilización en el curso normal del negocio.","Incluye, en su caso, los flujos derivados de su enajenación u otra forma de disposición.","Se calcula por referencia directa a la cotización bursátil.","Requiere actualizar (descontar) flujos futuros."],"c":[0,1,3],"e":"El valor en uso descuenta flujos futuros esperados del uso (y eventual venta) del activo. La referencia a mercado es propia del valor razonable.","id":"h1_44"},{"t":1,"d":3,"ref":false,"q":"Los costes de venta de un activo:","o":["Son costes incrementales directamente atribuibles a la venta.","Son costes en los que la empresa no habría incurrido de no haber tomado la decisión de vender.","Incluyen los gastos financieros y los impuestos sobre beneficios.","Excluyen los gastos financieros y los impuestos sobre beneficios."],"c":[0,1,3],"e":"Los costes de venta son los incrementales directamente atribuibles a la venta, EXCLUYENDO gastos financieros e impuestos sobre beneficios.","id":"h1_45"},{"t":1,"d":3,"ref":false,"q":"El coste amortizado de un instrumento financiero:","o":["Parte del importe al que inicialmente fue valorado el activo o pasivo financiero.","Resta los reembolsos de principal que se hubieran producido.","Suma o resta la parte imputada a resultados, mediante el método del tipo de interés efectivo, de la diferencia entre el importe inicial y el valor de reembolso al vencimiento.","Es el criterio que se aplica a las mercaderías del almacén."],"c":[0,1,2],"e":"El coste amortizado se aplica a instrumentos FINANCIEROS: importe inicial − reembolsos ± imputación por tipo de interés efectivo. No se aplica a mercaderías.","id":"h1_46"},{"t":1,"d":3,"ref":false,"q":"Relaciona correctamente los criterios de valoración:","o":["El coste histórico de un activo es su precio de adquisición o su coste de producción.","El valor razonable se apoya, con carácter general, en un valor fiable de mercado.","El valor actual es el importe de los flujos de efectivo a recibir o pagar en el curso normal del negocio, según se trate de un activo o de un pasivo.","El valor residual es el importe bruto de la factura de compra."],"c":[0,1,2],"e":"A, B y C recogen correctamente coste histórico, valor razonable y valor actual. El valor residual es la estimación del valor al final de la vida útil, no la factura de compra.","id":"h1_47"},{"t":1,"d":3,"ref":false,"q":"El Corte Inglés presentaba un activo contable consolidado de 2.051 millones, una tasación inmobiliaria de 15.126 millones y una valoración implícita de mercado de al menos 10.000 millones. De este caso se deduce que:","o":["El valor de una empresa no es único: depende del criterio de valoración empleado.","Las valoraciones «de mercado» pueden diferir entre sí en miles de millones.","El valor contable tiene la ventaja de ser más fiable y verificable.","La contabilidad siempre recoge el valor de mercado de los activos."],"c":[0,1,2],"e":"El caso ilustra que no hay un valor único y que las estimaciones de mercado divergen; el valor contable es más fiable/verificable aunque menos «actual». La contabilidad no recoge siempre valores de mercado.","id":"h1_48"},{"t":1,"d":3,"ref":false,"q":"Para que la información financiera sea útil al usuario externo se requiere:","o":["Que sea fiable y muestre la imagen fiel del patrimonio, de la situación financiera y de los resultados.","Aplicar los requisitos, principios y criterios del marco conceptual.","Que el re
